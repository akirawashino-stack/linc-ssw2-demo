'tenpo-soneki':'<b><ruby>計算<rt class=ez>けいさん</rt></ruby></b> <ruby>損益分岐点<rt>そんえきぶんきてん</rt></ruby><ruby>売上高<rt class=ez>うりあげだか</rt></ruby> ＝ <ruby>固定費<rt>こていひ</rt></ruby> ÷ <ruby>限界利益率<rt>げんかいりえきりつ</rt></ruby>。<br><b>ことば</b> <ruby>固定費<rt>こていひ</rt></ruby>＝<ruby>売上<rt class=ez>うりあげ</rt></ruby>に<ruby>関係<rt>かんけい</rt></ruby>なくかかる<ruby>費用<rt>ひよう</rt></ruby>（<ruby>家賃<rt>やちん</rt></ruby>など）。<ruby>限界利益率<rt>げんかいりえきりつ</rt></ruby>＝（<ruby>売上<rt class=ez>うりあげ</rt></ruby>−<ruby>変動費<rt>へんどうひ</rt></ruby>）÷<ruby>売上<rt class=ez>うりあげ</rt></ruby>。<br><b>れい</b> <ruby>固定費<rt>こていひ</rt></ruby>40<ruby>万円<rt class=ez>まんえん</rt></ruby>・<ruby>限界利益率<rt>げんかいりえきりつ</rt></ruby>80%なら、40<ruby>万<rt class=ez>まん</rt></ruby>÷0.8＝<ruby>売上<rt class=ez>うりあげ</rt></ruby>50<ruby>万円<rt class=ez>まんえん</rt></ruby>でちょうど0。<br><b>ポイント</b> これより<ruby>売上<rt class=ez>うりあげ</rt></ruby>が<ruby>多<rt class=ez>おお</rt></ruby>ければ<ruby>黒字<rt class=ez>くろじ</rt></ruby>、<ruby>少<rt class=ez>すく</rt></ruby>なければ<ruby>赤字<rt class=ez>あかじ</rt></ruby>。',
'tenpo-abc':'<b>やり<ruby>方<rt class=ez>かた</rt></ruby></b> <ruby>売上<rt class=ez>うりあげ</rt></ruby>の<ruby>多<rt class=ez>おお</rt></ruby>い<ruby>順<rt>じゅん</rt></ruby>に<ruby>商品<rt class=ez>しょうひん</rt></ruby>をならべ、<ruby>上<rt class=ez>うえ</rt></ruby>からA・B・Cの3グループに<ruby>分<rt class=ez>わ</rt></ruby>ける。<br><b>つかい<ruby>方<rt class=ez>かた</rt></ruby></b> Aは「<ruby>売<rt class=ez>う</rt></ruby>れ<ruby>筋<rt>すじ</rt></ruby>」。<ruby>品切<rt class=ez>しなぎ</rt></ruby>れさせない・<ruby>目立<rt class=ez>めだ</rt></ruby>つ<ruby>場所<rt class=ez>ばしょ</rt></ruby>に<ruby>置<rt>お</rt></ruby>くなど<ruby>力<rt class=ez>ちから</rt></ruby>を<ruby>入<rt class=ez>い</rt></ruby>れる。Cは<ruby>見直<rt class=ez>みなお</rt></ruby>しの<ruby>対象<rt>たいしょう</rt></ruby>。<br><b>ポイント</b> <ruby>少<rt class=ez>すく</rt></ruby>ない<ruby>商品<rt class=ez>しょうひん</rt></ruby>が<ruby>売上<rt class=ez>うりあげ</rt></ruby>の<ruby>大半<rt class=ez>たいはん</rt></ruby>を<ruby>作<rt class=ez>つく</rt></ruby>ることが<ruby>多<rt class=ez>おお</rt></ruby>い。',
'tenpo-ninji':'<b>たんい</b> 1<ruby>人時<rt class=ez>にんじ</rt></ruby>＝1<ruby>人<rt class=ez>ひと</rt></ruby>が1<ruby>時間<rt class=ez>じかん</rt></ruby><ruby>働<rt>はたら</rt></ruby>く<ruby>労働量<rt>ろうどうりょう</rt></ruby>。3<ruby>人<rt class=ez>にん</rt></ruby>が4<ruby>時間<rt class=ez>じかん</rt></ruby>なら12<ruby>人時<rt class=ez>にんじ</rt></ruby>。<br><b>つながり</b> <ruby>人時売上高<rt class=ez>にんじうりあげだか</rt></ruby>＝<ruby>売上<rt class=ez>うりあげ</rt></ruby>÷<ruby>総人時<rt>そうにんじ</rt></ruby>。<ruby>人時<rt class=ez>にんじ</rt></ruby>あたりの<ruby>成果<rt>せいか</rt></ruby>をはかる<ruby>土台<rt class=ez>どだい</rt></ruby>。<br><b>ポイント</b> <ruby>人数<rt class=ez>にんずう</rt></ruby>×<ruby>時間<rt class=ez>じかん</rt></ruby>で「どれだけ<ruby>人<rt class=ez>ひと</rt></ruby>を<ruby>使<rt class=ez>つか</rt></ruby>ったか」を<ruby>数字<rt class=ez>すうじ</rt></ruby>にできる。',
'tenpo-kyakusu':'<b>つながり</b> <ruby>売上高<rt class=ez>うりあげだか</rt></ruby>＝<ruby>客数<rt class=ez>きゃくすう</rt></ruby>×<ruby>客単価<rt>きゃくたんか</rt></ruby>。<ruby>売上<rt class=ez>うりあげ</rt></ruby>を<ruby>上<rt class=ez>あ</rt></ruby>げるには<ruby>客数<rt class=ez>きゃくすう</rt></ruby>か<ruby>客単価<rt>きゃくたんか</rt></ruby>を<ruby>増<rt>ふ</rt></ruby>やす。<br><b>ふやし<ruby>方<rt class=ez>かた</rt></ruby></b> <ruby>客数<rt class=ez>きゃくすう</rt></ruby>は「<ruby>新規客<rt>しんききゃく</rt></ruby>を<ruby>呼<rt>よ</rt></ruby>ぶ」「<ruby>来店頻度<rt>らいてんひんど</rt></ruby>を<ruby>上<rt class=ez>あ</rt></ruby>げる」で<ruby>増<rt>ふ</rt></ruby>える。<br><b>ポイント</b> <ruby>客数<rt class=ez>きゃくすう</rt></ruby>と<ruby>客単価<rt>きゃくたんか</rt></ruby>はかけ<ruby>算<rt class=ez>ざん</rt></ruby>。<ruby>両方<rt class=ez>りょうほう</rt></ruby>を<ruby>見<rt class=ez>み</rt></ruby>る。',
'tenpo-sekkyakuseisansei':'<b><ruby>計算<rt class=ez>けいさん</rt></ruby></b> <ruby>接客生産性<rt>せっきゃくせいさんせい</rt></ruby>＝<ruby>客数<rt class=ez>きゃくすう</rt></ruby>÷<ruby>総労働時間<rt>そうろうどうじかん</rt></ruby>。1<ruby>時間<rt class=ez>じかん</rt></ruby>あたり<ruby>何人<rt class=ez>なんにん</rt></ruby><ruby>接客<rt>せっきゃく</rt></ruby>できたか。<br><b>にた<ruby>言葉<rt>ことば</rt></ruby></b> <ruby>人時売上高<rt class=ez>にんじうりあげだか</rt></ruby>は「<ruby>金額<rt>きんがく</rt></ruby>」、<ruby>接客生産性<rt>せっきゃくせいさんせい</rt></ruby>は「<ruby>人数<rt class=ez>にんずう</rt></ruby>」で<ruby>効率<rt>こうりつ</rt></ruby>を<ruby>見<rt class=ez>み</rt></ruby>る。<br><b>ポイント</b> <ruby>高<rt class=ez>たか</rt></ruby>いほど、<ruby>少<rt class=ez>すく</rt></ruby>ない<ruby>人<rt class=ez>ひと</rt></ruby>で<ruby>多<rt class=ez>おお</rt></ruby>くを<ruby>回<rt class=ez>まわ</rt></ruby>せている。',
'tenpo-overportion':'<b>いみ</b> レシピで<ruby>決<rt class=ez>き</rt></ruby>めた<ruby>分量<rt>ぶんりょう</rt></ruby>（ポーション）より<ruby>多<rt class=ez>おお</rt></ruby>く<ruby>盛<rt>も</rt></ruby>ること。<br><b>なぜ<ruby>困<rt>こま</rt></ruby>る</b> <ruby>材料<rt>ざいりょう</rt></ruby>を<ruby>余分<rt>よぶん</rt></ruby>に<ruby>使<rt class=ez>つか</rt></ruby>うので<ruby>原価率<rt>げんかりつ</rt></ruby>が<ruby>上<rt class=ez>あ</rt></ruby>がり、<ruby>味<rt class=ez>あじ</rt></ruby>や<ruby>量<rt>りょう</rt></ruby>もばらつく。<br><b>ポイント</b> はかりや<ruby>専用<rt>せんよう</rt></ruby>の<ruby>道具<rt class=ez>どうぐ</rt></ruby>で<ruby>分量<rt>ぶんりょう</rt></ruby>を<ruby>一定<rt class=ez>いってい</rt></ruby>にする。',
'eisei-7gensoku':'<b>かたち</b> <ruby>手順<rt>てじゅん</rt></ruby>1〜5は「<ruby>準備<rt>じゅんび</rt></ruby>」、<ruby>手順<rt>てじゅん</rt></ruby>6〜12が「<ruby>原則<rt>げんそく</rt></ruby>1〜7」。<ruby>後半<rt class=ez>こうはん</rt></ruby>は<ruby>手順<rt>てじゅん</rt></ruby>と<ruby>原則<rt>げんそく</rt></ruby>が<ruby>一<rt class=ez>ひと</rt></ruby>つずつ<ruby>対応<rt>たいおう</rt></ruby>（<ruby>手順<rt>てじゅん</rt></ruby>6＝<ruby>原則<rt>げんそく</rt></ruby>1 … <ruby>手順<rt>てじゅん</rt></ruby>12＝<ruby>原則<rt>げんそく</rt></ruby>7）。<br><b>7<ruby>原則<rt>げんそく</rt></ruby></b> ①<ruby>危害要因分析<rt>きがいよういんぶんせき</rt></ruby> ②<ruby>重要管理点<rt>じゅうようかんりてん</rt></ruby> ③<ruby>管理基準<rt>かんりきじゅん</rt></ruby> ④モニタリング ⑤<ruby>改善措置<rt>かいぜんそち</rt></ruby> ⑥<ruby>検証<rt>けんしょう</rt></ruby> ⑦<ruby>記録<rt>きろく</rt></ruby>。<br><b>ポイント</b> 12<ruby>手順<rt>てじゅん</rt></ruby>は7<ruby>原則<rt>げんそく</rt></ruby>を<ruby>含<rt>ふく</rt></ruby>む“ひとつの<ruby>流<rt class=ez>なが</rt></ruby>れ”。バラバラに<ruby>覚<rt>おぼ</rt></ruby>えない。',
'eisei-kigaiyoin':'<b>3つの<ruby>種類<rt>しゅるい</rt></ruby></b> <ruby>生物的<rt>せいぶつてき</rt></ruby>（<ruby>細菌<rt>さいきん</rt></ruby>・ウイルス・<ruby>寄生虫<rt>きせいちゅう</rt></ruby>）／<ruby>化学的<rt>かがくてき</rt></ruby>（<ruby>洗剤<rt>せんざい</rt></ruby>・<ruby>農薬<rt class=ez>のうやく</rt></ruby>・ヒスタミン）／<ruby>物理的<rt>ぶつりてき</rt></ruby>（<ruby>金属<rt>きんぞく</rt></ruby>・ガラスなどの<ruby>異物<rt>いぶつ</rt></ruby>）。<br><b>ポイント</b> まずこの3つで「<ruby>何<rt class=ez>なに</rt></ruby>が<ruby>危<rt>あぶ</rt></ruby>ないか」を<ruby>洗<rt>あら</rt></ruby>い<ruby>出<rt class=ez>だ</rt></ruby>す。これがHACCPの<ruby>出発点<rt class=ez>しゅっぱつてん</rt></ruby>。',
'eisei-ha':'<b><ruby>原則<rt>げんそく</rt></ruby>1（<ruby>手順<rt>てじゅん</rt></ruby>6）</b> どの<ruby>工程<rt>こうてい</rt></ruby>に、どんな<ruby>危害要因<rt>きがいよういん</rt></ruby>があるかを<ruby>調<rt class=ez>しら</rt></ruby>べる。<br><b>れい</b> <ruby>鶏肉<rt>とりにく</rt></ruby>の<ruby>加熱<rt>かねつ</rt></ruby><ruby>不足<rt>ぶそく</rt></ruby>でカンピロバクターが<ruby>残<rt>のこ</rt></ruby>る、など。<br><b>ポイント</b> ここで<ruby>見<rt class=ez>み</rt></ruby>つけた<ruby>危険<rt>きけん</rt></ruby>から、<ruby>次<rt class=ez>つぎ</rt></ruby>のCCPを<ruby>決<rt class=ez>き</rt></ruby>める。',
'eisei-ccp':'<b><ruby>原則<rt>げんそく</rt></ruby>2（<ruby>手順<rt>てじゅん</rt></ruby>7）</b> <ruby>危険<rt>きけん</rt></ruby>を<ruby>特<rt>とく</rt></ruby>に<ruby>厳<rt>きび</rt></ruby>しく<ruby>管理<rt>かんり</rt></ruby>する<ruby>工程<rt>こうてい</rt></ruby>。<ruby>外食<rt class=ez>がいしょく</rt></ruby>ではふつう「<ruby>加熱<rt>かねつ</rt></ruby>」。<br><b>れい</b> ハンバーグを<ruby>中心<rt class=ez>ちゅうしん</rt></ruby>まで<ruby>火<rt class=ez>ひ</rt></ruby>を<ruby>通<rt class=ez>とお</rt></ruby>す<ruby>工程<rt>こうてい</rt></ruby>。<br><b>ポイント</b> ここを<ruby>守<rt class=ez>まも</rt></ruby>れば<ruby>危険<rt>きけん</rt></ruby>を<ruby>十分<rt class=ez>じゅうぶん</rt></ruby>に<ruby>減<rt>へ</rt></ruby>らせる、という<ruby>急所<rt class=ez>きゅうしょ</rt></ruby>。',
'eisei-cl':'<b><ruby>原則<rt>げんそく</rt></ruby>3（<ruby>手順<rt>てじゅん</rt></ruby>8）</b> CCPで<ruby>守<rt class=ez>まも</rt></ruby>る<ruby>数字<rt class=ez>すうじ</rt></ruby>の<ruby>基準<rt>きじゅん</rt></ruby>。<br><b>れい</b> 「<ruby>中心<rt class=ez>ちゅうしん</rt></ruby><ruby>温度<rt class=ez>おんど</rt></ruby>75℃で1<ruby>分<rt class=ez>ぷん</rt></ruby><ruby>以上<rt>いじょう</rt></ruby>」。<br><b>ポイント</b> <ruby>数字<rt class=ez>すうじ</rt></ruby>で<ruby>決<rt class=ez>き</rt></ruby>めるから、<ruby>誰<rt>だれ</rt></ruby>でも<ruby>同<rt class=ez>おな</rt></ruby>じ<ruby>判断<rt>はんだん</rt></ruby>ができる。',
'eisei-monitoring':'<b><ruby>原則<rt>げんそく</rt></ruby>4（<ruby>手順<rt>てじゅん</rt></ruby>9）</b> <ruby>管理基準<rt>かんりきじゅん</rt></ruby>を<ruby>守<rt class=ez>まも</rt></ruby>れているか、いつも<ruby>確<rt>たし</rt></ruby>かめて<ruby>記録<rt>きろく</rt></ruby>する。<br><b>れい</b> <ruby>中心<rt class=ez>ちゅうしん</rt></ruby><ruby>温度<rt class=ez>おんど</rt></ruby>を<ruby>温度計<rt class=ez>おんどけい</rt></ruby>で<ruby>毎回<rt class=ez>まいかい</rt></ruby><ruby>測<rt>はか</rt></ruby>って<ruby>記録<rt>きろく</rt></ruby>する。<br><b>ポイント</b> 「やったつもり」を<ruby>防<rt>ふせ</rt></ruby>ぐ。<ruby>記録<rt>きろく</rt></ruby>に<ruby>残<rt>のこ</rt></ruby>すまでがモニタリング。',
'eisei-kaizensochi':'<b><ruby>原則<rt>げんそく</rt></ruby>5（<ruby>手順<rt>てじゅん</rt></ruby>10）</b> <ruby>管理基準<rt>かんりきじゅん</rt></ruby>を<ruby>外<rt class=ez>はず</rt></ruby>れたときの<ruby>対応<rt>たいおう</rt></ruby>を、<ruby>前<rt class=ez>まえ</rt></ruby>もって<ruby>決<rt class=ez>き</rt></ruby>めておく。<br><b>れい</b> <ruby>加熱<rt>かねつ</rt></ruby>が<ruby>足<rt class=ez>た</rt></ruby>りなければ「もう<ruby>一度<rt class=ez>いちど</rt></ruby><ruby>加熱<rt>かねつ</rt></ruby>」「その<ruby>商品<rt class=ez>しょうひん</rt></ruby>は<ruby>出<rt class=ez>だ</rt></ruby>さない」。<br><b>ポイント</b> <ruby>慌<rt>あわ</rt></ruby>てないように<ruby>手順<rt>てじゅん</rt></ruby>を<ruby>用意<rt class=ez>ようい</rt></ruby>しておく。',
'eisei-kensho':'<b><ruby>原則<rt>げんそく</rt></ruby>6（<ruby>手順<rt>てじゅん</rt></ruby>11）</b> <ruby>計画<rt class=ez>けいかく</rt></ruby>どおり<ruby>正<rt class=ez>ただ</rt></ruby>しくできているか、ときどき<ruby>点検<rt>てんけん</rt></ruby>する。<br><b>れい</b> <ruby>記録<rt>きろく</rt></ruby>を<ruby>見直<rt class=ez>みなお</rt></ruby>す／<ruby>温度計<rt class=ez>おんどけい</rt></ruby>が<ruby>正<rt class=ez>ただ</rt></ruby>しいか<ruby>確<rt>たし</rt></ruby>かめる。<br><b>ポイント</b> モニタリングは「<ruby>毎回<rt class=ez>まいかい</rt></ruby>」、<ruby>検証<rt>けんしょう</rt></ruby>は「<ruby>計画<rt class=ez>けいかく</rt></ruby><ruby>全体<rt class=ez>ぜんたい</rt></ruby>の<ruby>見直<rt class=ez>みなお</rt></ruby>し」。',
'eisei-kiroku':'<b><ruby>原則<rt>げんそく</rt></ruby>7（<ruby>手順<rt>てじゅん</rt></ruby>12）</b> いつ・<ruby>何<rt class=ez>なん</rt></ruby>℃で・<ruby>何分<rt class=ez>なんぷん</rt></ruby><ruby>加熱<rt>かねつ</rt></ruby>したか、などを<ruby>書<rt class=ez>か</rt></ruby>いて<ruby>残<rt>のこ</rt></ruby>す。<br><b>れい</b> <ruby>温度<rt class=ez>おんど</rt></ruby><ruby>記録表<rt>きろくひょう</rt></ruby>・<ruby>清掃<rt>せいそう</rt></ruby>チェック<ruby>表<rt class=ez>ひょう</rt></ruby>。<br><b>ポイント</b> <ruby>記録<rt>きろく</rt></ruby>は「やった<ruby>証拠<rt>しょうこ</rt></ruby>」。<ruby>後<rt class=ez>あと</rt></ruby>で<ruby>原因<rt>げんいん</rt></ruby>を<ruby>探<rt>さが</rt></ruby>せる。',
'eisei-campylo':'<b><ruby>原因<rt>げんいん</rt></ruby></b> <ruby>生<rt class=ez>なま</rt></ruby>や<ruby>半生<rt class=ez>はんなま</rt></ruby>の<ruby>鶏肉<rt>とりにく</rt></ruby>・<ruby>鶏<rt>とり</rt></ruby>レバーが<ruby>多<rt class=ez>おお</rt></ruby>い。<ruby>市販<rt>しはん</rt></ruby>の<ruby>鶏肉<rt>とりにく</rt></ruby>は<ruby>菌<rt>きん</rt></ruby>がついていることが<ruby>多<rt class=ez>おお</rt></ruby>く、<ruby>調理器具<rt>ちょうりきぐ</rt></ruby>からの<ruby>二次汚染<rt>にじおせん</rt></ruby>でもおこります。<br><b><ruby>症状<rt>しょうじょう</rt></ruby></b> <ruby>食<rt class=ez>た</rt></ruby>べてから2〜3<ruby>日後<rt class=ez>にちご</rt></ruby>（<ruby>少<rt class=ez>すこ</rt></ruby>し<ruby>長<rt class=ez>なが</rt></ruby>め）に<ruby>腹痛<rt>ふくつう</rt></ruby>・<ruby>下痢<rt>げり</rt></ruby>・<ruby>発熱<rt>はつねつ</rt></ruby>・<ruby>吐<rt>は</rt></ruby>き<ruby>気<rt class=ez>け</rt></ruby>。まれに<ruby>手足<rt class=ez>てあし</rt></ruby>がしびれるギラン・バレー<ruby>症候群<rt>しょうこうぐん</rt></ruby>につながることがあります。<br><b><ruby>予防<rt>よぼう</rt></ruby></b> <ruby>中心<rt class=ez>ちゅうしん</rt></ruby>を75℃<ruby>以上<rt>いじょう</rt></ruby>で1<ruby>分<rt class=ez>ぷん</rt></ruby><ruby>以上<rt>いじょう</rt></ruby><ruby>加熱<rt>かねつ</rt></ruby>する。<ruby>生肉<rt class=ez>なまにく</rt></ruby><ruby>用<rt class=ez>よう</rt></ruby>の<ruby>器具<rt>きぐ</rt></ruby>を<ruby>分<rt class=ez>わ</rt></ruby>け、さわった<ruby>手<rt class=ez>て</rt></ruby>はよく<ruby>洗<rt>あら</rt></ruby>う。<ruby>冷蔵<rt>れいぞう</rt></ruby>・<ruby>冷凍<rt>れいとう</rt></ruby>では<ruby>死<rt class=ez>し</rt></ruby>なないが<ruby>熱<rt>ねつ</rt></ruby>に<ruby>弱<rt class=ez>よわ</rt></ruby>い。',
'eisei-salmonella':'<b><ruby>原因<rt>げんいん</rt></ruby></b> <ruby>加熱<rt>かねつ</rt></ruby><ruby>不足<rt>ぶそく</rt></ruby>の<ruby>食肉<rt class=ez>しょくにく</rt></ruby>や<ruby>鶏卵<rt>けいらん</rt></ruby>（とくに<ruby>生卵<rt>なまたまご</rt></ruby>）、その<ruby>加工品<rt>かこうひん</rt></ruby>。<ruby>乾燥<rt>かんそう</rt></ruby>に<ruby>強<rt class=ez>つよ</rt></ruby>く、ネズミやペットからもうつります。<br><b><ruby>症状<rt>しょうじょう</rt></ruby></b> <ruby>食<rt class=ez>た</rt></ruby>べてから12〜48<ruby>時間<rt class=ez>じかん</rt></ruby>で<ruby>吐<rt>は</rt></ruby>き<ruby>気<rt class=ez>け</rt></ruby>・<ruby>嘔吐<rt>おうと</rt></ruby>・<ruby>腹痛<rt>ふくつう</rt></ruby>・<ruby>下痢<rt>げり</rt></ruby>、やや<ruby>高<rt class=ez>たか</rt></ruby>い<ruby>熱<rt>ねつ</rt></ruby>。<ruby>脱水<rt>だっすい</rt></ruby>に<ruby>注意<rt class=ez>ちゅうい</rt></ruby>。<ruby>子<rt class=ez>こ</rt></ruby>どもや<ruby>高齢者<rt>こうれいしゃ</rt></ruby>は<ruby>重<rt class=ez>おも</rt></ruby>くなりやすい。<br><b><ruby>予防<rt>よぼう</rt></ruby></b> <ruby>卵<rt>たまご</rt></ruby>・<ruby>肉<rt class=ez>にく</rt></ruby>は<ruby>十分<rt class=ez>じゅうぶん</rt></ruby>に<ruby>加熱<rt>かねつ</rt></ruby>（<ruby>割<rt>わ</rt></ruby>った<ruby>卵<rt>たまご</rt></ruby>はすぐ<ruby>使<rt class=ez>つか</rt></ruby>う）。<ruby>器具<rt>きぐ</rt></ruby>と<ruby>手<rt class=ez>て</rt></ruby>を<ruby>洗<rt>あら</rt></ruby>って<ruby>消毒<rt>しょうどく</rt></ruby>し、<ruby>二次汚染<rt>にじおせん</rt></ruby>を<ruby>防<rt>ふせ</rt></ruby>ぐ。ネズミ・ゴキブリを<ruby>入<rt class=ez>い</rt></ruby>れない。',

'eisei-vibrio':'<b><ruby>原因<rt>げんいん</rt></ruby></b> <ruby>海<rt class=ez>うみ</rt></ruby>の<ruby>中<rt class=ez>なか</rt></ruby>・<ruby>海産<rt>かいさん</rt></ruby>の<ruby>魚介類<rt>ぎょかいるい</rt></ruby>にいる。<ruby>塩<rt>しお</rt></ruby>を<ruby>好<rt>この</rt></ruby>み（<ruby>好塩菌<rt>こうえんきん</rt></ruby>）、<ruby>真水<rt class=ez>まみず</rt></ruby>に<ruby>弱<rt class=ez>よわ</rt></ruby>い。<ruby>増<rt>ふ</rt></ruby>えるのがとても<ruby>速<rt class=ez>はや</rt></ruby>く、<ruby>夏<rt class=ez>なつ</rt></ruby>に<ruby>多<rt class=ez>おお</rt></ruby>い。<ruby>刺身<rt>さしみ</rt></ruby>など<ruby>生<rt class=ez>なま</rt></ruby>の<ruby>魚介<rt>ぎょかい</rt></ruby>、<ruby>二次汚染<rt>にじおせん</rt></ruby>。<br><b><ruby>症状<rt>しょうじょう</rt></ruby></b> 8〜24<ruby>時間後<rt class=ez>じかんご</rt></ruby>（<ruby>短<rt class=ez>みじか</rt></ruby>いと2〜3<ruby>時間<rt class=ez>じかん</rt></ruby>）に<ruby>激<rt>はげ</rt></ruby>しい<ruby>腹痛<rt>ふくつう</rt></ruby>・<ruby>水<rt class=ez>みず</rt></ruby>のような<ruby>下痢<rt>げり</rt></ruby>、<ruby>吐<rt>は</rt></ruby>き<ruby>気<rt class=ez>け</rt></ruby>・<ruby>嘔吐<rt>おうと</rt></ruby>・<ruby>発熱<rt>はつねつ</rt></ruby>。<br><b><ruby>予防<rt>よぼう</rt></ruby></b> <ruby>魚介<rt>ぎょかい</rt></ruby>は<ruby>真水<rt class=ez>まみず</rt></ruby>でよく<ruby>洗<rt>あら</rt></ruby>う。4〜5℃<ruby>以下<rt>いか</rt></ruby>の<ruby>低温<rt>ていおん</rt></ruby>で<ruby>保存<rt>ほぞん</rt></ruby>（<ruby>買<rt class=ez>か</rt></ruby>い<ruby>物<rt class=ez>もの</rt></ruby>は<ruby>最後<rt>さいご</rt></ruby>・<ruby>保冷<rt>ほれい</rt></ruby>して<ruby>持<rt class=ez>も</rt></ruby>ち<ruby>帰<rt class=ez>かえ</rt></ruby>る）。<ruby>十分<rt class=ez>じゅうぶん</rt></ruby>に<ruby>加熱<rt>かねつ</rt></ruby>。<ruby>器具<rt>きぐ</rt></ruby>を<ruby>洗<rt>あら</rt></ruby>って<ruby>二次汚染<rt>にじおせん</rt></ruby>を<ruby>防<rt>ふせ</rt></ruby>ぐ。',

'eisei-botulinus':'<b><ruby>原因<rt>げんいん</rt></ruby></b> <ruby>土<rt class=ez>つち</rt></ruby>・<ruby>海<rt class=ez>うみ</rt></ruby>や<ruby>川<rt class=ez>かわ</rt></ruby>の<ruby>泥<rt>どろ</rt></ruby>にいる。<ruby>酸素<rt>さんそ</rt></ruby>のないところで<ruby>増<rt>ふ</rt></ruby>え、<ruby>強<rt class=ez>つよ</rt></ruby>い<ruby>神経毒<rt>しんけいどく</rt></ruby>を<ruby>作<rt class=ez>つく</rt></ruby>る。<ruby>缶詰<rt>かんづめ</rt></ruby>・びん<ruby>詰<rt>づ</rt></ruby>め・<ruby>真空<rt class=ez>しんくう</rt></ruby>パック・<ruby>発酵<rt>はっこう</rt></ruby><ruby>食品<rt class=ez>しょくひん</rt></ruby>（いずし）の<ruby>常温<rt>じょうおん</rt></ruby><ruby>放置<rt>ほうち</rt></ruby>。1<ruby>歳<rt>さい</rt></ruby><ruby>未満<rt>みまん</rt></ruby>の<ruby>乳児<rt>にゅうじ</rt></ruby>ははちみつ（<ruby>乳児<rt>にゅうじ</rt></ruby>ボツリヌス<ruby>症<rt>しょう</rt></ruby>）。<br><b><ruby>症状<rt>しょうじょう</rt></ruby></b> 8〜36<ruby>時間後<rt class=ez>じかんご</rt></ruby>に<ruby>脱力<rt>だつりょく</rt></ruby>・めまい・<ruby>物<rt class=ez>もの</rt></ruby>が<ruby>二重<rt class=ez>にじゅう</rt></ruby>に<ruby>見<rt class=ez>み</rt></ruby>える・<ruby>飲<rt class=ez>の</rt></ruby>み<ruby>込<rt>こ</rt></ruby>みにくい・<ruby>呼吸<rt>こきゅう</rt></ruby><ruby>困難<rt>こんなん</rt></ruby>など<ruby>神経<rt>しんけい</rt></ruby>の<ruby>症状<rt>しょうじょう</rt></ruby>。<ruby>死亡率<rt>しぼうりつ</rt></ruby>が<ruby>高<rt class=ez>たか</rt></ruby>い。<br><b><ruby>予防<rt>よぼう</rt></ruby></b> 1<ruby>歳<rt>さい</rt></ruby><ruby>未満<rt>みまん</rt></ruby>にはちみつを<ruby>与<rt>あた</rt></ruby>えない。<ruby>膨<rt>ふく</rt></ruby>らんだ・<ruby>変<rt>へん</rt></ruby>なにおいの<ruby>密封<rt>みっぷう</rt></ruby><ruby>食品<rt class=ez>しょくひん</rt></ruby>は<ruby>食<rt class=ez>た</rt></ruby>べない。「<ruby>要冷蔵<rt>ようれいぞう</rt></ruby>」は10℃<ruby>以下<rt>いか</rt></ruby>で<ruby>保存<rt>ほぞん</rt></ruby>。<ruby>毒素<rt>どくそ</rt></ruby>は<ruby>熱<rt>ねつ</rt></ruby>に<ruby>弱<rt class=ez>よわ</rt></ruby>いので、<ruby>加熱<rt>かねつ</rt></ruby>できるものは<ruby>食<rt class=ez>た</rt></ruby>べる<ruby>前<rt class=ez>まえ</rt></ruby>に<ruby>十分<rt class=ez>じゅうぶん</rt></ruby><ruby>加熱<rt>かねつ</rt></ruby>。',
'eisei-anisakis':'<b><ruby>原因<rt>げんいん</rt></ruby></b> <ruby>寄生虫<rt>きせいちゅう</rt></ruby>（<ruby>線虫<rt class=ez>せんちゅう</rt></ruby>、2〜3cmの<ruby>白<rt class=ez>しろ</rt></ruby>い<ruby>糸状<rt>いとじょう</rt></ruby>）。サバ・アジ・サンマ・カツオ・イワシ・サケ・イカなどの<ruby>生食<rt class=ez>なましょく</rt></ruby>。<ruby>内臓<rt>ないぞう</rt></ruby>にいて、<ruby>鮮度<rt>せんど</rt></ruby>が<ruby>落<rt class=ez>お</rt></ruby>ちると<ruby>筋肉<rt>きんにく</rt></ruby>に<ruby>移<rt>うつ</rt></ruby>る。<br><b><ruby>症状<rt>しょうじょう</rt></ruby></b> <ruby>食<rt class=ez>た</rt></ruby>べて<ruby>数時間後<rt class=ez>すうじかんご</rt></ruby>に、<ruby>胃<rt>い</rt></ruby>や<ruby>腸<rt>ちょう</rt></ruby>の<ruby>壁<rt>かべ</rt></ruby>に<ruby>刺<rt>さ</rt></ruby>さって<ruby>激<rt>はげ</rt></ruby>しい<ruby>腹痛<rt>ふくつう</rt></ruby>。アレルギーが<ruby>出<rt class=ez>で</rt></ruby>ることもある。<br><b><ruby>予防<rt>よぼう</rt></ruby></b> <ruby>加熱<rt>かねつ</rt></ruby>（70℃<ruby>以上<rt>いじょう</rt></ruby>、または60℃で1<ruby>分<rt class=ez>ぷん</rt></ruby>）か<ruby>冷凍<rt>れいとう</rt></ruby>（-20℃で24<ruby>時間<rt class=ez>じかん</rt></ruby><ruby>以上<rt>いじょう</rt></ruby>）で<ruby>死<rt class=ez>し</rt></ruby>ぬ。<ruby>新<rt class=ez>あたら</rt></ruby>しい<ruby>魚<rt class=ez>さかな</rt></ruby>を<ruby>選<rt>えら</rt></ruby>び<ruby>内臓<rt>ないぞう</rt></ruby>を<ruby>早<rt class=ez>はや</rt></ruby>く<ruby>取<rt class=ez>と</rt></ruby>る・<ruby>目<rt class=ez>め</rt></ruby>で<ruby>見<rt class=ez>み</rt></ruby>て<ruby>取<rt class=ez>と</rt></ruby>り<ruby>除<rt>のぞ</rt></ruby>く。<ruby>酢<rt>す</rt></ruby>・<ruby>塩<rt>しお</rt></ruby>・しょうゆ・わさびでは<ruby>死<rt class=ez>し</rt></ruby>なない。',
'eisei-hepatitisE':'<b><ruby>原因<rt>げんいん</rt></ruby></b> <ruby>豚<rt>ぶた</rt></ruby>・イノシシ・シカの<ruby>肉<rt class=ez>にく</rt></ruby>や<ruby>内臓<rt>ないぞう</rt></ruby>（とくに<ruby>豚<rt>ぶた</rt></ruby>レバー）の<ruby>生<rt class=ez>なま</rt></ruby>・<ruby>加熱<rt>かねつ</rt></ruby><ruby>不足<rt>ぶそく</rt></ruby>。<ruby>生<rt class=ez>なま</rt></ruby>の<ruby>豚肉<rt>ぶたにく</rt></ruby>・<ruby>内臓<rt>ないぞう</rt></ruby>は<ruby>法律<rt>ほうりつ</rt></ruby>で<ruby>生食用<rt class=ez>なましょくよう</rt></ruby>の<ruby>販売<rt>はんばい</rt></ruby>が<ruby>禁止<rt>きんし</rt></ruby>。<br><b><ruby>症状<rt>しょうじょう</rt></ruby></b> <ruby>平均<rt>へいきん</rt></ruby>6<ruby>週間<rt class=ez>しゅうかん</rt></ruby>（<ruby>長<rt class=ez>なが</rt></ruby>い）<ruby>後<rt class=ez>ご</rt></ruby>に<ruby>発熱<rt>はつねつ</rt></ruby>・<ruby>吐<rt>は</rt></ruby>き<ruby>気<rt class=ez>け</rt></ruby>・<ruby>腹痛<rt>ふくつう</rt></ruby>・<ruby>黄疸<rt>おうだん</rt></ruby>など。<ruby>肝臓<rt>かんぞう</rt></ruby>が<ruby>悪<rt class=ez>わる</rt></ruby>くなる。<ruby>劇症化<rt>げきしょうか</rt></ruby>すると<ruby>命<rt class=ez>いのち</rt></ruby>に<ruby>関<rt>かか</rt></ruby>わり、<ruby>妊婦<rt>にんぷ</rt></ruby>は<ruby>重<rt class=ez>おも</rt></ruby>くなりやすい。<br><b><ruby>予防<rt>よぼう</rt></ruby></b> <ruby>中心<rt class=ez>ちゅうしん</rt></ruby>まで<ruby>十分<rt class=ez>じゅうぶん</rt></ruby><ruby>加熱<rt>かねつ</rt></ruby>（<ruby>中心<rt class=ez>ちゅうしん</rt></ruby>63℃で30<ruby>分<rt class=ez>ぷん</rt></ruby>、または75℃で1<ruby>分<rt class=ez>ぷん</rt></ruby><ruby>以上<rt>いじょう</rt></ruby>）。<ruby>生<rt class=ez>なま</rt></ruby>で<ruby>食<rt class=ez>た</rt></ruby>べない。<ruby>生肉<rt class=ez>なまにく</rt></ruby>をさわった<ruby>手<rt class=ez>て</rt></ruby>・<ruby>器具<rt>きぐ</rt></ruby>をよく<ruby>洗<rt>あら</rt></ruby>い、<ruby>二次汚染<rt>にじおせん</rt></ruby>を<ruby>防<rt>ふせ</rt></ruby>ぐ。',
'tenpo-uriagedaka':'<b><ruby>意味<rt class=ez>いみ</rt></ruby></b> お<ruby>店<rt class=ez>みせ</rt></ruby>が<ruby>商品<rt class=ez>しょうひん</rt></ruby>やサービスを<ruby>売<rt class=ez>う</rt></ruby>って<ruby>受<rt class=ez>う</rt></ruby>け<ruby>取<rt class=ez>と</rt></ruby>ったお<ruby>金<rt class=ez>かね</rt></ruby>の<ruby>合計<rt class=ez>ごうけい</rt></ruby>（<ruby>費用<rt>ひよう</rt></ruby>を<ruby>引<rt class=ez>ひ</rt></ruby>く<ruby>前<rt class=ez>まえ</rt></ruby>）。<br><b>ポイント</b> すべての<ruby>計算<rt class=ez>けいさん</rt></ruby>の<ruby>出発点<rt class=ez>しゅっぱつてん</rt></ruby>。<ruby>原価率<rt>げんかりつ</rt></ruby>・FL<ruby>比率<rt>ひりつ</rt></ruby>・<ruby>客単価<rt>きゃくたんか</rt></ruby>などは、この<ruby>売上高<rt class=ez>うりあげだか</rt></ruby>をもとに<ruby>考<rt class=ez>かんが</rt></ruby>える。',

/* ===== 本番通し模試：学科35（用語4択）＋実技20（状況判断・各分野5）＝55問。本番準拠でルビなし・合格65%。
   ※各問に tag(学科/実技)・cat を持たせており、将来の配点準拠採点(2a)を後乗せできる形 ===== */
function fmOpts(d){
 var picked=[], used={}; used[d.id]=1;
 var conf=shuffle((CONFUSE[d.id]||[]).slice());
 for(var i=0;i<conf.length && picked.length<3;i++){ var c=byId(conf[i]); if(c && !used[c.id]){ picked.push(c); used[c.id]=1; } }
 var pool=shuffle(listOf(d.category).filter(function(x){return !used[x.id];}));
 for(var j=0;j<pool.length && picked.length<3;j++){ picked.push(pool[j]); used[pool[j].id]=1; }
 if(picked.length<3){ var all=shuffle(VOCAB.filter(function(x){return !used[x.id];}));
   for(var k=0;k<all.length && picked.length<3;k++){ picked.push(all[k]); used[all[k].id]=1; } }
 return shuffle(picked.concat([d]));
}

 S.honban=true; S.beginner=false; S.furigana=false;

 var gakka=[];
 plan.forEach(function(p){ shuffle(listOf(p[0])).slice(0,p[1]).forEach(function(d){
   gakka.push({type:'vocab', d:d, dir:(Math.random()<0.5?'m':'t'), opts:fmOpts(d), tag:'学科', cat:d.category}); }); });
 gakka=shuffle(gakka);
 var jdom=[['衛生',3],['調理',3],['接客',3],['店舗',3]];
 var jitsugi=[];
 jdom.forEach(function(p){ shuffle(SITU.filter(function(x){return x.cat===p[0];})).slice(0,p[1]).forEach(function(it){
   jitsugi.push({type:'situ', it:it, tag:'実技', cat:it.cat}); }); });
 for(var ci=0; ci<8; ci++){ var cf=pick(FORMULAS); var cp=(cf.rev && Math.random()<0.5)?cf.rev():cf.gen(); if(!cp.unit)cp.unit=cf.unit; jitsugi.push({type:'calc', f:cf, p:cp, tag:'実技', cat:'計算'}); }
 jitsugi=shuffle(jitsugi);
 var items=gakka.concat(jitsugi);
 S.fmock={items:items, i:0, score:0, wrong:[], picked:null, answers:items.map(function(){return -1;}), remain:70*60, timerId:null};

function fmtClock(s){ if(s<0)s=0; var mm=Math.floor(s/60), ss=s%60; return mm+':'+(ss<10?'0':'')+ss; }

   m.remain--; var el=document.getElementById('mtimer'); if(el){ el.textContent=fmtClock(m.remain); if(m.remain<=120) el.style.color='#E8743B'; }
   if(m.remain<=0){ stopMockTimer(); submitFullMock(); }
 },1000); }
function stopMockTimer(){ if(S.fmock && S.fmock.timerId){ clearInterval(S.fmock.timerId); S.fmock.timerId=null; } }

 m.items.forEach(function(it,ix){ var a=m.answers[ix]; var correct;
   if(it.type==='vocab') correct = (typeof a==='number' && a>=0 && it.opts[a].id===it.d.id);

   if(correct) m.score++; else m.wrong.push(it); });

function buildQ(){
 var q=S.quiz, d=q.qs[q.i];
 var dir=Math.random()<0.5?'m':'t';
 var picked=[], used={}; used[d.id]=1;
 var conf=shuffle((CONFUSE[d.id]||[]).slice());
 for(var i=0;i<conf.length && picked.length<3;i++){ var c=byId(conf[i]); if(c && !used[c.id]){ picked.push(c); used[c.id]=1; } }
 var pool=shuffle(listOf(d.category).filter(function(x){return !used[x.id];}));
 for(var j=0;j<pool.length && picked.length<3;j++){ picked.push(pool[j]); used[pool[j].id]=1; }
 if(picked.length<3){ var all=shuffle(VOCAB.filter(function(x){return !used[x.id];}));
   for(var k=0;k<all.length && picked.length<3;k++){ picked.push(all[k]); used[all[k].id]=1; } }
 q.dir=dir; q.opts=shuffle(picked.concat([d])); q.answered=false; q.picked=null;
}
function quizScreen(){
 var q=S.quiz, d=q.qs[q.i], pct=Math.round(q.i/q.qs.length*100);
 var qk=q.dir==='m'?'この<ruby>言葉<rt>ことば</rt></ruby>の<ruby>意味<rt class=ez>いみ</rt></ruby>は？':'この<ruby>意味<rt class=ez>いみ</rt></ruby>の<ruby>言葉<rt>ことば</rt></ruby>は？';
 var stem=q.dir==='m'?'<div class="qt">'+d.term+'</div>':'<div class="qt sm">'+maskTerm(d.meaning,d.term)+'</div>';
 var opts=q.opts.map(function(o){
   var label=q.dir==='m'?maskTerm(o.meaning,d.term):o.term;
   var cls='opt';
   if(q.answered){ if(o.id===d.id)cls+=' correct'; else if(o.id===q.picked)cls+=' wrong'; else cls+=' dim'; }
   return '<button class="'+cls+'" '+(q.answered?'disabled':'')+' onclick="answer(\''+o.id+'\')">'+label+'</button>';
 }).join('');
 var foot=q.answered?'<button class="btn p" onclick="nextQ()">'+(q.i===q.qs.length-1?'<ruby>結果<rt>けっか</rt></ruby>を<ruby>見<rt class=ez>み</rt></ruby>る':'<ruby>次<rt class=ez>つぎ</rt></ruby>の<ruby>問題<rt class=ez>もんだい</rt></ruby> ›')+'</button>':'';
 app.innerHTML=fheader()+
  '<button class="back" onclick="quitQuiz()">‹ やめる</button>'+
  '<div class="prog"><i style="width:'+pct+'%"></i></div>'+
  '<div class="count"><ruby>問題<rt class=ez>もんだい</rt></ruby> '+(q.i+1)+' / '+q.qs.length+'　・<ruby>正解<rt>せいかい</rt></ruby> '+q.score+'</div>'+
  '<div class="q-card"><div class="qk">'+qk+'</div>'+stem+'<div class="opts">'+opts+'</div><div class="q-foot">'+foot+'</div></div>';
}
function answer(id){
 var q=S.quiz; if(q.answered)return; q.answered=true; q.picked=id;
 var d=q.qs[q.i]; var ok=(id===d.id); if(ok)q.score++; else q.wrong.push(d);
 recQuiz(d.category, d.id, ok);
 quizScreen();
}
function nextQ(){var q=S.quiz; if(q.i===q.qs.length-1){endSession(P.quiz); restoreMock(); S.screen='result';render();return;} q.i++; buildQ(); quizScreen();}

function resetCalc(){CALC={disp:'0',acc:null,op:null,fresh:true};}

 return '<div class="calcwrap"><button class="calctoggle" onclick="S.drill.calcOpen=!S.drill.calcOpen;drillScreen()">🧮 電卓を '+(d.calcOpen?'<ruby>閉<rt>と</rt></ruby>じる':'<ruby>開<rt class=ez>ひら</rt></ruby>く')+'</button>'+

   '<button class="clr" onclick="cClr()">C</button><button class="op" onclick="cOp(\'/\')">÷</button><button class="op" onclick="cOp(\'*\')">×</button><button class="op" onclick="cBack()">⌫</button>'+
   '<button onclick="cDig(\'7\')">7</button><button onclick="cDig(\'8\')">8</button><button onclick="cDig(\'9\')">9</button><button class="op" onclick="cOp(\'-\')">−</button>'+

  '</div><div class="hint">本番と同じ：たす・ひく・かける・<ruby>割<rt>わ</rt></ruby>るだけ</div></div></div>';

function cShow(){var e=document.getElementById('cdisp'); if(e)e.textContent=CALC.disp;}
function cDig(x){if(CALC.fresh){CALC.disp=(x==='.'?'0.':x); CALC.fresh=false;}
 else{if(x==='.'&&CALC.disp.indexOf('.')>-1)return; CALC.disp=(CALC.disp==='0'&&x!=='.')?x:CALC.disp+x;} cShow();}
function cApply(){var b=Number(CALC.disp); if(CALC.op==null||CALC.acc==null)return b; var a=CALC.acc;
 var r=CALC.op==='+'?a+b:CALC.op==='-'?a-b:CALC.op==='*'?a*b:(b===0?NaN:a/b); return trim(r);}
function cOp(o){if(CALC.acc==null){CALC.acc=Number(CALC.disp);}else if(!CALC.fresh){CALC.acc=cApply();}
 CALC.op=o; CALC.fresh=true; CALC.disp=String(isNaN(CALC.acc)?'エラー':CALC.acc); cShow();}
function cEq(){if(CALC.op==null)return; var r=cApply(); CALC.disp=String(isNaN(r)?'エラー':r); CALC.acc=null; CALC.op=null; CALC.fresh=true; cShow();}
function cClr(){resetCalc(); cShow();}
function cBack(){if(CALC.fresh)return; CALC.disp=CALC.disp.length>1?CALC.disp.slice(0,-1):'0'; cShow();}

  choices:['<ruby>常温<rt>じょうおん</rt></ruby>に<ruby>出<rt class=ez>だ</rt></ruby>しておく','<ruby>冷蔵庫<rt>れいぞうこ</rt></ruby>でゆっくり<ruby>溶<rt>と</rt></ruby>かす','お<ruby>湯<rt class=ez>ゆ</rt></ruby>に<ruby>付<rt>つ</rt></ruby>ける','<ruby>窓際<rt>まどぎわ</rt></ruby>に<ruby>置<rt>お</rt></ruby>く'], ans:1,
  exp:'<ruby>解凍<rt>かいとう</rt></ruby>は<ruby>冷蔵庫<rt>れいぞうこ</rt></ruby>でゆっくりが<ruby>安全<rt class=ez>あんぜん</rt></ruby>。<ruby>常温<rt>じょうおん</rt></ruby>は<ruby>菌<rt>きん</rt></ruby>が<ruby>増<rt>ふ</rt></ruby>えやすいです。', src:'飲食物調理テキスト'},
 {cat:'調理', scene:'<ruby>揚<rt>あ</rt></ruby>げ<ruby>物<rt class=ez>もの</rt></ruby>の<ruby>中<rt class=ez>なか</rt></ruby>まで<ruby>火<rt class=ez>ひ</rt></ruby>が<ruby>通<rt class=ez>とお</rt></ruby>ったか<ruby>確<rt>たし</rt></ruby>かめたい。', q:'<ruby>正<rt class=ez>ただ</rt></ruby>しい<ruby>方法<rt>ほうほう</rt></ruby>は？',
  choices:['<ruby>見<rt class=ez>み</rt></ruby>た<ruby>目<rt class=ez>め</rt></ruby>だけ','<ruby>中心温度計<rt class=ez>ちゅうしんおんどけい</rt></ruby>でまん<ruby>中<rt class=ez>なか</rt></ruby>の<ruby>温度<rt class=ez>おんど</rt></ruby>を<ruby>測<rt>はか</rt></ruby>る','<ruby>時間<rt class=ez>じかん</rt></ruby>だけ','におい'], ans:1,
  exp:'<ruby>中心温度計<rt class=ez>ちゅうしんおんどけい</rt></ruby>＝<ruby>食<rt class=ez>た</rt></ruby>べ<ruby>物<rt class=ez>もの</rt></ruby>のまん<ruby>中<rt class=ez>なか</rt></ruby>の<ruby>温度<rt class=ez>おんど</rt></ruby>を<ruby>測<rt>はか</rt></ruby>る<ruby>道具<rt class=ez>どうぐ</rt></ruby>です。', src:'飲食物調理テキスト'},
 {cat:'調理', scene:'フグを<ruby>調理<rt class=ez>ちょうり</rt></ruby>して<ruby>出<rt class=ez>だ</rt></ruby>します。', q:'<ruby>調理<rt class=ez>ちょうり</rt></ruby>できるのは？',
  choices:['<ruby>誰<rt>だれ</rt></ruby>でも','<ruby>資格<rt>しかく</rt></ruby>を<ruby>持<rt class=ez>も</rt></ruby>ったフグ<ruby>処理者<rt>しょりしゃ</rt></ruby>','<ruby>店長<rt class=ez>てんちょう</rt></ruby>','<ruby>経験<rt>けいけん</rt></ruby>があれば<ruby>誰<rt>だれ</rt></ruby>でも'], ans:1,
  exp:'フグは<ruby>毒<rt>どく</rt></ruby>があり、<ruby>資格<rt>しかく</rt></ruby>を<ruby>持<rt class=ez>も</rt></ruby>ったフグ<ruby>処理者<rt>しょりしゃ</rt></ruby>だけが<ruby>安全<rt class=ez>あんぜん</rt></ruby>に<ruby>調理<rt class=ez>ちょうり</rt></ruby>できます。', src:'飲食物調理テキスト'},
 {cat:'調理', scene:'<ruby>揚<rt>あ</rt></ruby>げ<ruby>油<rt class=ez>あぶら</rt></ruby>を<ruby>何度<rt class=ez>なんど</rt></ruby>も<ruby>使<rt class=ez>つか</rt></ruby>い、<ruby>色<rt class=ez>いろ</rt></ruby>が<ruby>濃<rt>こ</rt></ruby>くにおいも<ruby>変<rt>へん</rt></ruby>です。', q:'どうする？',
  choices:['そのまま<ruby>使<rt class=ez>つか</rt></ruby>い<ruby>続<rt>つづ</rt></ruby>ける','<ruby>劣化<rt>れっか</rt></ruby>した<ruby>油<rt class=ez>あぶら</rt></ruby>なので<ruby>交換<rt>こうかん</rt></ruby>する','<ruby>水<rt class=ez>みず</rt></ruby>を<ruby>足<rt class=ez>た</rt></ruby>す','<ruby>砂糖<rt>さとう</rt></ruby>を<ruby>入<rt class=ez>い</rt></ruby>れる'], ans:1,
  exp:'<ruby>油<rt class=ez>あぶら</rt></ruby>の<ruby>劣化<rt>れっか</rt></ruby>は<ruby>色<rt class=ez>いろ</rt></ruby>やにおいでわかります。<ruby>劣化<rt>れっか</rt></ruby>した<ruby>油<rt class=ez>あぶら</rt></ruby>は<ruby>交換<rt>こうかん</rt></ruby>します。', src:'飲食物調理テキスト'},
 {cat:'調理', scene:'<ruby>魚<rt class=ez>さかな</rt></ruby>や<ruby>肉<rt class=ez>にく</rt></ruby>から<ruby>出<rt class=ez>で</rt></ruby>た<ruby>液<rt>えき</rt></ruby>（ドリップ）が<ruby>多<rt class=ez>おお</rt></ruby>いです。', q:'<ruby>何<rt class=ez>なに</rt></ruby>のサイン？',
  choices:['<ruby>新鮮<rt>しんせん</rt></ruby>なサイン','<ruby>鮮度<rt>せんど</rt></ruby>が<ruby>落<rt class=ez>お</rt></ruby>ちているサイン','<ruby>味<rt class=ez>あじ</rt></ruby>が<ruby>濃<rt>こ</rt></ruby>いサイン','<ruby>問題<rt class=ez>もんだい</rt></ruby>ない'], ans:1,
  exp:'ドリップが<ruby>多<rt class=ez>おお</rt></ruby>いと<ruby>鮮度<rt>せんど</rt></ruby>が<ruby>落<rt class=ez>お</rt></ruby>ちているサインです。', src:'飲食物調理テキスト'}
];
var N_S=10;
function situHomeScreen(){
 var cnt={}; SITU.forEach(function(x){cnt[x.cat]=(cnt[x.cat]||0)+1;});
 var cats=[['衛生','衛','食中毒・温度・手あらい'],['店舗','店','計数・在庫・労務'],['接客','接','クレーム・敬語・対応'],['調理','調','加熱・解凍・鮮度']];
 var cards=cats.map(function(c,i){
   return '<button class="fc sg" style="animation-delay:'+(i*55)+'ms" onclick="startSitu(\''+c[0]+'\')">'+
     '<div class="ic">'+c[1]+'</div><div><h3>'+c[0]+'</h3><div class="formula">'+c[2]+'　（'+(cnt[c[0]]||0)+'もん）</div></div><div class="arr">›</div></button>';
 }).join('');
 app.innerHTML=fheader()+
  '<button class="back" onclick="S.screen=\'home\';render()">‹ ホーム</button>'+
  '<div class="hero" style="padding-top:4px"><h1><em><ruby>状況判断<rt>じょうきょうはんだん</rt></ruby></em>を<br><ruby>練習<rt class=ez>れんしゅう</rt></ruby></h1>'+
  '<p>「この<ruby>場面<rt class=ez>ばめん</rt></ruby>でどうする？」の4<ruby>択<rt>たく</rt></ruby>です。<ruby>分野<rt class=ez>ぶんや</rt></ruby>をえらぶか、ぜんぶミックスで<ruby>練習<rt class=ez>れんしゅう</rt></ruby>できます。</p></div>'+
  '<div class="sec-l"><ruby>分野<rt class=ez>ぶんや</rt></ruby>をえらぶ</div><div class="fcard-list">'+cards+'</div>'+
  '<button class="calcbtn" style="margin-top:13px; background:linear-gradient(135deg,var(--green),#1f7d62)" onclick="startSitu(null)"><span>🎯</span><div><b>ぜんぶミックス</b><small>'+Math.min(N_S,SITU.length)+'もん・ランダム出題</small></div><span class="arr">›</span></button>';
}
function startSitu(cat){var pool=cat?SITU.filter(function(x){return x.cat===cat;}):SITU;
 S.situ={qs:shuffle(pool).slice(0,Math.min(N_S,pool.length)), cat:cat||null, i:0, score:0, wrong:[], answered:false, picked:null}; S.screen='situ'; render();}
function situScreen(){
 var q=S.situ, it=q.qs[q.i], pct=Math.round(q.i/q.qs.length*100);
 var opts=it.choices.map(function(c,idx){var cls='opt';
   if(q.answered){if(idx===it.ans)cls+=' correct'; else if(idx===q.picked)cls+=' wrong'; else cls+=' dim';}
   return '<button class="'+cls+'" '+(q.answered?'disabled':'')+' onclick="situAnswer('+idx+')">'+c+'</button>';
 }).join('');
 var foot= q.answered? ('<div class="situexp"><div class="l">かいせつ</div>'+it.exp+'<div class="esrc"><b>出典</b> '+it.src+'</div></div>'+
    '<button class="btn p row" onclick="situNext()">'+(q.i===q.qs.length-1?'<ruby>結果<rt>けっか</rt></ruby>を<ruby>見<rt class=ez>み</rt></ruby>る':'<ruby>次<rt class=ez>つぎ</rt></ruby>の<ruby>問題<rt class=ez>もんだい</rt></ruby> ›')+'</button>') : '';
 app.innerHTML=fheader()+
  '<button class="back" onclick="if(confirm(\'状況判断をやめますか？\')){S.screen=\'situHome\';render()}">‹ やめる</button>'+
  '<div class="prog"><i style="width:'+pct+'%"></i></div>'+
  '<div class="count"><ruby>問題<rt class=ez>もんだい</rt></ruby> '+(q.i+1)+' / '+q.qs.length+'　・<ruby>正解<rt>せいかい</rt></ruby> '+q.score+'</div>'+
  '<div class="q-card"><div class="qk">'+it.cat+'の場面</div><div class="qt sm">'+it.scene+'</div>'+
   '<div class="qq" style="margin-top:12px">'+it.q+'</div><div class="opts">'+opts+'</div>'+
   '<div class="q-foot">'+foot+'</div></div>';
}
function situAnswer(idx){var q=S.situ; if(q.answered)return; q.answered=true; q.picked=idx;
 var it=q.qs[q.i]; var ok=(idx===it.ans); if(ok)q.score++; else q.wrong.push(it); recSitu(it.cat, ok); situScreen();}
function situNext(){var q=S.situ; if(q.i===q.qs.length-1){endSession(P.situ); S.screen='sresult'; render(); return;} q.i++; q.answered=false; q.picked=null; situScreen();}
function sresultScreen(){
 var q=S.situ, n=q.qs.length, pct=Math.round(q.score/n*100), pass=pct>=65, R=70, C=2*Math.PI*R, off=C*(1-pct/100);
 var miss=q.wrong.map(function(it){return '<div class="mrow"><div class="mt">'+it.cat+'：'+it.scene+'</div><div class="mw"><ruby>答<rt class=ez>こた</rt></ruby>え → '+it.choices[it.ans]+'</div></div>';}).join('');
 app.innerHTML=fheader()+
  '<div class="res"><div class="ring"><svg width="168" height="168">'+
    '<circle cx="84" cy="84" r="'+R+'" fill="none" stroke="#EFE6D4" stroke-width="14"/>'+
    '<circle cx="84" cy="84" r="'+R+'" fill="none" stroke="'+(pass?'#2E9E7E':'#E8743B')+'" stroke-width="14" stroke-linecap="round" stroke-dasharray="'+C+'" stroke-dashoffset="'+off+'"/>'+
    '</svg><div class="num"><b>'+pct+'<span style="font-size:22px">%</span></b><span>'+q.score+' / '+n+'</span></div></div>'+
   '<div class="verdict '+(pass?'pass':'fail')+'">'+(pass?'合格ラインクリア！🎉':'もう<ruby>一息<rt class=ez>ひといき</rt></ruby>！')+'</div>'+
   '<div class="sub">合格の<ruby>目安<rt class=ez>めやす</rt></ruby>は65%です</div></div>'+
   (q.wrong.length?'<div class="sec-l">まちがえた場面</div><div class="miss">'+miss+'</div>':'')+
   '<button class="btn p" style="margin-top:18px" onclick="startSitu(S.situ.cat)">🔁 もういちど</button>'+
   '<button class="btn g row" onclick="S.screen=\'situHome\';render()">🧭 <ruby>分野<rt class=ez>ぶんや</rt></ruby>をえらぶ</button>'+
   '<button class="btn g row" onclick="S.screen=\'home\';render()">🏠 ホームへ</button>';
}
function statRows(map,nameFn){var keys=Object.keys(map);
 if(!keys.length)return '<div class="rec-row"><div class="rl" style="width:auto;color:var(--ink3);font-weight:500">まだありません</div></div>';
 return keys.map(function(k){var b=map[k],p=pctOf(b),weak=(b.q>0&&p<65);
  return '<div class="rec-row'+(weak?' weak':'')+'"><div class="rl">'+nameFn(k)+'</div>'+
   '<div class="rb"><i style="width:'+p+'%"></i></div><div class="rp">'+p+'%<small>'+b.correct+'/'+b.q+'</small></div></div>';
 }).join('');}
function recordsScreen(){
 var seen=Object.keys(P.terms).length;
 var learned=Object.keys(P.terms).filter(function(k){return P.terms[k].correct>0;}).length;
 var totalQ=P.quiz.q+P.drill.q+P.situ.q;
 var body = totalQ===0
  ? '<div class="note" style="margin-top:4px">まだ<ruby>記録<rt>きろく</rt></ruby>がありません。クイズや実技（計算ドリル・状況判断）をやると、ここに <b>定着率</b>・<b>分野別の正答率</b>・<b>つづけた日数</b>が出ます。</div>'
  : '<div class="sec-l">つづけた日数（継続）</div>'+
    '<div class="statcard"><div class="big">'+streakDays()+'<small>日れんぞく</small></div><div class="bigsub"><ruby>延<rt>の</rt></ruby>べ '+P.days.length+'日・<ruby>問題<rt class=ez>もんだい</rt></ruby><ruby>延<rt>の</rt></ruby>べ '+totalQ+'もん</div></div>'+
    '<div class="sec-l"><ruby>言葉<rt>ことば</rt></ruby>の定着</div>'+
    '<div class="statcard"><div class="big">'+learned+' / 154<small>語おぼえた</small></div><div class="bigsub">出会った語 '+seen+' ・クイズ正答率 '+pctOf(P.quiz)+'%</div></div>'+
    '<div class="sec-l">分野別の正答率（語彙クイズ）</div>'+statRows(P.quiz.by,function(k){return CAT[k]?CAT[k].name:k;})+
    '<div class="sec-l">状況判断（分野別）</div>'+statRows(P.situ.by,function(k){return k;})+
    '<div class="sec-l">計算ドリル（公式別）</div>'+statRows(P.drill.by,function(k){return FMAP[k]?strip(FMAP[k].name):k;})+
    '<div class="note" style="margin-top:12px"><b>赤い行</b>は正答率65%みまんの<ruby>苦手<rt class=ez>にがて</rt></ruby>なところです。<br>この<ruby>記録<rt>きろく</rt></ruby>はこの端末にほぞんされ、ログインはいりません。</div>';
 app.innerHTML=fheader()+
  '<button class="back" onclick="S.screen=\'home\';render()">‹ ホーム</button>'+
  '<div class="chead"><div class="ic" style="background:#FBE7DA;color:var(--persimmon-d)">📊</div><div><h2>学習の<ruby>記録<rt>きろく</rt></ruby></h2><div class="en">この端末にほぞん・ログイン不要</div></div></div>'+
  body+
  '<button class="btn g" style="margin-top:20px" onclick="if(confirm(\'学習の<ruby>記録<rt>きろく</rt></ruby>を<ruby>全<rt class=ez>すべ</rt></ruby>てけしますか？\')){resetP();render()}">🗑 <ruby>記録<rt>きろく</rt></ruby>を<ruby>消<rt class=ez>け</rt></ruby>す</button>';
}
setLevel('study');
</script>
