<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#E8743B">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="description" content="特定技能2号（外食業）の試験に出ることばを、ふりがなつきで学べる無料アプリ。">
<title>外食ことば — 特定技能2号 ことば練習</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#FAF5EC; --paper2:#F3EADB; --card:#FFFFFF;
  --ink:#2A2722; --ink2:#6E665A; --ink3:#A89E8C;
  --line:#E8DEC9;
  --persimmon:#E8743B; --persimmon-d:#C9551F;
  --green:#2E9E7E; --indigo:#3E6FB0; --amber:#D98A2B; --red:#D85a4a;
  --gold:#E0A94F;
  --r:20px; --r-s:13px;
  --sh:0 10px 30px -12px rgba(80,55,25,.28);
  --sh-s:0 3px 12px -6px rgba(80,55,25,.22);
  --disp:"Zen Maru Gothic", system-ui, sans-serif;
  --body:"Zen Kaku Gothic New", system-ui, sans-serif;
}
*{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent}
/* タップの当たり判定：ボタン内の子要素（div/span等）をタップしても、必ず親ボタンに伝える。
   モバイルで「押したのに無反応」を防ぐ。あわせてタップ遅延も除去。 */
button{touch-action:manipulation}
.app button *{pointer-events:none}
html,body{height:100%}
body{
  font-family:var(--body); color:var(--ink); line-height:1.7;
  background:
    radial-gradient(120% 90% at 100% -10%, #FCEFD9 0%, transparent 55%),
    radial-gradient(120% 90% at -20% 110%, #EAF3EC 0%, transparent 55%),
    var(--paper);
  background-attachment:fixed;
  -webkit-font-smoothing:antialiased;
}
ruby rt{font-family:var(--body); font-weight:500; font-size:.55em; color:var(--persimmon-d); letter-spacing:0; user-select:none; transition:opacity .2s}
body.hide-furigana rt{display:none}
.app{max-width:480px; margin:0 auto; min-height:100dvh; padding:0 18px 120px; position:relative}
.hd{position:sticky; top:0; z-index:30; display:flex; align-items:center; justify-content:space-between;
   padding:16px 2px 12px; margin-bottom:6px;
   background:linear-gradient(var(--paper) 72%, transparent)}
.brand{display:flex; align-items:center; gap:9px; font-family:var(--disp); font-weight:900; letter-spacing:.02em}
.brand .mk{width:30px; height:30px; border-radius:9px; background:linear-gradient(135deg,var(--persimmon),var(--gold));
   display:grid; place-items:center; color:#fff; font-size:16px; box-shadow:var(--sh-s)}
.brand b{font-size:17px; display:block}
.brand span{font-size:10.5px; color:var(--ink3); font-family:var(--body); font-weight:500; display:block; margin-top:-3px; letter-spacing:.06em}
.fbtn{display:inline-flex; align-items:center; gap:7px; border:1.5px solid var(--line); background:var(--card);
   padding:7px 11px 7px 9px; border-radius:999px; font-size:12px; font-weight:700; color:var(--ink2);
   cursor:pointer; box-shadow:var(--sh-s); transition:transform .12s; font-family:var(--body)}
.fbtn:active{transform:scale(.95)}
.dot{width:30px; height:18px; border-radius:999px; background:var(--line); position:relative; transition:background .2s}
.dot::after{content:""; position:absolute; top:2px; left:2px; width:14px; height:14px; border-radius:50%;
   background:#fff; box-shadow:0 1px 3px rgba(0,0,0,.25); transition:transform .2s}
.fbtn.on .dot{background:var(--persimmon)} .fbtn.on .dot::after{transform:translateX(12px)}
.hero{padding:10px 4px 22px}
.hero h1{font-family:var(--disp); font-weight:900; font-size:30px; line-height:1.25; letter-spacing:.01em}
.hero h1 em{font-style:normal; color:var(--persimmon)}
.hero p{color:var(--ink2); font-size:13.5px; margin-top:8px}
.hero .tot{display:inline-flex; align-items:baseline; gap:6px; margin-top:16px; background:var(--card);
   border:1.5px solid var(--line); border-radius:999px; padding:6px 15px; box-shadow:var(--sh-s); font-size:12.5px; color:var(--ink2); font-weight:500}
.hero .tot b{font-family:var(--disp); font-size:18px; color:var(--ink)}
.sec-l{font-size:11.5px; font-weight:700; color:var(--ink3); letter-spacing:.14em; margin:6px 4px 12px}
.grid{display:grid; grid-template-columns:1fr 1fr; gap:13px}
.cat{position:relative; overflow:hidden; border:none; text-align:left; cursor:pointer;
   background:var(--card); border-radius:var(--r); padding:17px 16px 15px; box-shadow:var(--sh-s);
   transition:transform .14s, box-shadow .2s; animation:up .5s both; font-family:var(--body)}
.cat:active{transform:scale(.97)}
.cat:hover{box-shadow:var(--sh)}
.cat .ic{width:42px; height:42px; border-radius:12px; display:grid; place-items:center; font-size:22px; margin-bottom:12px}
.cat h3{font-family:var(--disp); font-weight:700; font-size:18px}
.cat .en{font-size:10px; color:var(--ink3); letter-spacing:.08em; font-weight:500; text-transform:uppercase}
.cat .n{position:absolute; top:15px; right:15px; font-family:var(--disp); font-weight:900; font-size:15px; color:var(--ink3)}
.cat .n small{font-size:10px; font-weight:500}
.cat .bar{height:5px; border-radius:999px; background:var(--paper2); margin-top:13px; overflow:hidden}
.cat .bar i{display:block; height:100%; border-radius:999px; width:100%}
.cat[data-h="green"] .ic{background:#E2F3ED; color:var(--green)} .cat[data-h="green"] .bar i{background:var(--green)}
.cat[data-h="indigo"] .ic{background:#E6EEF8; color:var(--indigo)} .cat[data-h="indigo"] .bar i{background:var(--indigo)}
.cat[data-h="persimmon"] .ic{background:#FBE7DA; color:var(--persimmon-d)} .cat[data-h="persimmon"] .bar i{background:var(--persimmon)}
.cat[data-h="amber"] .ic{background:#F8EBD6; color:var(--amber)} .cat[data-h="amber"] .bar i{background:var(--amber)}
.allbtn{width:100%; margin-top:14px; border:1.5px dashed var(--line); background:transparent; color:var(--ink2);
   border-radius:var(--r); padding:15px; font-size:13.5px; font-weight:700; font-family:var(--body); cursor:pointer; transition:.15s}
.allbtn:active{transform:scale(.98)} .allbtn:hover{border-color:var(--persimmon); color:var(--persimmon-d)}
.back{display:inline-flex; align-items:center; gap:6px; background:none; border:none; color:var(--ink2);
   font-family:var(--body); font-weight:700; font-size:13.5px; cursor:pointer; padding:6px 2px; margin:2px 0 6px}
.btn{display:inline-flex; align-items:center; justify-content:center; gap:8px; width:100%; border:none; cursor:pointer;
   font-family:var(--disp); font-weight:700; font-size:16px; padding:16px; border-radius:var(--r); transition:transform .12s, filter .2s}
.btn:active{transform:scale(.98)}
.btn.p{background:linear-gradient(135deg,var(--persimmon),var(--persimmon-d)); color:#fff; box-shadow:var(--sh)}
.btn.p:hover{filter:brightness(1.05)}
.btn.g{background:var(--card); color:var(--ink); border:1.5px solid var(--line); box-shadow:var(--sh-s)}
.btn.row{margin-top:11px}
.chead{display:flex; align-items:center; gap:14px; margin:4px 2px 20px}
.chead .ic{width:54px; height:54px; border-radius:15px; display:grid; place-items:center; font-size:28px; flex:none}
.chead h2{font-family:var(--disp); font-weight:900; font-size:24px}
.chead .en{font-size:11px; color:var(--ink3); letter-spacing:.1em; text-transform:uppercase; font-weight:500}
.peek{margin-top:24px}
.term-row{display:flex; align-items:baseline; gap:10px; padding:11px 2px; border-bottom:1px solid var(--line)}
.term-row b{font-family:var(--disp); font-weight:700; font-size:15.5px; flex:none}
.term-row span{color:var(--ink2); font-size:12.5px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
.prog{height:7px; border-radius:999px; background:var(--paper2); overflow:hidden; margin:2px 2px 18px}
.prog i{display:block; height:100%; background:linear-gradient(90deg,var(--persimmon),var(--gold)); border-radius:999px; transition:width .3s}
.count{text-align:center; font-size:12px; color:var(--ink3); font-weight:700; letter-spacing:.05em; margin-bottom:12px}
.scene{margin-top:2px}
.fcard2{position:relative; width:100%; min-height:340px; cursor:pointer; border-radius:24px; background:var(--card);
   box-shadow:var(--sh); border:1px solid var(--line); padding:26px; display:flex; flex-direction:column; animation:fade .25s both}
.fcard2.isfront{align-items:center; justify-content:center; text-align:center; gap:14px}
.fcard2 .tag{align-self:flex-start; font-size:10.5px; font-weight:700; letter-spacing:.06em; padding:4px 10px; border-radius:999px; color:#fff; font-family:var(--body)}
.fcard2 .word{font-family:var(--disp); font-weight:900; font-size:38px; line-height:1.3}
.fcard2 .word rt{font-size:.42em}
.fcard2 .hint{font-size:12px; color:var(--ink3); margin-top:4px}
.fcard2 .lab{font-size:10.5px; font-weight:700; color:var(--ink3); letter-spacing:.1em; margin-bottom:5px}
.fcard2 .mean{font-size:18px; font-weight:500; line-height:1.75; margin-bottom:18px}
.fcard2 .ex{background:var(--paper); border-radius:13px; padding:13px 14px; font-size:14.5px; color:var(--ink); line-height:1.8}
.fcard2 .src{margin-top:auto; padding-top:14px; font-size:11px; color:var(--ink3)}
.fcard2 .src b{color:var(--ink2); font-weight:700}
@keyframes fade{from{opacity:0; transform:translateY(6px)} to{opacity:1; transform:none}}
.nav{display:flex; gap:10px; margin-top:18px; align-items:center}
.nav button{flex:1; border:1.5px solid var(--line); background:var(--card); border-radius:14px; padding:14px; cursor:pointer;
   font-family:var(--disp); font-weight:700; font-size:15px; color:var(--ink); box-shadow:var(--sh-s); transition:transform .12s}
.nav button:active{transform:scale(.95)} .nav button:disabled{opacity:.4}
.nav .mid{flex:1.3; background:linear-gradient(135deg,var(--persimmon),var(--persimmon-d)); color:#fff; border:none}
.tools{display:flex; justify-content:center; margin-top:14px; gap:6px; flex-wrap:wrap}
.tools button{background:none; border:none; color:var(--ink2); font-family:var(--body); font-weight:700; font-size:12.5px; cursor:pointer; padding:6px 12px}
.q-card{background:var(--card); border:1px solid var(--line); border-radius:24px; box-shadow:var(--sh); padding:24px 22px; animation:up .35s both}
.q-card .qk{font-size:11px; font-weight:700; color:var(--persimmon-d); letter-spacing:.08em; margin-bottom:12px}
.q-card .qt{font-family:var(--disp); font-weight:700; font-size:25px; line-height:1.45}
.q-card .qt.sm{font-size:18px; font-weight:500; font-family:var(--body); line-height:1.7}
.opts{margin-top:18px; display:flex; flex-direction:column; gap:11px}
.opt{text-align:left; border:1.5px solid var(--line); background:var(--card); border-radius:15px; padding:15px 16px;
   font-family:var(--body); font-size:15.5px; font-weight:500; color:var(--ink); cursor:pointer; transition:.15s; line-height:1.6}
.opt:active{transform:scale(.99)} .opt:hover{border-color:var(--ink3)}
.opt.correct{border-color:var(--green); background:#E9F7F1; color:#1d6f59; font-weight:700}
.opt.wrong{border-color:var(--red); background:#FBECEA; color:#b23a2c}
.opt.dim{opacity:.5}
.q-foot{margin-top:18px; min-height:8px}
.res{text-align:center; padding-top:10px; animation:up .4s both}
.ring{width:168px; height:168px; margin:8px auto 4px; position:relative}
.ring svg{transform:rotate(-90deg)}
.ring .num{position:absolute; inset:0; display:grid; place-content:center; font-family:var(--disp); font-weight:900}
.ring .num b{font-size:46px; line-height:1} .ring .num span{font-size:13px; color:var(--ink2); font-weight:500}
.res .verdict{font-family:var(--disp); font-weight:900; font-size:24px; margin-top:6px}
.res .pass{color:var(--green)} .res .fail{color:var(--persimmon-d)}
.res .sub{color:var(--ink2); font-size:13.5px; margin-top:6px}
@keyframes up{from{opacity:0; transform:translateY(14px)} to{opacity:1; transform:none}}
footer{position:fixed; left:0; right:0; bottom:0; text-align:center; font-size:10.5px; color:var(--ink3);
   padding:9px; background:linear-gradient(transparent, var(--paper) 40%); pointer-events:none}
/* ===== 計算ドリル（v1.1で追加） ===== */
.note{margin-top:14px; background:#FBF3E2; border:1.5px solid var(--line); border-radius:var(--r-s); padding:11px 13px; font-size:12px; color:var(--ink2); line-height:1.7}
.note b{color:var(--persimmon-d)}
.calcbtn{width:100%; margin-top:12px; display:flex; align-items:center; gap:12px; text-align:left; cursor:pointer; border:none;
   background:linear-gradient(135deg,var(--indigo),#2E527F); color:#fff; border-radius:var(--r); padding:16px 17px; box-shadow:var(--sh); font-family:var(--body); transition:transform .12s}
.calcbtn:active{transform:scale(.98)}
.calcbtn>span:first-child{font-size:24px}
.calcbtn b{font-family:var(--disp); font-weight:900; font-size:16.5px; display:block}
.calcbtn small{font-size:11.5px; opacity:.85; display:block; margin-top:1px}
.calcbtn .arr{margin-left:auto; font-size:22px; opacity:.85}
.fcard-list{display:flex; flex-direction:column; gap:11px}
.fc{position:relative; text-align:left; cursor:pointer; border:1.5px solid var(--line); background:var(--card); border-radius:var(--r); padding:15px 16px; box-shadow:var(--sh-s); transition:transform .14s, box-shadow .2s, border-color .2s; animation:up .45s both; font-family:var(--body); display:flex; align-items:center; gap:13px}
.fc:active{transform:scale(.98)} .fc:hover{box-shadow:var(--sh); border-color:var(--indigo)}
.fc .ic{width:44px; height:44px; border-radius:12px; flex:none; display:grid; place-items:center; font-size:20px; background:#E6EEF8; color:var(--indigo); font-family:var(--disp); font-weight:900}
.fc h3{font-family:var(--disp); font-weight:700; font-size:16.5px}
.fc .formula{font-size:11.5px; color:var(--ink2); margin-top:2px}
.fc .arr{margin-left:auto; color:var(--ink3); font-size:20px; flex:none}
.fc.sg .ic{background:#E6F4EE; color:var(--green)}
.fc.sg:hover{border-color:var(--green)}
/* 本番モード切替（v1.7で追加） */
.modeseg{display:flex; gap:8px; margin:2px 0 8px}
.modeseg .seg{flex:1; border:1.5px solid var(--line); background:var(--card); border-radius:14px; padding:11px 8px; cursor:pointer;
   font-family:var(--disp); font-weight:700; font-size:14px; color:var(--ink2); box-shadow:var(--sh-s); transition:.15s; display:flex; flex-direction:column; align-items:center; gap:2px}
.modeseg .seg small{font-family:var(--body); font-weight:500; font-size:10.5px; color:var(--ink3)}
.modeseg .seg.on{border-color:var(--persimmon); background:#FBE7DA; color:var(--persimmon-d)}
.modeseg .seg.on small{color:var(--persimmon-d)}
.modeseg .seg:active{transform:scale(.97)}
.modecap{font-size:11.5px; color:var(--ink3); margin:0 2px 14px; line-height:1.6}
.fbtn.honban{border-color:var(--persimmon); background:#FBE7DA; color:var(--persimmon-d)}
/* 学習記録（v1.9で追加） */
.statcard{background:var(--card); border:1px solid var(--line); border-radius:18px; box-shadow:var(--sh-s); padding:16px 18px; margin-bottom:8px}
.statcard .big{font-family:var(--disp); font-weight:900; font-size:30px; color:var(--ink); line-height:1}
.statcard .big small{font-family:var(--body); font-weight:700; font-size:13px; color:var(--ink2); margin-left:6px}
.statcard .bigsub{font-size:12px; color:var(--ink3); margin-top:5px}
.rec-row{display:flex; align-items:center; gap:10px; background:var(--card); border:1px solid var(--line); border-radius:13px; padding:10px 13px; margin-bottom:8px; box-shadow:var(--sh-s)}
.rec-row.weak{border-color:#F2CFC6; background:#FBEFEC}
.rec-row .rl{font-family:var(--disp); font-weight:700; font-size:14px; width:34%; flex:none}
.rec-row .rb{flex:1; height:9px; background:var(--paper2); border-radius:999px; overflow:hidden}
.rec-row .rb i{display:block; height:100%; background:linear-gradient(90deg,var(--green),#6fc3a6); border-radius:999px}
.rec-row.weak .rb i{background:linear-gradient(90deg,var(--persimmon),var(--gold))}
.rec-row .rp{font-family:var(--disp); font-weight:900; font-size:15px; width:62px; text-align:right; flex:none}
.rec-row .rp small{display:block; font-family:var(--body); font-weight:500; font-size:10px; color:var(--ink3)}
.qcard{background:var(--card); border:1px solid var(--line); border-radius:24px; box-shadow:var(--sh); padding:22px 20px; animation:up .35s both}
.qtag{display:inline-block; font-size:10.5px; font-weight:700; letter-spacing:.06em; padding:4px 11px; border-radius:999px; background:#E6EEF8; color:var(--indigo); font-family:var(--body); margin-bottom:14px}
.story{font-size:15px; color:var(--ink2); margin-bottom:2px}
.givens{background:var(--paper); border-radius:13px; padding:12px 14px; margin:10px 0 4px}
.givens .g{display:flex; justify-content:space-between; align-items:baseline; padding:5px 0; font-size:14.5px}
.givens .g+.g{border-top:1px dashed var(--line)}
.givens .g span{color:var(--ink2); font-size:13px}
.givens .g b{font-family:var(--disp); font-weight:700; font-size:16px}
.qq{font-family:var(--disp); font-weight:900; font-size:19px; margin:16px 0 2px; color:var(--ink)}
.ansrow{display:flex; align-items:stretch; gap:10px; margin-top:12px}
.ansrow input{flex:1; min-width:0; border:2px solid var(--line); border-radius:14px; padding:14px; font-size:22px; font-family:var(--disp); font-weight:700; color:var(--ink); background:#fff; text-align:right; outline:none}
.ansrow input:focus{border-color:var(--indigo)}
.ansrow .unit{display:grid; place-items:center; font-family:var(--disp); font-weight:900; font-size:20px; color:var(--ink2); padding:0 4px; flex:none}
.fb{margin-top:16px; border-radius:16px; padding:15px 16px; animation:up .3s both; border:1.5px solid}
.fb.ok{background:#E6F4EE; border-color:#BFE6D5}
.fb.ng{background:#FBEAE6; border-color:#F2CFC6}
.fb .head{display:flex; align-items:center; gap:9px; font-family:var(--disp); font-weight:900; font-size:16.5px; margin-bottom:10px}
.fb.ok .head{color:var(--green)} .fb.ng .head{color:var(--red)}
.fb .head .mk{width:26px; height:26px; border-radius:50%; display:grid; place-items:center; color:#fff; font-size:15px; flex:none}
.fb.ok .head .mk{background:var(--green)} .fb.ng .head .mk{background:var(--red)}
.work{background:rgba(255,255,255,.7); border-radius:12px; padding:12px 14px; font-size:14px; line-height:1.85}
.work .w0{font-family:var(--disp); font-weight:700; color:var(--indigo)}
.work .w1{color:var(--ink2)}
.work .w2{font-family:var(--disp); font-weight:900; font-size:17px; margin-top:3px}
.fb .csrc{margin-top:10px; font-size:11px; color:var(--ink3)} .fb .csrc b{color:var(--ink2)}
.calcwrap{margin-top:14px}
.calctoggle{display:flex; align-items:center; gap:8px; background:var(--card); border:1.5px solid var(--line); border-radius:999px; padding:9px 14px; font-size:13px; font-weight:700; color:var(--ink2); cursor:pointer; font-family:var(--body); box-shadow:var(--sh-s)}
.calc{margin-top:11px; background:#2A2722; border-radius:18px; padding:14px; box-shadow:var(--sh); display:none}
.calc.open{display:block; animation:up .25s both}
.calc .disp{background:#1c1a16; color:#fff; border-radius:11px; text-align:right; font-family:var(--disp); font-weight:700; font-size:26px; padding:14px 16px; min-height:54px; word-break:break-all; line-height:1.2}
.calc .keys{display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-top:11px}
.calc .keys button{border:none; border-radius:12px; padding:15px 0; font-family:var(--disp); font-weight:700; font-size:19px; cursor:pointer; color:#fff; background:#4a463e; transition:filter .1s}
.calc .keys button:active{filter:brightness(1.3)}
.calc .keys button.op{background:var(--indigo)}
.calc .keys button.eq{background:var(--persimmon)}
.calc .keys button.clr{background:#6b6458}
.calc .hint{color:#a89e8c; font-size:10.5px; text-align:center; margin-top:9px}
.miss{margin-top:4px}
.mrow{background:var(--card); border:1px solid var(--line); border-radius:14px; padding:12px 14px; margin-bottom:9px; box-shadow:var(--sh-s)}
.mrow .mt{font-family:var(--disp); font-weight:700; font-size:14.5px}
.mrow .mw{font-size:12.5px; color:var(--ink2); margin-top:3px}
/* 計算の しかた ガイド（v1.2で追加） */
.guide-list{display:flex; flex-direction:column; gap:13px}
.guide{background:var(--card); border:1.5px solid var(--line); border-radius:var(--r); padding:16px 16px 14px; box-shadow:var(--sh-s); animation:up .4s both; transition:border-color .3s, box-shadow .3s}
.guide.hi{border-color:var(--indigo); box-shadow:var(--sh)}
.guide .ghead{display:flex; align-items:center; gap:11px; margin-bottom:10px}
.guide .ghead .ic{width:40px; height:40px; border-radius:11px; flex:none; display:grid; place-items:center; font-size:18px; background:#E6EEF8; color:var(--indigo); font-family:var(--disp); font-weight:900}
.guide .ghead h3{font-family:var(--disp); font-weight:700; font-size:17px}
.guide .gf{font-size:12px; color:var(--indigo); font-weight:700; margin-top:1px}
.guide .gmean{font-size:14px; line-height:1.8; color:var(--ink); margin-bottom:12px}
.glab{font-size:10.5px; font-weight:700; color:var(--ink3); letter-spacing:.1em; margin-bottom:7px}
.gsteps{list-style:none; display:flex; flex-direction:column; gap:7px; margin-bottom:12px}
.gsteps li{display:flex; align-items:flex-start; gap:9px; font-size:14px; line-height:1.7}
.gsteps .sn,.howbox .sn{flex:none; width:22px; height:22px; border-radius:50%; background:var(--indigo); color:#fff; font-family:var(--disp); font-weight:900; font-size:12px; display:grid; place-items:center; margin-top:2px}
.gex{background:var(--paper); border-radius:13px; padding:12px 14px; margin-bottom:11px}
.gex .exl{font-size:12.5px; color:var(--ink2)}
.gex .exc{font-family:var(--disp); font-weight:700; font-size:15px; margin-top:5px}
.gex .exa{font-family:var(--disp); font-weight:900; font-size:18px; color:var(--green); margin-top:2px}
.gmiss{font-size:12.5px; color:var(--ink2); line-height:1.7; background:#FBF3E2; border-radius:11px; padding:10px 12px}
.gmiss b{color:var(--persimmon-d)}
.howtoggle{margin-top:12px; display:inline-flex; align-items:center; gap:7px; background:rgba(255,255,255,.6); border:1.5px solid var(--line); border-radius:999px; padding:8px 13px; font-size:12.5px; font-weight:700; color:var(--ink2); cursor:pointer; font-family:var(--body)}
.howbox{margin-top:11px; background:rgba(255,255,255,.78); border-radius:12px; padding:12px 14px; font-size:13.5px; line-height:1.8; animation:up .25s both}
.howbox .glab{margin:9px 0 6px}
.howbox ol{list-style:none; display:flex; flex-direction:column; gap:6px}
.howbox li{display:flex; gap:8px; align-items:flex-start}
.howbox .sn{width:20px; height:20px; font-size:11px}
/* 状況判断モード（v1.3で追加） */
.situexp{margin-top:14px; background:#EAF3EC; border:1.5px solid #CBE6D5; border-radius:14px; padding:13px 15px; font-size:13.5px; line-height:1.85; animation:up .3s both}
.situexp .l{font-size:10.5px; font-weight:700; color:var(--green); letter-spacing:.08em; margin-bottom:5px}
.situexp .esrc{margin-top:9px; font-size:11px; color:var(--ink3)} .situexp .esrc b{color:var(--ink2)}

     example:"<ruby>魚<rt>さかな</rt></ruby>は <ruby>真水<rt>まみず</rt></ruby>で よく <ruby>洗<rt>あら</rt></ruby>い、<ruby>腸炎<rt>ちょうえん</rt></ruby>ビブリオを ふせぎます。",source:"厚生労働省",translations:{mm:null,id:null,vn:null}},
    {id:"eisei-cereus",field:"gaisyoku",category:"eisei",priority:2,level:"ssw1",
     term:"セレウス菌",reading:"せれうすきん",
     meaning:"<ruby>米<rt>こめ</rt></ruby>や めんに ついて、<ruby>常温<rt>じょうおん</rt></ruby>で <ruby>置<rt>お</rt></ruby>くと <ruby>増<rt>ふ</rt></ruby>える <ruby>食中毒菌<rt>しょくちゅうどくきん</rt></ruby>。<ruby>芽胞<rt>がほう</rt></ruby>を つくる。",
     example:"ごはんは <ruby>長<rt>なが</rt></ruby>く <ruby>常温<rt>じょうおん</rt></ruby>で <ruby>置<rt>お</rt></ruby>かず、セレウス<ruby>菌<rt>きん</rt></ruby>を ふせぎます。",source:"厚生労働省",translations:{mm:null,id:null,vn:null}},
    {id:"eisei-botulinus",field:"gaisyoku",category:"eisei",priority:2,level:"ssw2",
     term:"ボツリヌス菌",reading:"ぼつりぬすきん",
     meaning:"<ruby>空気<rt>くうき</rt></ruby>の ない <ruby>缶詰<rt>かんづめ</rt></ruby>や <ruby>真空<rt>しんくう</rt></ruby><ruby>包装<rt>ほうそう</rt></ruby>で <ruby>増<rt>ふ</rt></ruby>え、つよい <ruby>毒<rt>どく</rt></ruby>を つくる <ruby>菌<rt>きん</rt></ruby>。",
     example:"ふくらんだ <ruby>缶詰<rt>かんづめ</rt></ruby>は <ruby>使<rt>つか</rt></ruby>わず、ボツリヌス<ruby>菌<rt>きん</rt></ruby>に <ruby>注意<rt>ちゅうい</rt></ruby>します。",source:"厚生労働省",translations:{mm:null,id:null,vn:null}},
    {id:"eisei-hepatitisE",field:"gaisyoku",category:"eisei",priority:2,level:"ssw2",
     term:"E型肝炎ウイルス",reading:"いーがたかんえんういるす",
     meaning:"<ruby>豚<rt>ぶた</rt></ruby>や イノシシ・シカの <ruby>肉<rt>にく</rt></ruby>・レバーの <ruby>加熱<rt>かねつ</rt></ruby><ruby>不足<rt>ぶそく</rt></ruby>で うつる ウイルス。",
     example:"<ruby>豚<rt>ぶた</rt></ruby>レバーは よく <ruby>加熱<rt>かねつ</rt></ruby>して E<ruby>型<rt>がた</rt></ruby><ruby>肝炎<rt>かんえん</rt></ruby>を ふせぎます。",source:"厚生労働省",translations:{mm:null,id:null,vn:null}},
    {id:"eisei-saikinsei",field:"gaisyoku",category:"eisei",priority:3,level:"ssw2",
     term:"細菌性食中毒",reading:"さいきんせいしょくちゅうどく",
     meaning:"<ruby>菌<rt>きん</rt></ruby>が <ruby>原因<rt>げんいん</rt></ruby>で おこる <ruby>食中毒<rt>しょくちゅうどく</rt></ruby>。サルモネラや カンピロバクターなど。",
     example:"<ruby>細菌性<rt>さいきんせい</rt></ruby><ruby>食中毒<rt>しょくちゅうどく</rt></ruby>は <ruby>加熱<rt>かねつ</rt></ruby>で ふせげる ものが <ruby>多<rt>おお</rt></ruby>い。",source:"厚生労働省",translations:{mm:null,id:null,vn:null}},
    {id:"eisei-virussei",field:"gaisyoku",category:"eisei",priority:3,level:"ssw2",
     term:"ウイルス性食中毒",reading:"ういるすせいしょくちゅうどく",
     meaning:"ウイルスが <ruby>原因<rt>げんいん</rt></ruby>で おこる <ruby>食中毒<rt>しょくちゅうどく</rt></ruby>。ノロウイルスが <ruby>代表<rt>だいひょう</rt></ruby>。",
     example:"ウイルス<ruby>性<rt>せい</rt></ruby><ruby>食中毒<rt>しょくちゅうどく</rt></ruby>は <ruby>手洗<rt>てあら</rt></ruby>いが <ruby>大切<rt>たいせつ</rt></ruby>です。",source:"厚生労働省",translations:{mm:null,id:null,vn:null}},
    {id:"eisei-kagakusei",field:"gaisyoku",category:"eisei",priority:2,level:"ssw2",
     term:"化学性食中毒",reading:"かがくせいしょくちゅうどく",
     meaning:"<ruby>洗剤<rt>せんざい</rt></ruby>や <ruby>農薬<rt>のうやく</rt></ruby>などの <ruby>化学<rt>かがく</rt></ruby><ruby>物質<rt>ぶっしつ</rt></ruby>が <ruby>原因<rt>げんいん</rt></ruby>の <ruby>食中毒<rt>しょくちゅうどく</rt></ruby>。",
     example:"<ruby>洗剤<rt>せんざい</rt></ruby>は <ruby>食品<rt>しょくひん</rt></ruby>と <ruby>分<rt>わ</rt></ruby>けて <ruby>置<rt>お</rt></ruby>き、<ruby>化学性<rt>かがくせい</rt></ruby><ruby>食中毒<rt>しょくちゅうどく</rt></ruby>を ふせぎます。",source:"厚生労働省",translations:{mm:null,id:null,vn:null}},
    {id:"eisei-kiseichusei",field:"gaisyoku",category:"eisei",priority:2,level:"ssw2",
     term:"寄生虫食中毒",reading:"きせいちゅうしょくちゅうどく",
     meaning:"アニサキスなど <ruby>寄生虫<rt>きせいちゅう</rt></ruby>が <ruby>原因<rt>げんいん</rt></ruby>の <ruby>食中毒<rt>しょくちゅうどく</rt></ruby>。",
     example:"<ruby>生<rt>なま</rt></ruby>の <ruby>魚<rt>さかな</rt></ruby>は よく <ruby>見<rt>み</rt></ruby>て <ruby>寄生虫<rt>きせいちゅう</rt></ruby><ruby>食中毒<rt>しょくちゅうどく</rt></ruby>を ふせぎます。",source:"厚生労働省",translations:{mm:null,id:null,vn:null}},
    {id:"eisei-ccp",field:"gaisyoku",category:"eisei",priority:3,level:"ssw2",
     term:"重要管理点（CCP）",reading:"じゅうようかんりてん",
     meaning:"HACCPで、とくに <ruby>重点<rt>じゅうてん</rt></ruby>に <ruby>管理<rt>かんり</rt></ruby>する <ruby>工程<rt>こうてい</rt></ruby>。<ruby>加熱<rt>かねつ</rt></ruby>の <ruby>温度<rt>おんど</rt></ruby>と <ruby>時間<rt>じかん</rt></ruby>など。",
     example:"<ruby>加熱<rt>かねつ</rt></ruby>を <ruby>重要管理点<rt>じゅうようかんりてん</rt></ruby>に して <ruby>記録<rt>きろく</rt></ruby>します。",source:"厚生労働省",translations:{mm:null,id:null,vn:null}},
    {id:"eisei-ha",field:"gaisyoku",category:"eisei",priority:2,level:"ssw2",
     term:"危害要因分析（HA）",reading:"きがいよういんぶんせき",
     meaning:"<ruby>食品<rt>しょくひん</rt></ruby>の どこに <ruby>危険<rt>きけん</rt></ruby>が あるかを <ruby>調<rt>しら</rt></ruby>べる こと。HACCPの <ruby>最初<rt>さいしょ</rt></ruby>の だんかい。",
     example:"まず <ruby>危害<rt>きがい</rt></ruby><ruby>要因<rt>よういん</rt></ruby><ruby>分析<rt>ぶんせき</rt></ruby>で <ruby>危険<rt>きけん</rt></ruby>を <ruby>洗<rt>あら</rt></ruby>い<ruby>出<rt>だ</rt></ruby>します。",source:"厚生労働省",translations:{mm:null,id:null,vn:null}},
    {id:"eisei-cl",field:"gaisyoku",category:"eisei",priority:2,level:"ssw2",
     term:"管理基準（CL）",reading:"かんりきじゅん",
     meaning:"<ruby>重要管理点<rt>じゅうようかんりてん</rt></ruby>で <ruby>守<rt>まも</rt></ruby>る <ruby>基準<rt>きじゅん</rt></ruby>の <ruby>数字<rt>すうじ</rt></ruby>。「<ruby>中心<rt>ちゅうしん</rt></ruby>75℃で 1<ruby>分<rt>ぷん</rt></ruby>」など。",
     example:"<ruby>管理基準<rt>かんりきじゅん</rt></ruby>を <ruby>守<rt>まも</rt></ruby>れたか <ruby>毎回<rt>まいかい</rt></ruby> <ruby>確認<rt>かくにん</rt></ruby>します。",source:"厚生労働省",translations:{mm:null,id:null,vn:null}},
    {id:"eisei-monitoring",field:"gaisyoku",category:"eisei",priority:2,level:"ssw2",
     term:"モニタリング",reading:"もにたりんぐ",
     meaning:"<ruby>管理基準<rt>かんりきじゅん</rt></ruby>を <ruby>守<rt>まも</rt></ruby>れて いるか、いつも <ruby>見<rt>み</rt></ruby>て <ruby>記録<rt>きろく</rt></ruby>する こと。",
     example:"<ruby>温度<rt>おんど</rt></ruby>を モニタリングして <ruby>記録<rt>きろく</rt></ruby>します。",source:"厚生労働省",translations:{mm:null,id:null,vn:null}},
    {id:"eisei-tearai",field:"gaisyoku",category:"eisei",priority:3,level:"ssw1",
     term:"手洗い",reading:"てあらい",
     meaning:"<ruby>食中毒<rt>しょくちゅうどく</rt></ruby>を ふせぐ いちばん <ruby>基本<rt>きほん</rt></ruby>の こと。<ruby>指<rt>ゆび</rt></ruby>の <ruby>間<rt>あいだ</rt></ruby>や つめも あらう。",
     example:"トイレの あとや <ruby>調理<rt>ちょうり</rt></ruby>の <ruby>前<rt>まえ</rt></ruby>に かならず <ruby>手洗<rt>てあら</rt></ruby>いを します。",source:"厚生労働省",translations:{mm:null,id:null,vn:null}},
    {id:"eisei-nimaigai",field:"gaisyoku",category:"eisei",priority:3,level:"ssw2",
     term:"二枚貝の加熱",reading:"にまいがいのかねつ",
     meaning:"カキなど <ruby>二枚貝<rt>にまいがい</rt></ruby>は ノロウイルスが いる ことが あるので、<ruby>中心<rt>ちゅうしん</rt></ruby>85〜90℃で 90<ruby>秒<rt>びょう</rt></ruby><ruby>以上<rt>いじょう</rt></ruby> <ruby>加熱<rt>かねつ</rt></ruby>する。",
     example:"カキは <ruby>中心<rt>ちゅうしん</rt></ruby>まで しっかり <ruby>加熱<rt>かねつ</rt></ruby>して ノロウイルスを ふせぎます。",source:"厚生労働省 大量調理施設衛生管理マニュアル",translations:{mm:null,id:null,vn:null}},
    {id:"eisei-sedaijikan",field:"gaisyoku",category:"eisei",priority:2,level:"ssw2",
     term:"世代時間",reading:"せだいじかん",
     meaning:"<ruby>菌<rt>きん</rt></ruby>が <ruby>2倍<rt>にばい</rt></ruby>に <ruby>増<rt>ふ</rt></ruby>える までの <ruby>時間<rt>じかん</rt></ruby>。<ruby>条件<rt>じょうけん</rt></ruby>が よいと だいたい 20<ruby>分<rt>ぷん</rt></ruby>。",
     example:"<ruby>菌<rt>きん</rt></ruby>は <ruby>世代<rt>せだい</rt></ruby><ruby>時間<rt>じかん</rt></ruby>が <ruby>短<rt>みじか</rt></ruby>く、すぐ <ruby>増<rt>ふ</rt></ruby>えます。",source:"厚生労働省",translations:{mm:null,id:null,vn:null}},
    {id:"eisei-shoryokansen",field:"gaisyoku",category:"eisei",priority:2,level:"ssw2",
     term:"少量感染",reading:"しょうりょうかんせん",
     meaning:"<ruby>少<rt>すこ</rt></ruby>しの <ruby>菌<rt>きん</rt></ruby>や ウイルスでも <ruby>感染<rt>かんせん</rt></ruby>する こと。O157や ノロは とくに <ruby>注意<rt>ちゅうい</rt></ruby>。",
     example:"O157は <ruby>少量<rt>しょうりょう</rt></ruby><ruby>感染<rt>かんせん</rt></ruby>するので、よく <ruby>加熱<rt>かねつ</rt></ruby>します。",source:"厚生労働省",translations:{mm:null,id:null,vn:null}},
    {id:"eisei-fukensei",field:"gaisyoku",category:"eisei",priority:1,level:"ssw2",
     term:"不顕性感染",reading:"ふけんせいかんせん",
     meaning:"<ruby>症状<rt>しょうじょう</rt></ruby>が <ruby>出<rt>で</rt></ruby>ないのに、<ruby>菌<rt>きん</rt></ruby>や ウイルスを <ruby>持<rt>も</rt></ruby>って いる <ruby>状態<rt>じょうたい</rt></ruby>。",
     example:"<ruby>元気<rt>げんき</rt></ruby>でも <ruby>不顕性<rt>ふけんせい</rt></ruby><ruby>感染<rt>かんせん</rt></ruby>の ことが あるので <ruby>手洗<rt>てあら</rt></ruby>いを します。",source:"厚生労働省",translations:{mm:null,id:null,vn:null}},
    {id:"eisei-kaizensochi",field:"gaisyoku",category:"eisei",priority:2,level:"ssw2",
     term:"改善措置",reading:"かいぜんそち",
     meaning:"HACCPで、<ruby>管理基準<rt>かんりきじゅん</rt></ruby>を <ruby>外<rt>はず</rt></ruby>れた ときに する <ruby>対応<rt>たいおう</rt></ruby>。",
     example:"<ruby>温度<rt>おんど</rt></ruby>が <ruby>足<rt>た</rt></ruby>りなければ、<ruby>改善<rt>かいぜん</rt></ruby><ruby>措置<rt>そち</rt></ruby>として <ruby>加熱<rt>かねつ</rt></ruby>し<ruby>直<rt>なお</rt></ruby>します。",source:"厚生労働省",translations:{mm:null,id:null,vn:null}},
    {id:"eisei-kensho",field:"gaisyoku",category:"eisei",priority:2,level:"ssw2",
     term:"検証",reading:"けんしょう",
     meaning:"HACCPで、<ruby>管理<rt>かんり</rt></ruby>の やり<ruby>方<rt>かた</rt></ruby>が <ruby>正<rt>ただ</rt></ruby>しく できて いるか たしかめる こと。",
     example:"<ruby>記録<rt>きろく</rt></ruby>を <ruby>見<rt>み</rt></ruby>て、ちゃんと できて いるか <ruby>検証<rt>けんしょう</rt></ruby>します。",source:"厚生労働省",translations:{mm:null,id:null,vn:null}},
    {id:"eisei-kiroku",field:"gaisyoku",category:"eisei",priority:3,level:"ssw2",
     term:"記録",reading:"きろく",
     meaning:"いつ・<ruby>何度<rt>なんど</rt></ruby>で <ruby>加熱<rt>かねつ</rt></ruby>したかなどを <ruby>書<rt>か</rt></ruby>いて <ruby>残<rt>のこ</rt></ruby>す こと。HACCPの <ruby>大切<rt>たいせつ</rt></ruby>な <ruby>仕事<rt>しごと</rt></ruby>。",
     example:"<ruby>毎日<rt>まいにち</rt></ruby> <ruby>温度<rt>おんど</rt></ruby>を <ruby>記録<rt>きろく</rt></ruby>して のこします。",source:"厚生労働省",translations:{mm:null,id:null,vn:null}},
    {id:"eisei-sakkin",field:"gaisyoku",category:"eisei",priority:2,level:"ssw2",
     term:"殺菌",reading:"さっきん",
     meaning:"<ruby>菌<rt>きん</rt></ruby>を <ruby>死<rt>し</rt></ruby>なせて <ruby>減<rt>へ</rt></ruby>らす こと。<ruby>加熱<rt>かねつ</rt></ruby>や くすりで <ruby>行<rt>おこな</rt></ruby>う。",
     example:"<ruby>道具<rt>どうぐ</rt></ruby>を <ruby>熱湯<rt>ねっとう</rt></ruby>で <ruby>殺菌<rt>さっきん</rt></ruby>します。",source:"厚生労働省",translations:{mm:null,id:null,vn:null}},
    {id:"eisei-shodoku",field:"gaisyoku",category:"eisei",priority:2,level:"ssw2",
     term:"消毒",reading:"しょうどく",
     meaning:"<ruby>害<rt>がい</rt></ruby>の ない <ruby>量<rt>りょう</rt></ruby>まで <ruby>菌<rt>きん</rt></ruby>を <ruby>減<rt>へ</rt></ruby>らす こと。アルコールや <ruby>次亜塩素酸<rt>じあえんそさん</rt></ruby>などを <ruby>使<rt>つか</rt></ruby>う。",
     example:"テーブルを アルコールで <ruby>消毒<rt>しょうどく</rt></ruby>します。",source:"厚生労働省",translations:{mm:null,id:null,vn:null}},
    {id:"eisei-senjo",field:"gaisyoku",category:"eisei",priority:2,level:"ssw2",
     term:"洗浄",reading:"せんじょう",
     meaning:"<ruby>水<rt>みず</rt></ruby>や <ruby>洗剤<rt>せんざい</rt></ruby>で よごれを <ruby>洗<rt>あら</rt></ruby>い<ruby>落<rt>お</rt></ruby>とす こと。<ruby>消毒<rt>しょうどく</rt></ruby>の <ruby>前<rt>まえ</rt></ruby>に <ruby>行<rt>おこな</rt></ruby>う。",
     example:"まず <ruby>洗浄<rt>せんじょう</rt></ruby>して、その あと <ruby>消毒<rt>しょうどく</rt></ruby>します。",source:"厚生労働省",translations:{mm:null,id:null,vn:null}},
    {id:"eisei-junzuru",field:"gaisyoku",category:"eisei",priority:2,level:"ssw2",
     term:"特定原材料に準ずるもの（20品目）",reading:"とくていげんざいりょうにじゅんずるもの",
     meaning:"アレルギー<ruby>表示<rt>ひょうじ</rt></ruby>が おすすめ（<ruby>任意<rt>にんい</rt></ruby>）の 20<ruby>品目<rt>ひんもく</rt></ruby>。<ruby>義務<rt>ぎむ</rt></ruby>の 8<ruby>品目<rt>ひんもく</rt></ruby>とは <ruby>別<rt>べつ</rt></ruby>。",
     example:"アーモンドなどは <ruby>準<rt>じゅん</rt></ruby>ずる ものとして <ruby>表示<rt>ひょうじ</rt></ruby>が すすめられて います。",source:"消費者庁",translations:{mm:null,id:null,vn:null}},
    {id:"eisei-allergen",field:"gaisyoku",category:"eisei",priority:3,level:"ssw1",
     term:"アレルゲン",reading:"あれるげん",
     meaning:"<ruby>食<rt>た</rt></ruby>べると アレルギーを <ruby>起<rt>お</rt></ruby>こす ことが ある <ruby>原材料<rt>げんざいりょう</rt></ruby>（<ruby>卵<rt>たまご</rt></ruby>・<ruby>乳<rt>にゅう</rt></ruby>・<ruby>小麦<rt>こむぎ</rt></ruby>など）。",
     example:"お<ruby>客<rt>きゃく</rt></ruby>さまに アレルゲンを かならず <ruby>確認<rt>かくにん</rt></ruby>します。",source:"消費者庁",translations:{mm:null,id:null,vn:null}},
    {id:"eisei-recall",field:"gaisyoku",category:"eisei",priority:1,level:"ssw2",
     term:"食品リコール（自主回収）",reading:"しょくひんりこーる",
     meaning:"<ruby>問題<rt>もんだい</rt></ruby>が みつかった <ruby>食品<rt>しょくひん</rt></ruby>を、お<ruby>店<rt>みせ</rt></ruby>や <ruby>会社<rt>かいしゃ</rt></ruby>が <ruby>集<rt>あつ</rt></ruby>めて もどす こと。",
     example:"アレルギー<ruby>表示<rt>ひょうじ</rt></ruby>の <ruby>間違<rt>まちが</rt></ruby>いで <ruby>食品<rt>しょくひん</rt></ruby>リコールに なる ことが あります。",source:"消費者庁",translations:{mm:null,id:null,vn:null}},
    {id:"eisei-codex",field:"gaisyoku",category:"eisei",priority:1,level:"ssw2",
     term:"CODEX（コーデックス）",reading:"こーでっくす",
     meaning:"<ruby>食品<rt>しょくひん</rt></ruby>の <ruby>安全<rt>あんぜん</rt></ruby>について <ruby>国際<rt>こくさい</rt></ruby>で きめた <ruby>基準<rt>きじゅん</rt></ruby>。HACCPの もとに なって いる。",
     example:"HACCPは コーデックスの <ruby>考<rt>かんが</rt></ruby>え<ruby>方<rt>かた</rt></ruby>を つかって います。",source:"厚生労働省／コーデックス委員会",translations:{mm:null,id:null,vn:null}},
    {id:"eisei-kigaiyoin",field:"gaisyoku",category:"eisei",priority:2,level:"ssw2",
     term:"危害要因（ハザード）",reading:"きがいよういん",
     meaning:"<ruby>食品<rt>しょくひん</rt></ruby>を あぶなくする もと。<ruby>生物的<rt>せいぶつてき</rt></ruby>（<ruby>菌<rt>きん</rt></ruby>）・<ruby>化学的<rt>かがくてき</rt></ruby>（<ruby>洗剤<rt>せんざい</rt></ruby>）・<ruby>物理的<rt>ぶつりてき</rt></ruby>（<ruby>異物<rt>いぶつ</rt></ruby>）の 3つ。",
     example:"<ruby>危害<rt>きがい</rt></ruby><ruby>要因<rt>よういん</rt></ruby>を 3つの <ruby>種類<rt>しゅるい</rt></ruby>で <ruby>考<rt>かんが</rt></ruby>えます。",source:"厚生労働省",translations:{mm:null,id:null,vn:null}},
    {id:"eisei-7gensoku",field:"gaisyoku",category:"eisei",priority:1,level:"ssw2",
     term:"7原則12手順",reading:"ななげんそくじゅうにてじゅん",
     meaning:"HACCPを すすめる ときの <ruby>決<rt>き</rt></ruby>まった <ruby>順番<rt>じゅんばん</rt></ruby>。7つの <ruby>原則<rt>げんそく</rt></ruby>と 12の <ruby>手順<rt>てじゅん</rt></ruby>。",

    // 店舗運営
    {id:"tenpo-qsc",field:"gaisyoku",category:"tenpo",priority:3,level:"ssw2",
     term:"QSC",reading:"キューエスシー",
     meaning:"<ruby>良<rt>よ</rt></ruby>い お<ruby>店<rt>みせ</rt></ruby>の <ruby>基本<rt>きほん</rt></ruby>。Quality（<ruby>品質<rt>ひんしつ</rt></ruby>）・Service（サービス）・Cleanliness（<ruby>清潔<rt>せいけつ</rt></ruby>さ）。2<ruby>号<rt>ごう</rt></ruby>では これに Atmosphere（<ruby>雰囲気<rt>ふんいき</rt></ruby>）と Hospitality（おもてなし）を <ruby>加<rt>くわ</rt></ruby>えた QSCA+H が <ruby>大切<rt>たいせつ</rt></ruby>。",
     example:"QSCを たかめて、お<ruby>客<rt>きゃく</rt></ruby>さまに また <ruby>来<rt>き</rt></ruby>て もらいます。",source:"店舗運営テキスト",translations:{mm:null,id:null,vn:null}},
    {id:"tenpo-genkaritsu",field:"gaisyoku",category:"tenpo",priority:3,level:"ssw2",

    {id:"tenpo-fl",field:"gaisyoku",category:"tenpo",priority:3,level:"ssw2",

     example:"FL<ruby>比率<rt>ひりつ</rt></ruby>は <ruby>売上<rt>うりあげ</rt></ruby>の 60%<ruby>以下<rt>いか</rt></ruby>を めざします。",source:"店舗運営テキスト",translations:{mm:null,id:null,vn:null}},
    {id:"tenpo-roudoubunpai",field:"gaisyoku",category:"tenpo",priority:3,level:"ssw2",

    {id:"tenpo-ninjiuriage",field:"gaisyoku",category:"tenpo",priority:3,level:"ssw2",
     term:"人時売上高",reading:"にんじうりあげだか",
     meaning:"1<ruby>時間<rt>じかん</rt></ruby> はたらく ごとに、どれだけ <ruby>売<rt>う</rt></ruby>れたか。＝<ruby>売上高<rt>うりあげだか</rt></ruby> ÷ <ruby>総労働時間<rt>そうろうどうじかん</rt></ruby>。",
     example:"<ruby>人時売上高<rt>にんじうりあげだか</rt></ruby>が <ruby>高<rt>たか</rt></ruby>い ほど、<ruby>店<rt>みせ</rt></ruby>の <ruby>効率<rt>こうりつ</rt></ruby>が <ruby>良<rt>よ</rt></ruby>いです。",source:"店舗運営テキスト",translations:{mm:null,id:null,vn:null}},
    {id:"tenpo-ninjiseisansei",field:"gaisyoku",category:"tenpo",priority:3,level:"ssw2",

    {id:"tenpo-kyakutanka",field:"gaisyoku",category:"tenpo",priority:2,level:"ssw2",

    {id:"tenpo-soneki",field:"gaisyoku",category:"tenpo",priority:2,level:"ssw2",

    {id:"tenpo-tanaoroshi",field:"gaisyoku",category:"tenpo",priority:2,level:"ssw2",

    {id:"tenpo-loss",field:"gaisyoku",category:"tenpo",priority:2,level:"ssw2",

    {id:"tenpo-abc",field:"gaisyoku",category:"tenpo",priority:1,level:"ssw2",

    {id:"tenpo-uriagedaka",field:"gaisyoku",category:"tenpo",priority:3,level:"ssw2",

    {id:"tenpo-ararieki",field:"gaisyoku",category:"tenpo",priority:3,level:"ssw2",

    {id:"tenpo-eigyourieki",field:"gaisyoku",category:"tenpo",priority:2,level:"ssw2",

    {id:"tenpo-ninji",field:"gaisyoku",category:"tenpo",priority:2,level:"ssw2",
     term:"人時（マンアワー）",reading:"にんじ",
     meaning:"1<ruby>人<rt>ひと</rt></ruby>が 1<ruby>時間<rt>じかん</rt></ruby> はたらく <ruby>仕事<rt>しごと</rt></ruby>の <ruby>量<rt>りょう</rt></ruby>の <ruby>単位<rt>たんい</rt></ruby>。",

    {id:"tenpo-kyakusu",field:"gaisyoku",category:"tenpo",priority:2,level:"ssw2",

    {id:"tenpo-flr",field:"gaisyoku",category:"tenpo",priority:1,level:"ssw2",
     term:"FLR",reading:"エフエルアール",
     meaning:"<ruby>食材費<rt>しょくざいひ</rt></ruby>（F）＋<ruby>人件費<rt>じんけんひ</rt></ruby>（L）＋<ruby>家賃<rt>やちん</rt></ruby>（R）。<ruby>店<rt>みせ</rt></ruby>の <ruby>大<rt>おお</rt></ruby>きな 3つの <ruby>費用<rt>ひよう</rt></ruby>。",

    {id:"tenpo-hacchu",field:"gaisyoku",category:"tenpo",priority:3,level:"ssw2",

    {id:"tenpo-zaiko",field:"gaisyoku",category:"tenpo",priority:2,level:"ssw2",

    {id:"tenpo-overportion",field:"gaisyoku",category:"tenpo",priority:1,level:"ssw2",

    {id:"tenpo-fifo",field:"gaisyoku",category:"tenpo",priority:2,level:"ssw2",

    {id:"tenpo-hanbaisokushin",field:"gaisyoku",category:"tenpo",priority:2,level:"ssw2",

    {id:"tenpo-point",field:"gaisyoku",category:"tenpo",priority:1,level:"ssw2",

    {id:"tenpo-delivery",field:"gaisyoku",category:"tenpo",priority:1,level:"ssw2",

     meaning:"はじめて <ruby>来<rt>き</rt></ruby>た お<ruby>客<rt>きゃく</rt></ruby>さま。",
     example:"<ruby>新規<rt>しんき</rt></ruby><ruby>客<rt>きゃく</rt></ruby>に また <ruby>来<rt>き</rt></ruby>て もらう くふうを します。",source:"店舗運営テキスト",translations:{mm:null,id:null,vn:null}},
    {id:"tenpo-koteikyakuka",field:"gaisyoku",category:"tenpo",priority:2,level:"ssw2",
     term:"固定客化",reading:"こていきゃくか",
     meaning:"はじめての お<ruby>客<rt>きゃく</rt></ruby>さまに、<ruby>何度<rt>なんど</rt></ruby>も <ruby>来<rt>き</rt></ruby>て もらえる ように する こと。",
     example:"サービスを よく して <ruby>固定客<rt>こていきゃく</rt></ruby><ruby>化<rt>か</rt></ruby>を めざします。",source:"店舗運営テキスト",translations:{mm:null,id:null,vn:null}},
    {id:"tenpo-raitenhindo",field:"gaisyoku",category:"tenpo",priority:1,level:"ssw2",
     term:"来店頻度",reading:"らいてんひんど",
     meaning:"お<ruby>客<rt>きゃく</rt></ruby>さまが どれくらい よく お<ruby>店<rt>みせ</rt></ruby>に <ruby>来<rt>く</rt></ruby>るか。",
     example:"<ruby>来店<rt>らいてん</rt></ruby><ruby>頻度<rt>ひんど</rt></ruby>を <ruby>上<rt>あ</rt></ruby>げる ことを めざします。",source:"店舗運営テキスト",translations:{mm:null,id:null,vn:null}},
    {id:"tenpo-roudoujikan",field:"gaisyoku",category:"tenpo",priority:2,level:"ssw2",
     term:"労働時間",reading:"ろうどうじかん",
     meaning:"<ruby>仕事<rt>しごと</rt></ruby>を する <ruby>時間<rt>じかん</rt></ruby>。<ruby>法律<rt>ほうりつ</rt></ruby>で <ruby>上限<rt>じょうげん</rt></ruby>が きめられて いる。",
     example:"<ruby>労働<rt>ろうどう</rt></ruby><ruby>時間<rt>じかん</rt></ruby>を <ruby>守<rt>まも</rt></ruby>って シフトを つくります。",source:"労働基準法",translations:{mm:null,id:null,vn:null}},
    {id:"tenpo-warimashi",field:"gaisyoku",category:"tenpo",priority:2,level:"ssw2",
     term:"割増賃金",reading:"わりましちんぎん",
     meaning:"<ruby>残業<rt>ざんぎょう</rt></ruby>や <ruby>深夜<rt>しんや</rt></ruby>・<ruby>休日<rt>きゅうじつ</rt></ruby>に はたらいた ときに <ruby>多<rt>おお</rt></ruby>く <ruby>払<rt>はら</rt></ruby>う <ruby>賃金<rt>ちんぎん</rt></ruby>。",
     example:"<ruby>残業<rt>ざんぎょう</rt></ruby>には <ruby>割増<rt>わりまし</rt></ruby><ruby>賃金<rt>ちんぎん</rt></ruby>を <ruby>払<rt>はら</rt></ruby>います。",source:"労働基準法",translations:{mm:null,id:null,vn:null}},
    {id:"tenpo-kyukei",field:"gaisyoku",category:"tenpo",priority:2,level:"ssw2",
     term:"休憩時間",reading:"きゅうけいじかん",
     meaning:"<ruby>仕事<rt>しごと</rt></ruby>の <ruby>途中<rt>とちゅう</rt></ruby>に <ruby>休<rt>やす</rt></ruby>む <ruby>時間<rt>じかん</rt></ruby>。<ruby>法律<rt>ほうりつ</rt></ruby>で <ruby>決<rt>き</rt></ruby>められて いる。",
     example:"6<ruby>時間<rt>じかん</rt></ruby>を こえたら 45<ruby>分<rt>ふん</rt></ruby>、8<ruby>時間<rt>じかん</rt></ruby>を こえたら 1<ruby>時間<rt>じかん</rt></ruby><ruby>以上<rt>いじょう</rt></ruby>の <ruby>休憩<rt>きゅうけい</rt></ruby>を とります。",source:"労働基準法",translations:{mm:null,id:null,vn:null}},
    {id:"tenpo-yukyu",field:"gaisyoku",category:"tenpo",priority:2,level:"ssw2",
     term:"年次有給休暇",reading:"ねんじゆうきゅうきゅうか",
     meaning:"<ruby>給料<rt>きゅうりょう</rt></ruby>を もらいながら <ruby>休<rt>やす</rt></ruby>める <ruby>休<rt>やす</rt></ruby>み。6か<ruby>月<rt>げつ</rt></ruby> はたらく（8<ruby>割<rt>わり</rt></ruby><ruby>以上<rt>いじょう</rt></ruby> <ruby>出勤<rt>しゅっきん</rt></ruby>）と 10<ruby>日<rt>か</rt></ruby> もらえる。",
     example:"<ruby>年次<rt>ねんじ</rt></ruby><ruby>有給<rt>ゆうきゅう</rt></ruby><ruby>休暇<rt>きゅうか</rt></ruby>を つかって <ruby>休<rt>やす</rt></ruby>みます。",source:"労働基準法",translations:{mm:null,id:null,vn:null}},
    {id:"tenpo-saiyo",field:"gaisyoku",category:"tenpo",priority:1,level:"ssw2",
     term:"採用面接",reading:"さいようめんせつ",
     meaning:"<ruby>新<rt>あたら</rt></ruby>しく はたらく <ruby>人<rt>ひと</rt></ruby>を <ruby>選<rt>えら</rt></ruby>ぶ ための <ruby>面接<rt>めんせつ</rt></ruby>。",
     example:"<ruby>採用<rt>さいよう</rt></ruby><ruby>面接<rt>めんせつ</rt></ruby>で <ruby>仕事<rt>しごと</rt></ruby>の <ruby>説明<rt>せつめい</rt></ruby>を します。",source:"店舗運営テキスト",translations:{mm:null,id:null,vn:null}},
    {id:"tenpo-ojt",field:"gaisyoku",category:"tenpo",priority:2,level:"ssw2",
     term:"OJT",reading:"おーじぇーてぃー",
     meaning:"<ruby>仕事<rt>しごと</rt></ruby>を しながら <ruby>教<rt>おし</rt></ruby>える <ruby>訓練<rt>くんれん</rt></ruby>。",
     example:"<ruby>新人<rt>しんじん</rt></ruby>に OJTで <ruby>接客<rt>せっきゃく</rt></ruby>を <ruby>教<rt>おし</rt></ruby>えます。",source:"店舗運営テキスト",translations:{mm:null,id:null,vn:null}},
    {id:"tenpo-offjt",field:"gaisyoku",category:"tenpo",priority:1,level:"ssw2",
     term:"OFF-JT",reading:"おふじぇーてぃー",
     meaning:"<ruby>仕事<rt>しごと</rt></ruby>を <ruby>離<rt>はな</rt></ruby>れて、<ruby>研修<rt>けんしゅう</rt></ruby>などで <ruby>学<rt>まな</rt></ruby>ぶ <ruby>訓練<rt>くんれん</rt></ruby>。",
     example:"<ruby>仕事<rt>しごと</rt></ruby>の <ruby>時間<rt>じかん</rt></ruby>に、お<ruby>店<rt>みせ</rt></ruby>の <ruby>外<rt>そと</rt></ruby>の <ruby>研修会<rt>けんしゅうかい</rt></ruby>で OFF-JTを <ruby>受<rt>う</rt></ruby>けます。",source:"店舗運営テキスト",translations:{mm:null,id:null,vn:null}},
    {id:"tenpo-bouka",field:"gaisyoku",category:"tenpo",priority:1,level:"ssw2",
     term:"防火管理者",reading:"ぼうかかんりしゃ",
     meaning:"お<ruby>店<rt>みせ</rt></ruby>の <ruby>火事<rt>かじ</rt></ruby>を ふせぐ ために <ruby>決<rt>き</rt></ruby>められた <ruby>役<rt>やく</rt></ruby>わりの <ruby>人<rt>ひと</rt></ruby>。",
     example:"<ruby>防火<rt>ぼうか</rt></ruby><ruby>管理者<rt>かんりしゃ</rt></ruby>が <ruby>避難<rt>ひなん</rt></ruby>の <ruby>訓練<rt>くんれん</rt></ruby>を します。",source:"消防法／店舗運営テキスト",translations:{mm:null,id:null,vn:null}},
    {id:"tenpo-jikantai",field:"gaisyoku",category:"tenpo",priority:1,level:"ssw2",
     term:"時間帯責任者",reading:"じかんたいせきにんしゃ",
     meaning:"<ruby>店長<rt>てんちょう</rt></ruby>の かわりに、その <ruby>時間<rt>じかん</rt></ruby>の お<ruby>店<rt>みせ</rt></ruby>を まとめる <ruby>責任者<rt>せきにんしゃ</rt></ruby>。QSCの <ruby>維持<rt>いじ</rt></ruby>と スタッフの <ruby>指導<rt>しどう</rt></ruby>を します。",
     example:"<ruby>昼<rt>ひる</rt></ruby>の <ruby>時間帯<rt>じかんたい</rt></ruby><ruby>責任者<rt>せきにんしゃ</rt></ruby>として <ruby>店<rt>みせ</rt></ruby>を まかされます。",source:"店舗運営テキスト",translations:{mm:null,id:null,vn:null}},
    {id:"tenpo-suggestive",field:"gaisyoku",category:"tenpo",priority:1,level:"ssw2",
     term:"サジェスティブセールス",reading:"さじぇすてぃぶせーるす",
     meaning:"お<ruby>客<rt>きゃく</rt></ruby>さまに おすすめの <ruby>一品<rt>いっぴん</rt></ruby>や デザートを すすめて、<ruby>客単価<rt>きゃくたんか</rt></ruby>を <ruby>上<rt>あ</rt></ruby>げる こと。<ruby>推奨販売<rt>すいしょうはんばい</rt></ruby>とも いう。",
     example:"<ruby>食後<rt>しょくご</rt></ruby>に デザートを サジェスティブセールスします。",source:"店舗運営テキスト／接客全般テキスト",translations:{mm:null,id:null,vn:null}},
    {id:"tenpo-sabroku",field:"gaisyoku",category:"tenpo",priority:2,level:"ssw2",
     term:"36協定",reading:"さぶろくきょうてい",
     meaning:"1<ruby>日<rt>にち</rt></ruby>8<ruby>時間<rt>じかん</rt></ruby>・<ruby>週<rt>しゅう</rt></ruby>40<ruby>時間<rt>じかん</rt></ruby>を こえて <ruby>働<rt>はたら</rt></ruby>いて もらう ために、<ruby>会社<rt>かいしゃ</rt></ruby>と <ruby>働<rt>はたら</rt></ruby>く<ruby>人<rt>ひと</rt></ruby>の <ruby>代表<rt>だいひょう</rt></ruby>が むすぶ やくそく（<ruby>労働<rt>ろうどう</rt></ruby><ruby>基準法<rt>きじゅんほう</rt></ruby>36<ruby>条<rt>じょう</rt></ruby>）。",
     example:"<ruby>残業<rt>ざんぎょう</rt></ruby>させる <ruby>前<rt>まえ</rt></ruby>に 36<ruby>協定<rt>きょうてい</rt></ruby>を むすびます。",source:"店舗運営テキスト",translations:{mm:null,id:null,vn:null}},

    // 接客全般
    {id:"sekkyaku-hospitality",field:"gaisyoku",category:"sekkyaku",priority:3,level:"ssw1",
     term:"ホスピタリティ",reading:"ほすぴたりてぃ",
     meaning:"お<ruby>客<rt>きゃく</rt></ruby>さまを <ruby>心<rt>こころ</rt></ruby>から <ruby>大切<rt>たいせつ</rt></ruby>に する おもてなしの <ruby>気持<rt>きも</rt></ruby>ち。",
     example:"ホスピタリティを <ruby>大切<rt>たいせつ</rt></ruby>に して <ruby>接客<rt>せっきゃく</rt></ruby>します。",source:"接客全般テキスト",translations:{mm:null,id:null,vn:null}},
    {id:"sekkyaku-cs",field:"gaisyoku",category:"sekkyaku",priority:2,level:"ssw2",
     term:"顧客満足（CS）",reading:"こきゃくまんぞく",
     meaning:"お<ruby>客<rt>きゃく</rt></ruby>さまが「<ruby>満足<rt>まんぞく</rt></ruby>した」と <ruby>感<rt>かん</rt></ruby>じる こと。リピーターに つながる。",
     example:"<ruby>顧客<rt>こきゃく</rt></ruby><ruby>満足<rt>まんぞく</rt></ruby>を <ruby>高<rt>たか</rt></ruby>める サービスを します。",source:"接客全般テキスト",translations:{mm:null,id:null,vn:null}},
    {id:"sekkyaku-repeater",field:"gaisyoku",category:"sekkyaku",priority:2,level:"ssw2",
     term:"リピーター",reading:"りぴーたー",
     meaning:"<ruby>気<rt>き</rt></ruby>に <ruby>入<rt>い</rt></ruby>って また <ruby>来<rt>き</rt></ruby>て くれる お<ruby>客<rt>きゃく</rt></ruby>さま。",
     example:"リピーターを <ruby>増<rt>ふ</rt></ruby>やす ことが <ruby>大切<rt>たいせつ</rt></ruby>です。",source:"接客全般テキスト",translations:{mm:null,id:null,vn:null}},
    {id:"sekkyaku-midashinami",field:"gaisyoku",category:"sekkyaku",priority:2,level:"ssw1",
     term:"身だしなみ",reading:"みだしなみ",
     meaning:"<ruby>清潔<rt>せいけつ</rt></ruby>で きちんとした <ruby>見<rt>み</rt></ruby>た<ruby>目<rt>め</rt></ruby>。<ruby>髪<rt>かみ</rt></ruby>・<ruby>爪<rt>つめ</rt></ruby>・<ruby>服<rt>ふく</rt></ruby>を ととのえる。",
     example:"<ruby>仕事<rt>しごと</rt></ruby>の <ruby>前<rt>まえ</rt></ruby>に <ruby>身<rt>み</rt></ruby>だしなみを <ruby>確認<rt>かくにん</rt></ruby>します。",source:"接客全般テキスト",translations:{mm:null,id:null,vn:null}},
    {id:"sekkyaku-7dai",field:"gaisyoku",category:"sekkyaku",priority:2,level:"ssw2",
     term:"接客7大用語",reading:"せっきゃくななだいようご",
     meaning:"<ruby>接客<rt>せっきゃく</rt></ruby>で よく つかう <ruby>基本<rt>きほん</rt></ruby>の 7つの ことば。「いらっしゃいませ」「ありがとうございます」「お<ruby>待<rt>ま</rt></ruby>たせいたしました」「かしこまりました」「<ruby>申<rt>もう</rt></ruby>し<ruby>訳<rt>わけ</rt></ruby>ございません」「<ruby>恐<rt>おそ</rt></ruby>れ<ruby>入<rt>い</rt></ruby>ります」「<ruby>失礼<rt>しつれい</rt></ruby>いたします」。",
     example:"<ruby>接客<rt>せっきゃく</rt></ruby>7<ruby>大<rt>だい</rt></ruby><ruby>用語<rt>ようご</rt></ruby>を はっきり <ruby>言<rt>い</rt></ruby>います。",source:"接客全般テキスト",translations:{mm:null,id:null,vn:null}},
    {id:"sekkyaku-smile",field:"gaisyoku",category:"sekkyaku",priority:1,level:"ssw1",
     term:"スマイル＆アイコンタクト",reading:"すまいるあいこんたくと",
     meaning:"<ruby>笑顔<rt>えがお</rt></ruby>で <ruby>目<rt>め</rt></ruby>を <ruby>見<rt>み</rt></ruby>て <ruby>接客<rt>せっきゃく</rt></ruby>する こと。",
     example:"スマイルと アイコンタクトで お<ruby>客<rt>きゃく</rt></ruby>さまを むかえます。",source:"接客全般テキスト",translations:{mm:null,id:null,vn:null}},
    {id:"sekkyaku-sonkeigo",field:"gaisyoku",category:"sekkyaku",priority:3,level:"ssw1",
     term:"尊敬語",reading:"そんけいご",
     meaning:"<ruby>相手<rt>あいて</rt></ruby>を <ruby>高<rt>たか</rt></ruby>めて <ruby>敬<rt>うやま</rt></ruby>う ことば。「いらっしゃる」「めしあがる」など。",
     example:"お<ruby>客<rt>きゃく</rt></ruby>さまには <ruby>尊敬<rt>そんけい</rt></ruby><ruby>語<rt>ご</rt></ruby>を つかいます。",source:"接客全般テキスト",translations:{mm:null,id:null,vn:null}},
    {id:"sekkyaku-kenjogo",field:"gaisyoku",category:"sekkyaku",priority:3,level:"ssw1",
     term:"謙譲語",reading:"けんじょうご",
     meaning:"<ruby>自分<rt>じぶん</rt></ruby>を <ruby>低<rt>ひく</rt></ruby>くして <ruby>相手<rt>あいて</rt></ruby>を <ruby>立<rt>た</rt></ruby>てる ことば。「いたす」「うかがう」など。",
     example:"<ruby>自分<rt>じぶん</rt></ruby>の <ruby>行動<rt>こうどう</rt></ruby>には <ruby>謙譲<rt>けんじょう</rt></ruby><ruby>語<rt>ご</rt></ruby>を つかいます。",source:"接客全般テキスト",translations:{mm:null,id:null,vn:null}},
    {id:"sekkyaku-teineigo",field:"gaisyoku",category:"sekkyaku",priority:2,level:"ssw1",
     term:"丁寧語",reading:"ていねいご",
     meaning:"「です」「ます」を つけて、ていねいに <ruby>話<rt>はな</rt></ruby>す ことば。",
     example:"お<ruby>客<rt>きゃく</rt></ruby>さまには <ruby>丁寧<rt>ていねい</rt></ruby><ruby>語<rt>ご</rt></ruby>で <ruby>話<rt>はな</rt></ruby>します。",source:"接客全般テキスト",translations:{mm:null,id:null,vn:null}},
    {id:"sekkyaku-cushion",field:"gaisyoku",category:"sekkyaku",priority:2,level:"ssw2",
     term:"クッション言葉",reading:"くっしょんことば",
     meaning:"<ruby>言<rt>い</rt></ruby>いにくい ことの <ruby>前<rt>まえ</rt></ruby>に そえる ことば。「<ruby>恐<rt>おそ</rt></ruby>れ<ruby>入<rt>い</rt></ruby>りますが」など。",
     example:"クッション<ruby>言葉<rt>ことば</rt></ruby>を つかうと やわらかく <ruby>伝<rt>つた</rt></ruby>わります。",source:"接客全般テキスト",translations:{mm:null,id:null,vn:null}},
    {id:"sekkyaku-nijukeigo",field:"gaisyoku",category:"sekkyaku",priority:1,level:"ssw2",
     term:"二重敬語",reading:"にじゅうけいご",
     meaning:"<ruby>敬語<rt>けいご</rt></ruby>を かさねすぎた まちがい。「お<ruby>召<rt>め</rt></ruby>し<ruby>上<rt>あ</rt></ruby>がりに なられる」など。",
     example:"<ruby>二重<rt>にじゅう</rt></ruby><ruby>敬語<rt>けいご</rt></ruby>に ならない ように <ruby>気<rt>き</rt></ruby>を つけます。",source:"接客全般テキスト",translations:{mm:null,id:null,vn:null}},
    {id:"sekkyaku-ordertake",field:"gaisyoku",category:"sekkyaku",priority:2,level:"ssw2",
     term:"オーダーテイク",reading:"おーだーていく",
     meaning:"お<ruby>客<rt>きゃく</rt></ruby>さまの <ruby>注文<rt>ちゅうもん</rt></ruby>を <ruby>聞<rt>き</rt></ruby>いて とる こと。",
     example:"<ruby>注文<rt>ちゅうもん</rt></ruby>を くりかえして オーダーテイクの まちがいを ふせぎます。",source:"接客全般テキスト",translations:{mm:null,id:null,vn:null}},
    {id:"sekkyaku-haizen",field:"gaisyoku",category:"sekkyaku",priority:2,level:"ssw1",
     term:"配膳",reading:"はいぜん",
     meaning:"<ruby>料理<rt>りょうり</rt></ruby>や <ruby>飲<rt>の</rt></ruby>み<ruby>物<rt>もの</rt></ruby>を お<ruby>客<rt>きゃく</rt></ruby>さまの テーブルに <ruby>出<rt>だ</rt></ruby>す こと。",
     example:"<ruby>熱<rt>あつ</rt></ruby>い <ruby>料理<rt>りょうり</rt></ruby>は <ruby>早<rt>はや</rt></ruby>く <ruby>配膳<rt>はいぜん</rt></ruby>します。",source:"接客全般テキスト",translations:{mm:null,id:null,vn:null}},
    {id:"sekkyaku-gezen",field:"gaisyoku",category:"sekkyaku",priority:2,level:"ssw2",
     term:"下膳",reading:"げぜん",
     meaning:"<ruby>食<rt>た</rt></ruby>べ<ruby>終<rt>お</rt></ruby>わった <ruby>食器<rt>しょっき</rt></ruby>を さげる こと。",
     example:"お<ruby>客<rt>きゃく</rt></ruby>さまに <ruby>声<rt>こえ</rt></ruby>を かけてから <ruby>下膳<rt>げぜん</rt></ruby>します。",source:"接客全般テキスト",translations:{mm:null,id:null,vn:null}},
    {id:"sekkyaku-bussing",field:"gaisyoku",category:"sekkyaku",priority:1,level:"ssw2",
     term:"バッシング",reading:"ばっしんぐ",
     meaning:"テーブルの <ruby>食器<rt>しょっき</rt></ruby>を かたづけて、つぎの お<ruby>客<rt>きゃく</rt></ruby>さまの <ruby>準備<rt>じゅんび</rt></ruby>を する こと。",
     example:"お<ruby>客<rt>きゃく</rt></ruby>さまが <ruby>帰<rt>かえ</rt></ruby>ったら すぐ バッシングします。",source:"接客全般テキスト",translations:{mm:null,id:null,vn:null}},
    {id:"sekkyaku-chukan",field:"gaisyoku",category:"sekkyaku",priority:1,level:"ssw2",
     term:"中間サービス",reading:"ちゅうかんさーびす",
     meaning:"<ruby>料理<rt>りょうり</rt></ruby>を <ruby>出<rt>だ</rt></ruby>した あと、<ruby>食事<rt>しょくじ</rt></ruby>の <ruby>途中<rt>とちゅう</rt></ruby>に する <ruby>気配<rt>きくば</rt></ruby>り。",
     example:"<ruby>水<rt>みず</rt></ruby>を そそぐ など <ruby>中間<rt>ちゅうかん</rt></ruby>サービスを します。",source:"接客全般テキスト",translations:{mm:null,id:null,vn:null}},
    {id:"sekkyaku-setting",field:"gaisyoku",category:"sekkyaku",priority:1,level:"ssw2",
     term:"テーブルセッティング",reading:"てーぶるせってぃんぐ",
     meaning:"<ruby>食事<rt>しょくじ</rt></ruby>の <ruby>前<rt>まえ</rt></ruby>に、<ruby>食器<rt>しょっき</rt></ruby>や はしを <ruby>正<rt>ただ</rt></ruby>しく ならべる こと。",
     example:"<ruby>開店<rt>かいてん</rt></ruby><ruby>前<rt>まえ</rt></ruby>に テーブルセッティングを します。",source:"接客全般テキスト",translations:{mm:null,id:null,vn:null}},
    {id:"sekkyaku-cutlery",field:"gaisyoku",category:"sekkyaku",priority:1,level:"ssw2",
     term:"カトラリー",reading:"かとらりー",
     meaning:"ナイフ・フォーク・スプーンなど、<ruby>食事<rt>しょくじ</rt></ruby>に <ruby>使<rt>つか</rt></ruby>う <ruby>道具<rt>どうぐ</rt></ruby>。<ruby>皿<rt>さら</rt></ruby>や グラスなどの <ruby>食器<rt>しょっき</rt></ruby>とは ちがう。",
     example:"カトラリーを きれいに ならべます。",source:"接客全般テキスト",translations:{mm:null,id:null,vn:null}},
    {id:"sekkyaku-horenso",field:"gaisyoku",category:"sekkyaku",priority:3,level:"ssw1",
     term:"報連相",reading:"ほうれんそう",
     meaning:"<ruby>報告<rt>ほうこく</rt></ruby>（しらせる）・<ruby>連絡<rt>れんらく</rt></ruby>（つたえる）・<ruby>相談<rt>そうだん</rt></ruby>（きく）の こと。<ruby>仕事<rt>しごと</rt></ruby>を スムーズに する <ruby>基本<rt>きほん</rt></ruby>。",
     example:"<ruby>困<rt>こま</rt></ruby>った ことは すぐ <ruby>報連相<rt>ほうれんそう</rt></ruby>します。",source:"接客全般テキスト",translations:{mm:null,id:null,vn:null}},
    {id:"sekkyaku-5w1h",field:"gaisyoku",category:"sekkyaku",priority:2,level:"ssw2",
     term:"5W1H",reading:"ごだぶりゅーいちえいち",
     meaning:"「いつ・どこで・だれが・<ruby>何<rt>なに</rt></ruby>を・なぜ・どう」。<ruby>報告<rt>ほうこく</rt></ruby>を わかりやすく する <ruby>形<rt>かたち</rt></ruby>。",
     example:"5W1Hで <ruby>報告<rt>ほうこく</rt></ruby>すると <ruby>伝<rt>つた</rt></ruby>わりやすい。",source:"接客全般テキスト",translations:{mm:null,id:null,vn:null}},
    {id:"sekkyaku-claim",field:"gaisyoku",category:"sekkyaku",priority:3,level:"ssw2",
     term:"クレーム対応",reading:"くれーむたいおう",
     meaning:"お<ruby>客<rt>きゃく</rt></ruby>さまの <ruby>不満<rt>ふまん</rt></ruby>や <ruby>苦情<rt>くじょう</rt></ruby>に、ていねいに <ruby>対応<rt>たいおう</rt></ruby>する こと。まず よく <ruby>聞<rt>き</rt></ruby>く。",
     example:"クレーム<ruby>対応<rt>たいおう</rt></ruby>では はじめに お<ruby>話<rt>はなし</rt></ruby>を よく <ruby>聞<rt>き</rt></ruby>きます。",source:"接客全般テキスト",translations:{mm:null,id:null,vn:null}},
    {id:"sekkyaku-ibutsu",field:"gaisyoku",category:"sekkyaku",priority:2,level:"ssw2",
     term:"異物混入",reading:"いぶつこんにゅう",
     meaning:"<ruby>料理<rt>りょうり</rt></ruby>に <ruby>髪<rt>かみ</rt></ruby>の<ruby>毛<rt>け</rt></ruby>や プラスチックなど、<ruby>入<rt>はい</rt></ruby>っては いけない ものが <ruby>入<rt>はい</rt></ruby>る こと。",
     example:"<ruby>異物<rt>いぶつ</rt></ruby><ruby>混入<rt>こんにゅう</rt></ruby>を <ruby>見<rt>み</rt></ruby>つけたら すぐ <ruby>報告<rt>ほうこく</rt></ruby>します。",source:"接客全般テキスト",translations:{mm:null,id:null,vn:null}},
    {id:"sekkyaku-saihatsu",field:"gaisyoku",category:"sekkyaku",priority:2,level:"ssw2",
     term:"再発防止",reading:"さいはつぼうし",
     meaning:"<ruby>同<rt>おな</rt></ruby>じ <ruby>失敗<rt>しっぱい</rt></ruby>を <ruby>二度<rt>にど</rt></ruby>と おこさない ように する こと。",
     example:"<ruby>原因<rt>げんいん</rt></ruby>を しらべて <ruby>再発<rt>さいはつ</rt></ruby><ruby>防止<rt>ぼうし</rt></ruby>を します。",source:"接客全般テキスト",translations:{mm:null,id:null,vn:null}},
    {id:"sekkyaku-shazai",field:"gaisyoku",category:"sekkyaku",priority:2,level:"ssw1",
     term:"謝罪",reading:"しゃざい",
     meaning:"まちがいや めいわくを かけた ときに、あやまる こと。",
     example:"お<ruby>客<rt>きゃく</rt></ruby>さまに ていねいに <ruby>謝罪<rt>しゃざい</rt></ruby>します。",source:"接客全般テキスト",translations:{mm:null,id:null,vn:null}},
    {id:"sekkyaku-halal",field:"gaisyoku",category:"sekkyaku",priority:2,level:"ssw2",
     term:"ハラール",reading:"はらーる",
     meaning:"イスラム<ruby>教<rt>きょう</rt></ruby>の きまりで <ruby>食<rt>た</rt></ruby>べて よい もの。<ruby>豚肉<rt>ぶたにく</rt></ruby>や <ruby>酒<rt>さけ</rt></ruby>は つかえない。",
     example:"ハラールの お<ruby>客<rt>きゃく</rt></ruby>さまに <ruby>材料<rt>ざいりょう</rt></ruby>を <ruby>説明<rt>せつめい</rt></ruby>します。",source:"接客全般テキスト",translations:{mm:null,id:null,vn:null}},
    {id:"sekkyaku-vegetarian",field:"gaisyoku",category:"sekkyaku",priority:2,level:"ssw2",
     term:"ベジタリアン／ヴィーガン",reading:"べじたりあん／ゔぃーがん",
     meaning:"<ruby>肉<rt>にく</rt></ruby>や <ruby>魚<rt>さかな</rt></ruby>を <ruby>食<rt>た</rt></ruby>べない <ruby>人<rt>ひと</rt></ruby>。ヴィーガンは <ruby>卵<rt>たまご</rt></ruby>・<ruby>乳<rt>にゅう</rt></ruby>も <ruby>食<rt>た</rt></ruby>べない。",
     example:"ベジタリアンの お<ruby>客<rt>きゃく</rt></ruby>さまに <ruby>野菜<rt>やさい</rt></ruby>の メニューを すすめます。",source:"接客全般テキスト",translations:{mm:null,id:null,vn:null}},
    {id:"sekkyaku-tayouka",field:"gaisyoku",category:"sekkyaku",priority:1,level:"ssw2",
     term:"食の多様化",reading:"しょくのたようか",
     meaning:"アレルギー・<ruby>宗教<rt>しゅうきょう</rt></ruby>・<ruby>主義<rt>しゅぎ</rt></ruby>などで、<ruby>食<rt>た</rt></ruby>べる ものが <ruby>人<rt>ひと</rt></ruby>に よって ちがう こと。",
     example:"<ruby>食<rt>しょく</rt></ruby>の <ruby>多様化<rt>たようか</rt></ruby>に <ruby>合<rt>あ</rt></ruby>わせて メニューを <ruby>考<rt>かんが</rt></ruby>えます。",source:"接客全般テキスト",translations:{mm:null,id:null,vn:null}},
    {id:"sekkyaku-gomi",field:"gaisyoku",category:"sekkyaku",priority:1,level:"ssw2",
     term:"五味",reading:"ごみ",
     meaning:"<ruby>味<rt>あじ</rt></ruby>の <ruby>基本<rt>きほん</rt></ruby>の 5つ。<ruby>甘味<rt>あまみ</rt></ruby>・<ruby>酸味<rt>さんみ</rt></ruby>・<ruby>塩味<rt>えんみ</rt></ruby>・<ruby>苦味<rt>にがみ</rt></ruby>・うま<ruby>味<rt>み</rt></ruby>。",
     example:"<ruby>五味<rt>ごみ</rt></ruby>の バランスを <ruby>考<rt>かんが</rt></ruby>えて <ruby>料理<rt>りょうり</rt></ruby>します。",source:"接客全般テキスト",translations:{mm:null,id:null,vn:null}},
    {id:"sekkyaku-aed",field:"gaisyoku",category:"sekkyaku",priority:1,level:"ssw1",
     term:"AED",reading:"えーいーでぃー",
     meaning:"<ruby>心臓<rt>しんぞう</rt></ruby>が きゅうに けいれんして（こまかく ふるえて）、<ruby>血<rt>ち</rt></ruby>を おくれなく なった <ruby>人<rt>ひと</rt></ruby>に つかう、<ruby>電気<rt>でんき</rt></ruby>の ショックで たすける <ruby>機械<rt>きかい</rt></ruby>。",
     example:"<ruby>倒<rt>たお</rt></ruby>れた <ruby>人<rt>ひと</rt></ruby>が いたら AEDを <ruby>使<rt>つか</rt></ruby>います。",source:"接客全般テキスト",translations:{mm:null,id:null,vn:null}},
    {id:"sekkyaku-taicho",field:"gaisyoku",category:"sekkyaku",priority:1,level:"ssw2",
     term:"体調不良者対応",reading:"たいちょうふりょうしゃたいおう",
     meaning:"<ruby>気分<rt>きぶん</rt></ruby>が わるく なった お<ruby>客<rt>きゃく</rt></ruby>さまを <ruby>助<rt>たす</rt></ruby>ける こと。<ruby>救急車<rt>きゅうきゅうしゃ</rt></ruby>を よぶ ことも。",
     example:"<ruby>体調<rt>たいちょう</rt></ruby><ruby>不良<rt>ふりょう</rt></ruby>の お<ruby>客<rt>きゃく</rt></ruby>さまには すぐ <ruby>声<rt>こえ</rt></ruby>を かけます。",source:"接客全般テキスト",translations:{mm:null,id:null,vn:null}},

    // 飲食物調理
    {id:"chouri-bui",field:"gaisyoku",category:"chouri",priority:1,level:"ssw2",
     term:"部位",reading:"ぶい",
     meaning:"<ruby>肉<rt>にく</rt></ruby>や <ruby>魚<rt>さかな</rt></ruby>の、<ruby>体<rt>からだ</rt></ruby>の どの <ruby>場所<rt>ばしょ</rt></ruby>かを <ruby>表<rt>あらわ</rt></ruby>す ことば。やわらかさや あじが ちがう。",
     example:"<ruby>牛肉<rt>ぎゅうにく</rt></ruby>は <ruby>部位<rt>ぶい</rt></ruby>に よって <ruby>使<rt>つか</rt></ruby>い<ruby>方<rt>かた</rt></ruby>が ちがいます。",source:"飲食物調理テキスト",translations:{mm:null,id:null,vn:null}},
    {id:"chouri-jidori",field:"gaisyoku",category:"chouri",priority:1,level:"ssw2",
     term:"地鶏／ブロイラー",reading:"じどり／ぶろいらー",
     meaning:"<ruby>地鶏<rt>じどり</rt></ruby>は <ruby>日本<rt>にほん</rt></ruby>に <ruby>昔<rt>むかし</rt></ruby>から いる <ruby>種類<rt>しゅるい</rt></ruby>（<ruby>在来種<rt>ざいらいしゅ</rt></ruby>）の <ruby>血<rt>ち</rt></ruby>を ひく、じっくり <ruby>育<rt>そだ</rt></ruby>てた にわとり。ブロイラーは <ruby>早<rt>はや</rt></ruby>く <ruby>育<rt>そだ</rt></ruby>てる にわとり。",
     example:"<ruby>地鶏<rt>じどり</rt></ruby>は あじが <ruby>濃<rt>こ</rt></ruby>い です。",source:"飲食物調理テキスト",translations:{mm:null,id:null,vn:null}},
    {id:"chouri-seikeiniku",field:"gaisyoku",category:"chouri",priority:1,level:"ssw2",
     term:"成形肉",reading:"せいけいにく",
     meaning:"<ruby>小<rt>ちい</rt></ruby>さい <ruby>肉<rt>にく</rt></ruby>を <ruby>固<rt>かた</rt></ruby>めて 1つの <ruby>形<rt>かたち</rt></ruby>に した <ruby>肉<rt>にく</rt></ruby>。<ruby>中<rt>なか</rt></ruby>まで <ruby>菌<rt>きん</rt></ruby>が いる ことが あるので、<ruby>中心<rt>ちゅうしん</rt></ruby>を 75℃で 1<ruby>分<rt>ぷん</rt></ruby><ruby>以上<rt>いじょう</rt></ruby> <ruby>加熱<rt>かねつ</rt></ruby>します。",
     example:"<ruby>成形肉<rt>せいけいにく</rt></ruby>は <ruby>中<rt>なか</rt></ruby>まで しっかり <ruby>焼<rt>や</rt></ruby>きます。",source:"飲食物調理テキスト",translations:{mm:null,id:null,vn:null}},
    {id:"chouri-shun",field:"gaisyoku",category:"chouri",priority:2,level:"ssw1",
     term:"旬",reading:"しゅん",
     meaning:"その <ruby>食材<rt>しょくざい</rt></ruby>が いちばん おいしい <ruby>時期<rt>じき</rt></ruby>。",
     example:"<ruby>旬<rt>しゅん</rt></ruby>の <ruby>野菜<rt>やさい</rt></ruby>は あじが よくて、<ruby>安<rt>やす</rt></ruby>い。",source:"飲食物調理テキスト",translations:{mm:null,id:null,vn:null}},
    {id:"chouri-sanmai",field:"gaisyoku",category:"chouri",priority:1,level:"ssw2",
     term:"三枚おろし",reading:"さんまいおろし",
     meaning:"<ruby>魚<rt>さかな</rt></ruby>を、2まいの <ruby>身<rt>み</rt></ruby>と 1まいの <ruby>中<rt>なか</rt></ruby>の <ruby>骨<rt>ほね</rt></ruby>の、3まいに <ruby>切<rt>き</rt></ruby>り<ruby>分<rt>わ</rt></ruby>ける こと。",
     example:"アジを <ruby>三枚<rt>さんまい</rt></ruby>おろしに します。",source:"飲食物調理テキスト",translations:{mm:null,id:null,vn:null}},
    {id:"chouri-konsai",field:"gaisyoku",category:"chouri",priority:1,level:"ssw2",
     term:"根菜類",reading:"こんさいるい",
     meaning:"<ruby>土<rt>つち</rt></ruby>の <ruby>中<rt>なか</rt></ruby>で そだつ <ruby>野菜<rt>やさい</rt></ruby>。だいこん・にんじんなど。",
     example:"<ruby>根菜類<rt>こんさいるい</rt></ruby>は <ruby>長<rt>なが</rt></ruby>く <ruby>保存<rt>ほぞん</rt></ruby>できます。",source:"飲食物調理テキスト",translations:{mm:null,id:null,vn:null}},
    {id:"chouri-fugu",field:"gaisyoku",category:"chouri",priority:1,level:"ssw2",
     term:"フグ処理者",reading:"ふぐしょりしゃ",
     meaning:"<ruby>毒<rt>どく</rt></ruby>の ある フグを <ruby>安全<rt>あんぜん</rt></ruby>に <ruby>調理<rt>ちょうり</rt></ruby>できる、<ruby>資格<rt>しかく</rt></ruby>を もった <ruby>人<rt>ひと</rt></ruby>。",
     example:"フグは <ruby>処理者<rt>しょりしゃ</rt></ruby>しか <ruby>調理<rt>ちょうり</rt></ruby>できません。",source:"飲食物調理テキスト",translations:{mm:null,id:null,vn:null}},
    {id:"chouri-sendo",field:"gaisyoku",category:"chouri",priority:2,level:"ssw1",
     term:"鮮度",reading:"せんど",
     meaning:"<ruby>食材<rt>しょくざい</rt></ruby>が どれだけ <ruby>新<rt>あたら</rt></ruby>しいか。",
     example:"<ruby>魚<rt>さかな</rt></ruby>の <ruby>鮮度<rt>せんど</rt></ruby>を <ruby>目<rt>め</rt></ruby>と においで <ruby>見分<rt>みわ</rt></ruby>けます。",source:"飲食物調理テキスト",translations:{mm:null,id:null,vn:null}},
    {id:"chouri-drip",field:"gaisyoku",category:"chouri",priority:1,level:"ssw2",
     term:"ドリップ",reading:"どりっぷ",
     meaning:"<ruby>肉<rt>にく</rt></ruby>や <ruby>魚<rt>さかな</rt></ruby>から <ruby>出<rt>で</rt></ruby>る <ruby>液<rt>えき</rt></ruby>。<ruby>水分<rt>すいぶん</rt></ruby>や うまみを ふくむ。<ruby>多<rt>おお</rt></ruby>いと <ruby>鮮度<rt>せんど</rt></ruby>が <ruby>落<rt>お</rt></ruby>ちて いる サイン。",
     example:"ドリップが <ruby>多<rt>おお</rt></ruby>い <ruby>肉<rt>にく</rt></ruby>は さけます。",source:"飲食物調理テキスト",translations:{mm:null,id:null,vn:null}},
    {id:"chouri-shigokochoku",field:"gaisyoku",category:"chouri",priority:1,level:"ssw2",
     term:"死後硬直",reading:"しごこうちょく",
     meaning:"<ruby>魚<rt>さかな</rt></ruby>や <ruby>肉<rt>にく</rt></ruby>が <ruby>死<rt>し</rt></ruby>んだ あとに かたく なる こと。",
     example:"<ruby>死後<rt>しご</rt></ruby><ruby>硬直<rt>こうちょく</rt></ruby>の あと、<ruby>熟成<rt>じゅくせい</rt></ruby>で おいしく なります。",source:"飲食物調理テキスト",translations:{mm:null,id:null,vn:null}},
    {id:"chouri-shikomi",field:"gaisyoku",category:"chouri",priority:2,level:"ssw1",
     term:"仕込み",reading:"しこみ",
     meaning:"<ruby>営業<rt>えいぎょう</rt></ruby>の <ruby>前<rt>まえ</rt></ruby>に、<ruby>食材<rt>しょくざい</rt></ruby>を <ruby>切<rt>き</rt></ruby>る・<ruby>下味<rt>したあじ</rt></ruby>を つける など <ruby>準備<rt>じゅんび</rt></ruby>する こと。",
     example:"<ruby>開店<rt>かいてん</rt></ruby>の <ruby>前<rt>まえ</rt></ruby>に <ruby>仕込<rt>しこ</rt></ruby>みを <ruby>終<rt>お</rt></ruby>わらせます。",source:"飲食物調理テキスト",translations:{mm:null,id:null,vn:null}},
    {id:"chouri-akunuki",field:"gaisyoku",category:"chouri",priority:1,level:"ssw1",
     term:"あく抜き",reading:"あくぬき",
     meaning:"<ruby>野菜<rt>やさい</rt></ruby>などの にがみや えぐみを とりのぞく こと。",
     example:"ごぼうは <ruby>水<rt>みず</rt></ruby>に つけて あく<ruby>抜<rt>ぬ</rt></ruby>きします。",source:"飲食物調理テキスト",translations:{mm:null,id:null,vn:null}},
    {id:"chouri-kakushi",field:"gaisyoku",category:"chouri",priority:1,level:"ssw2",
     term:"隠し包丁",reading:"かくしぼうちょう",
     meaning:"<ruby>火<rt>ひ</rt></ruby>や あじが <ruby>通<rt>とお</rt></ruby>りやすい ように、<ruby>見<rt>み</rt></ruby>えない ところに <ruby>切<rt>き</rt></ruby>り<ruby>込<rt>こ</rt></ruby>みを <ruby>入<rt>い</rt></ruby>れる こと。",
     example:"だいこんに <ruby>隠<rt>かく</rt></ruby>し<ruby>包丁<rt>ぼうちょう</rt></ruby>を <ruby>入<rt>い</rt></ruby>れます。",source:"飲食物調理テキスト",translations:{mm:null,id:null,vn:null}},
    {id:"chouri-sujigiri",field:"gaisyoku",category:"chouri",priority:1,level:"ssw2",
     term:"筋切り",reading:"すじぎり",
     meaning:"<ruby>肉<rt>にく</rt></ruby>の すじを <ruby>切<rt>き</rt></ruby>って、<ruby>焼<rt>や</rt></ruby>いた ときに <ruby>反<rt>そ</rt></ruby>らない ように する こと。",
     example:"トンカツの <ruby>前<rt>まえ</rt></ruby>に <ruby>筋<rt>すじ</rt></ruby>を <ruby>切<rt>き</rt></ruby>ります。",source:"飲食物調理テキスト",translations:{mm:null,id:null,vn:null}},
    {id:"chouri-koumi",field:"gaisyoku",category:"chouri",priority:1,level:"ssw2",
     term:"香味野菜",reading:"こうみやさい",
     meaning:"かおりの つよい <ruby>野菜<rt>やさい</rt></ruby>。ねぎ・しょうが・にんにくなど。",
     example:"<ruby>香味<rt>こうみ</rt></ruby><ruby>野菜<rt>やさい</rt></ruby>で <ruby>料理<rt>りょうり</rt></ruby>に かおりを つけます。",source:"飲食物調理テキスト",translations:{mm:null,id:null,vn:null}},
    {id:"chouri-kappen",field:"gaisyoku",category:"chouri",priority:1,level:"ssw2",
     term:"褐変",reading:"かっぺん",
     meaning:"<ruby>切<rt>き</rt></ruby>った <ruby>野菜<rt>やさい</rt></ruby>や <ruby>果物<rt>くだもの</rt></ruby>が <ruby>茶色<rt>ちゃいろ</rt></ruby>く <ruby>変<rt>か</rt></ruby>わる こと。",
     example:"りんごは <ruby>塩水<rt>しおみず</rt></ruby>で <ruby>褐変<rt>かっぺん</rt></ruby>を ふせぎます。",source:"飲食物調理テキスト",translations:{mm:null,id:null,vn:null}},
    {id:"chouri-kanetsu",field:"gaisyoku",category:"chouri",priority:2,level:"ssw1",
     term:"加熱調理",reading:"かねつちょうり",
     meaning:"<ruby>火<rt>ひ</rt></ruby>を つかって つくる <ruby>料理<rt>りょうり</rt></ruby>。<ruby>焼<rt>や</rt></ruby>く・<ruby>煮<rt>に</rt></ruby>る・<ruby>蒸<rt>む</rt></ruby>す・<ruby>揚<rt>あ</rt></ruby>げる など。",
     example:"<ruby>加熱<rt>かねつ</rt></ruby><ruby>調理<rt>ちょうり</rt></ruby>で <ruby>菌<rt>きん</rt></ruby>を へらせます。",source:"飲食物調理テキスト",translations:{mm:null,id:null,vn:null}},
    {id:"chouri-hikanetsu",field:"gaisyoku",category:"chouri",priority:1,level:"ssw2",
     term:"非加熱調理",reading:"ひかねつちょうり",
     meaning:"<ruby>火<rt>ひ</rt></ruby>を つかわない <ruby>調理<rt>ちょうり</rt></ruby>。<ruby>和<rt>あ</rt></ruby>える・サラダなど。",
     example:"<ruby>非<rt>ひ</rt></ruby><ruby>加熱<rt>かねつ</rt></ruby>の <ruby>料理<rt>りょうり</rt></ruby>は <ruby>衛生<rt>えいせい</rt></ruby>に とくに <ruby>注意<rt>ちゅうい</rt></ruby>。",source:"飲食物調理テキスト",translations:{mm:null,id:null,vn:null}},
    {id:"chouri-shisshiki",field:"gaisyoku",category:"chouri",priority:1,level:"ssw2",
     term:"湿式加熱",reading:"しっしきかねつ",
     meaning:"<ruby>水<rt>みず</rt></ruby>や <ruby>蒸気<rt>じょうき</rt></ruby>を つかう <ruby>加熱<rt>かねつ</rt></ruby>。<ruby>煮<rt>に</rt></ruby>る・<ruby>蒸<rt>む</rt></ruby>す など。",
     example:"<ruby>煮物<rt>にもの</rt></ruby>は <ruby>湿式<rt>しっしき</rt></ruby><ruby>加熱<rt>かねつ</rt></ruby>です。",source:"飲食物調理テキスト",translations:{mm:null,id:null,vn:null}},
    {id:"chouri-kanshiki",field:"gaisyoku",category:"chouri",priority:1,level:"ssw2",
     term:"乾式加熱",reading:"かんしきかねつ",

 eisei:{name:'衛生管理', read:'えいせいかんり', en:'Hygiene', ic:'🧼', h:'green'},
 tenpo:{name:'店舗運営', read:'てんぽうんえい', en:'Store', ic:'📊', h:'indigo'},

 chouri:{name:'調理', read:'ちょうり', en:'Cooking', ic:'🍳', h:'amber'}
};

/* ===== 学習記録（端末内・ログイン不要）。SoR前提：定着率・弱点分野・継続率の3出力に使える形で保存 =====
   ※ localStorageが使えない環境（サンドボックス等）では自動的に「保存しない」状態で動作する（try/catchで安全化）。
   ※ LincID連携時は、このスキーマ（terms/quiz/drill/situ/days）をそのまま渡せる設計。 */
var PKEY='linc-ssw2-progress';
function blankStat(){return {sessions:0,q:0,correct:0,by:{}};}
function loadP(){try{var r=localStorage.getItem(PKEY); if(r){var o=JSON.parse(r);
   o.terms=o.terms||{}; o.days=o.days||[]; o.quiz=o.quiz||blankStat(); o.drill=o.drill||blankStat(); o.situ=o.situ||blankStat(); return o;}}catch(e){}
 return {v:1, firstSeen:null, lastSeen:null, days:[], terms:{}, quiz:blankStat(), drill:blankStat(), situ:blankStat()};}
var P=loadP();
function saveP(){try{localStorage.setItem(PKEY,JSON.stringify(P));}catch(e){}}
function touchDay(){var t=new Date();
 var iso=t.getFullYear()+'-'+String(t.getMonth()+1).padStart(2,'0')+'-'+String(t.getDate()).padStart(2,'0');
 if(!P.firstSeen)P.firstSeen=iso; P.lastSeen=iso; if(P.days.indexOf(iso)<0)P.days.push(iso);}
function bump(stat,key,ok){stat.q++; if(ok)stat.correct++; var b=stat.by[key]||(stat.by[key]={q:0,correct:0}); b.q++; if(ok)b.correct++;}
function recQuiz(catKey,termId,ok){touchDay(); bump(P.quiz,catKey,ok);
 var tm=P.terms[termId]||(P.terms[termId]={seen:0,correct:0}); tm.seen++; if(ok)tm.correct++; saveP();}
function recDrill(fKey,ok){touchDay(); bump(P.drill,fKey,ok); saveP();}
function recSitu(catKey,ok){touchDay(); bump(P.situ,catKey,ok); saveP();}
function endSession(stat){stat.sessions++; saveP();}
function resetP(){try{localStorage.removeItem(PKEY);}catch(e){} P=loadP();}
function pctOf(b){return b&&b.q?Math.round(b.correct/b.q*100):0;}
function streakDays(){if(!P.days.length)return 0; var ds=P.days.slice().sort().map(function(x){return new Date(x+'T00:00:00');});
 var last=ds[ds.length-1], cnt=1;
 for(var i=ds.length-2;i>=0;i--){var diff=Math.round((last-ds[i])/86400000); if(diff===1){cnt++; last=ds[i];} else if(diff>1){break;}}
 return cnt;}
function strip(s){return s.replace(/<rt>.*?<\/rt>/g,'').replace(/<\/?ruby>/g,'');}
function listOf(c){return VOCAB.filter(function(d){return d.category===c;});}
function shuffle(a){a=a.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}
var app=document.getElementById('app');
function setF(v){S.furigana=v; document.body.classList.toggle('hide-furigana',!v);}
function setHonban(v){S.honban=v; S.furigana=!v; document.body.classList.toggle('hide-furigana',v); render();}

function rb(t,r){return '<ruby>'+t+'<rt>'+r+'</rt></ruby>';}
function catLabel(c){var m=CAT[c]; return m&&m.read?rb(m.name,m.read):(m?m.name:c);}
function hasKR(t){return /[\u3400-\u9fff\uf900-\ufaffA-Za-z]/.test(t);}
function termLabel(d){return hasKR(d.term)&&d.reading?rb(d.term,d.reading):d.term;}
function fheader(){

   ? '<button class="fbtn honban" onclick="setHonban(false)">📝 本番モード</button>'

}
function render(){
 document.body.classList.toggle('hide-furigana',!S.furigana);
 window.scrollTo(0,0);
 if(S.screen==='study') return studyScreen();
 if(S.screen==='cat') return catScreen();
 if(S.screen==='quiz') return quizScreen();
 if(S.screen==='result') return resultScreen();
 if(S.screen==='keisan') return keisanHome();
 if(S.screen==='guide') return guideScreen();
 if(S.screen==='drill') return drillScreen();
 if(S.screen==='kresult') return kresultScreen();
 if(S.screen==='situ') return situScreen();

}

  '<div class="modeseg"><button class="seg '+(S.honban?'':'on')+'" onclick="setHonban(false)">📖 がくしゅう<small>ふりがな あり</small></button>'+
   '<button class="seg '+(S.honban?'on':'')+'" onclick="setHonban(true)">📝 本番<small>ふりがな なし</small></button></div>'+
  '<div class="modecap">'+(S.honban?'本番モード：ふりがなが ありません。試験と 同じ じょうけんです。':'なれてきたら「本番」で ふりがな なしを ためそう。')+'</div>'+
  '<div class="sec-l">ぶんやを えらぶ</div><div class="grid">'+cards+'</div>'+
  '<button class="allbtn" onclick="startQuiz(null)">🎯 ぜんぶから クイズ（10もん）</button>'+
  '<div class="sec-l">じつぎ（実技）の れんしゅう</div>'+
  '<button class="calcbtn" onclick="S.screen=\'keisan\';render()"><span>🧮</span><div><b>計算ドリル</b><small>店舗運営の 計数を 自分で 計算する</small></div><span class="arr">›</span></button>'+
  '<button class="calcbtn" style="margin-top:11px; background:linear-gradient(135deg,var(--green),#1f7d62)" onclick="S.screen=\'situHome\';render()"><span>🧭</span><div><b>状況判断</b><small>「この 場面で どうする？」を 4択で</small></div><span class="arr">›</span></button>'+
  '<button class="btn g" style="margin-top:16px" onclick="S.screen=\'records\';render()">📊 学習の きろくを みる</button>';
}

 var peek=items.slice(0,8).map(function(d){return '<div class="term-row"><b>'+termLabel(d)+'</b><span>'+strip(d.meaning)+'</span></div>';}).join('');

function startStudy(c){S.cat=c; S.order=listOf(c); S.idx=0; S.flip=false; S.screen='study'; render();}
function studyScreen(){
 var d=S.order[S.idx], m=CAT[d.category], pct=Math.round((S.idx+1)/S.order.length*100);
 app.innerHTML=fheader()+
  '<button class="back" onclick="S.screen=\'cat\';S.cat=\''+d.category+'\';render()">‹ '+catLabel(d.category)+'</button>'+
  '<div class="prog"><i style="width:'+pct+'%"></i></div>'+
  '<div class="count">'+(S.idx+1)+' / '+S.order.length+'</div>'+
  '<div class="scene"><div class="fcard2'+(S.flip?'':' isfront')+'" id="fc" onclick="flip()">'+
    (S.flip
      ? '<div class="lab">いみ</div><div class="mean">'+d.meaning+'</div>'+
        '<div class="lab">れいぶん</div><div class="ex">'+d.example+'</div>'+
        '<div class="src"><b>出典</b> '+d.source+'</div>'
      : '<span class="tag" style="background:'+HUE[m.h]+'">'+catLabel(d.category)+'</span>'+
        '<div class="word">'+termLabel(d)+'</div><div class="hint">タップして いみを みる ↻</div>'
    )+
  '</div></div>'+
  '<div class="nav"><button onclick="step(-1)" '+(S.idx===0?'disabled':'')+'>‹ まえ</button>'+
    '<button class="mid" onclick="flip()">めくる ↻</button>'+
    '<button onclick="step(1)" '+(S.idx===S.order.length-1?'disabled':'')+'>つぎ ›</button></div>'+
  '<div class="tools"><button onclick="S.order=shuffle(S.order);S.idx=0;S.flip=false;render()">🔀 シャッフル</button>'+
    '<button onclick="startQuiz(d.category)">🎯 この ぶんやで クイズ</button></div>';
}
function flip(){S.flip=!S.flip; studyScreen();}
function step(n){var i=S.idx+n; if(i<0||i>=S.order.length)return; S.idx=i; S.flip=false; render();}
function startQuiz(c){
 var pool=c?listOf(c):VOCAB.slice();
 var qs=shuffle(pool).slice(0, Math.min(10,pool.length));
 S.quiz={cat:c, qs:qs, i:0, score:0, wrong:[], answered:false, opts:[]};
 buildQ(); S.screen='quiz'; render();
}
function buildQ(){
 var q=S.quiz, d=q.qs[q.i];
 var dir=Math.random()<0.5?'m':'t';
 var pool=listOf(d.category); if(pool.length<4) pool=VOCAB;
 var others=shuffle(pool.filter(function(x){return x.id!==d.id;})).slice(0,3);
 q.dir=dir; q.opts=shuffle(others.concat([d])); q.answered=false; q.picked=null;
}
function quizScreen(){
 var q=S.quiz, d=q.qs[q.i], pct=Math.round(q.i/q.qs.length*100);
 var qk=q.dir==='m'?'この ことばの いみは？':'この いみの ことばは？';
 var stem=q.dir==='m'?'<div class="qt">'+d.term+'</div>':'<div class="qt sm">'+d.meaning+'</div>';
 var opts=q.opts.map(function(o){
   var label=q.dir==='m'?o.meaning:o.term;
   var cls='opt';
   if(q.answered){ if(o.id===d.id)cls+=' correct'; else if(o.id===q.picked)cls+=' wrong'; else cls+=' dim'; }
   return '<button class="'+cls+'" '+(q.answered?'disabled':'')+' onclick="answer(\''+o.id+'\')">'+label+'</button>';
 }).join('');
 var foot=q.answered?'<button class="btn p" onclick="nextQ()">'+(q.i===q.qs.length-1?'けっか を みる':'つぎ の もんだい ›')+'</button>':'';
 app.innerHTML=fheader()+
  '<button class="back" onclick="if(confirm(\'クイズを やめますか？\')){S.screen=\'home\';render()}">‹ やめる</button>'+
  '<div class="prog"><i style="width:'+pct+'%"></i></div>'+
  '<div class="count">もんだい '+(q.i+1)+' / '+q.qs.length+'　・　せいかい '+q.score+'</div>'+
  '<div class="q-card"><div class="qk">'+qk+'</div>'+stem+'<div class="opts">'+opts+'</div><div class="q-foot">'+foot+'</div></div>';
}
function answer(id){
 var q=S.quiz; if(q.answered)return; q.answered=true; q.picked=id;
 var d=q.qs[q.i]; var ok=(id===d.id); if(ok)q.score++; else q.wrong.push(d);
 recQuiz(d.category, d.id, ok);
 quizScreen();
}
function nextQ(){var q=S.quiz; if(q.i===q.qs.length-1){endSession(P.quiz); S.screen='result';render();return;} q.i++; buildQ(); quizScreen();}
function resultScreen(){
 var q=S.quiz, pct=Math.round(q.score/q.qs.length*100), pass=pct>=65;
 var R=70, C=2*Math.PI*R, off=C*(1-pct/100);
 var wrong=q.wrong.map(function(d){return '<div class="term-row"><b>'+termLabel(d)+'</b><span>'+strip(d.meaning)+'</span></div>';}).join('');
 app.innerHTML=fheader()+

function cShow(){var e=document.getElementById('cdisp'); if(e)e.textContent=CALC.disp;}
function cDig(x){if(CALC.fresh){CALC.disp=(x==='.'?'0.':x); CALC.fresh=false;}
 else{if(x==='.'&&CALC.disp.indexOf('.')>-1)return; CALC.disp=(CALC.disp==='0'&&x!=='.')?x:CALC.disp+x;} cShow();}
function cApply(){var b=Number(CALC.disp); if(CALC.op==null||CALC.acc==null)return b; var a=CALC.acc;
 var r=CALC.op==='+'?a+b:CALC.op==='-'?a-b:CALC.op==='*'?a*b:(b===0?NaN:a/b); return trim(r);}
function cOp(o){if(CALC.acc==null){CALC.acc=Number(CALC.disp);}else if(!CALC.fresh){CALC.acc=cApply();}
 CALC.op=o; CALC.fresh=true; CALC.disp=String(isNaN(CALC.acc)?'エラー':CALC.acc); cShow();}
function cEq(){if(CALC.op==null)return; var r=cApply(); CALC.disp=String(isNaN(r)?'エラー':r); CALC.acc=null; CALC.op=null; CALC.fresh=true; cShow();}
function cClr(){resetCalc(); cShow();}
function cBack(){if(CALC.fresh)return; CALC.disp=CALC.disp.length>1?CALC.disp.slice(0,-1):'0'; cShow();}
