 {cat:'調理', scene:'<ruby>魚<rt>さかな</rt></ruby>や <ruby>肉<rt>にく</rt></ruby>から <ruby>出<rt>で</rt></ruby>た <ruby>液<rt>えき</rt></ruby>（ドリップ）が <ruby>多<rt>おお</rt></ruby>い です。', q:'<ruby>何<rt>なに</rt></ruby>の サイン？',
  choices:['<ruby>新鮮<rt>しんせん</rt></ruby>な サイン','<ruby>鮮度<rt>せんど</rt></ruby>が <ruby>落<rt>お</rt></ruby>ちて いる サイン','<ruby>味<rt>あじ</rt></ruby>が <ruby>濃<rt>こ</rt></ruby>い サイン','<ruby>問題<rt>もんだい</rt></ruby>ない'], ans:1,
  exp:'ドリップが <ruby>多<rt>おお</rt></ruby>いと <ruby>鮮度<rt>せんど</rt></ruby>が <ruby>落<rt>お</rt></ruby>ちて いる サインです。', src:'飲食物調理テキスト'}
];
var N_S=10;
function situHomeScreen(){
 var cnt={}; SITU.forEach(function(x){cnt[x.cat]=(cnt[x.cat]||0)+1;});
 var cats=[['衛生','衛','食中毒・温度・手あらい'],['店舗','店','計数・在庫・労務'],['接客','接','クレーム・敬語・対応'],['調理','調','加熱・解凍・鮮度']];
 var cards=cats.map(function(c,i){
   return '<button class="fc sg" style="animation-delay:'+(i*55)+'ms" onclick="startSitu(\''+c[0]+'\')">'+
     '<div class="ic">'+c[1]+'</div><div><h3>'+c[0]+'</h3><div class="formula">'+c[2]+'　（'+(cnt[c[0]]||0)+'もん）</div></div><div class="arr">›</div></button>';
 }).join('');
 app.innerHTML=fheader()+
  '<button class="back" onclick="S.screen=\'home\';render()">‹ ホーム</button>'+
  '<div class="hero" style="padding-top:4px"><h1><em><ruby>状況判断<rt>じょうきょうはんだん</rt></ruby></em>を<br>れんしゅう</h1>'+
  '<p>「この <ruby>場面<rt>ばめん</rt></ruby>で どうする？」の 4<ruby>択<rt>たく</rt></ruby>です。<ruby>分野<rt>ぶんや</rt></ruby>を えらぶか、ぜんぶ ミックスで <ruby>練習<rt>れんしゅう</rt></ruby>できます。</p></div>'+
  '<div class="sec-l">ぶんやを えらぶ</div><div class="fcard-list">'+cards+'</div>'+
  '<button class="calcbtn" style="margin-top:13px; background:linear-gradient(135deg,var(--green),#1f7d62)" onclick="startSitu(null)"><span>🎯</span><div><b>ぜんぶ ミックス</b><small>'+Math.min(N_S,SITU.length)+'もん・ランダム出題</small></div><span class="arr">›</span></button>';
}
function startSitu(cat){var pool=cat?SITU.filter(function(x){return x.cat===cat;}):SITU;
 S.situ={qs:shuffle(pool).slice(0,Math.min(N_S,pool.length)), cat:cat||null, i:0, score:0, wrong:[], answered:false, picked:null}; S.screen='situ'; render();}
function situScreen(){
 var q=S.situ, it=q.qs[q.i], pct=Math.round(q.i/q.qs.length*100);
 var opts=it.choices.map(function(c,idx){var cls='opt';
   if(q.answered){if(idx===it.ans)cls+=' correct'; else if(idx===q.picked)cls+=' wrong'; else cls+=' dim';}
   return '<button class="'+cls+'" '+(q.answered?'disabled':'')+' onclick="situAnswer('+idx+')">'+c+'</button>';
 }).join('');
 var foot= q.answered? ('<div class="situexp"><div class="l">かいせつ</div>'+it.exp+'<div class="esrc"><b>出典</b> '+it.src+'</div></div>'+
    '<button class="btn p row" onclick="situNext()">'+(q.i===q.qs.length-1?'けっか を みる':'つぎ の もんだい ›')+'</button>') : '';
 app.innerHTML=fheader()+
  '<button class="back" onclick="if(confirm(\'状況判断を やめますか？\')){S.screen=\'situHome\';render()}">‹ やめる</button>'+
  '<div class="prog"><i style="width:'+pct+'%"></i></div>'+
  '<div class="count">もんだい '+(q.i+1)+' / '+q.qs.length+'　・　せいかい '+q.score+'</div>'+
  '<div class="q-card"><div class="qk">'+it.cat+'の 場面</div><div class="qt sm">'+it.scene+'</div>'+
   '<div class="qq" style="margin-top:12px">'+it.q+'</div><div class="opts">'+opts+'</div>'+
   '<div class="q-foot">'+foot+'</div></div>';
}
function situAnswer(idx){var q=S.situ; if(q.answered)return; q.answered=true; q.picked=idx;
 var it=q.qs[q.i]; var ok=(idx===it.ans); if(ok)q.score++; else q.wrong.push(it); recSitu(it.cat, ok); situScreen();}
function situNext(){var q=S.situ; if(q.i===q.qs.length-1){endSession(P.situ); S.screen='sresult'; render(); return;} q.i++; q.answered=false; q.picked=null; situScreen();}
function sresultScreen(){
 var q=S.situ, n=q.qs.length, pct=Math.round(q.score/n*100), pass=pct>=65, R=70, C=2*Math.PI*R, off=C*(1-pct/100);
 var miss=q.wrong.map(function(it){return '<div class="mrow"><div class="mt">'+it.cat+'：'+it.scene+'</div><div class="mw">こたえ → '+it.choices[it.ans]+'</div></div>';}).join('');
 app.innerHTML=fheader()+
  '<div class="res"><div class="ring"><svg width="168" height="168">'+
    '<circle cx="84" cy="84" r="'+R+'" fill="none" stroke="#EFE6D4" stroke-width="14"/>'+
    '<circle cx="84" cy="84" r="'+R+'" fill="none" stroke="'+(pass?'#2E9E7E':'#E8743B')+'" stroke-width="14" stroke-linecap="round" stroke-dasharray="'+C+'" stroke-dashoffset="'+off+'"/>'+
    '</svg><div class="num"><b>'+pct+'<span style="font-size:22px">%</span></b><span>'+q.score+' / '+n+'</span></div></div>'+
   '<div class="verdict '+(pass?'pass':'fail')+'">'+(pass?'合格ライン クリア！🎉':'もう ひといき！')+'</div>'+
   '<div class="sub">合格の めやすは 65% です</div></div>'+
   (q.wrong.length?'<div class="sec-l">まちがえた 場面</div><div class="miss">'+miss+'</div>':'')+
   '<button class="btn p" style="margin-top:18px" onclick="startSitu(S.situ.cat)">🔁 もう いちど</button>'+
   '<button class="btn g row" onclick="S.screen=\'situHome\';render()">🧭 ぶんやを えらぶ</button>'+
   '<button class="btn g row" onclick="S.screen=\'home\';render()">🏠 ホームへ</button>';
}
function statRows(map,nameFn){var keys=Object.keys(map);
 if(!keys.length)return '<div class="rec-row"><div class="rl" style="width:auto;color:var(--ink3);font-weight:500">まだ ありません</div></div>';
 return keys.map(function(k){var b=map[k],p=pctOf(b),weak=(b.q>0&&p<65);
  return '<div class="rec-row'+(weak?' weak':'')+'"><div class="rl">'+nameFn(k)+'</div>'+
   '<div class="rb"><i style="width:'+p+'%"></i></div><div class="rp">'+p+'%<small>'+b.correct+'/'+b.q+'</small></div></div>';
 }).join('');}
function recordsScreen(){
 var seen=Object.keys(P.terms).length;
 var learned=Object.keys(P.terms).filter(function(k){return P.terms[k].correct>0;}).length;
 var totalQ=P.quiz.q+P.drill.q+P.situ.q;
 var body = totalQ===0
  ? '<div class="note" style="margin-top:4px">まだ きろくが ありません。クイズや 実技（計算ドリル・状況判断）を やると、ここに <b>定着率</b>・<b>分野別の 正答率</b>・<b>つづけた 日数</b>が 出ます。</div>'
  : '<div class="sec-l">つづけた 日数（継続）</div>'+
    '<div class="statcard"><div class="big">'+streakDays()+'<small>日 れんぞく</small></div><div class="bigsub">のべ '+P.days.length+'日 ・ もんだい のべ '+totalQ+'もん</div></div>'+
    '<div class="sec-l">ことばの 定着</div>'+
    '<div class="statcard"><div class="big">'+learned+' / 151<small>語 おぼえた</small></div><div class="bigsub">出会った語 '+seen+' ・ クイズ正答率 '+pctOf(P.quiz)+'%</div></div>'+
    '<div class="sec-l">分野別の 正答率（語彙クイズ）</div>'+statRows(P.quiz.by,function(k){return CAT[k]?catLabel(k):k;})+
    '<div class="sec-l">状況判断（分野別）</div>'+statRows(P.situ.by,function(k){return k;})+
    '<div class="sec-l">計算ドリル（公式別）</div>'+statRows(P.drill.by,function(k){return FMAP[k]?strip(FMAP[k].name):k;})+
    '<div class="note" style="margin-top:12px"><b>赤い行</b>は 正答率 65%みまんの にがてな ところです。<br>この きろくは この 端末に ほぞんされ、ログインは いりません。</div>';
 app.innerHTML=fheader()+
  '<button class="back" onclick="S.screen=\'home\';render()">‹ ホーム</button>'+
  '<div class="chead"><div class="ic" style="background:#FBE7DA;color:var(--persimmon-d)">📊</div><div><h2>学習の きろく</h2><div class="en">この 端末に ほぞん・ログイン不要</div></div></div>'+
  body+
  '<button class="btn g" style="margin-top:20px" onclick="if(confirm(\'学習の きろくを すべて けしますか？\')){resetP();render()}">🗑 きろくを けす</button>';
}
setF(true); render();
</script>
</body>
</html>
