     example:"まず<ruby>危害<rt>きがい</rt></ruby><ruby>要因<rt>よういん</rt></ruby><ruby>分析<rt>ぶんせき</rt></ruby>で、<ruby>危険<rt>きけん</rt></ruby>を<ruby>洗<rt>あら</rt></ruby>い<ruby>出<rt class=ez>だ</rt></ruby>します。",source:"厚生労働省",translations:{id:null,vn:null,ne:null,mm:null}},
    {id:"eisei-cl",field:"gaisyoku",category:"eisei",priority:2,level:"ssw2",
     term:"管理基準（CL）",reading:"かんりきじゅん",
     meaning:"<ruby>重要管理点<rt>じゅうようかんりてん</rt></ruby>で<ruby>守<rt class=ez>まも</rt></ruby>る<ruby>基準<rt>きじゅん</rt></ruby>の<ruby>数字<rt class=ez>すうじ</rt></ruby>。「<ruby>中心<rt class=ez>ちゅうしん</rt></ruby>75℃で1<ruby>分<rt class=ez>ぷん</rt></ruby>」など。",
     example:"<ruby>管理基準<rt>かんりきじゅん</rt></ruby>を<ruby>守<rt class=ez>まも</rt></ruby>れたか、<ruby>毎回<rt class=ez>まいかい</rt></ruby><ruby>確認<rt>かくにん</rt></ruby>します。",source:"厚生労働省",translations:{id:null,vn:null,ne:null,mm:null}},
    {id:"eisei-monitoring",field:"gaisyoku",category:"eisei",priority:2,level:"ssw2",
     term:"モニタリング",reading:"もにたりんぐ",
     meaning:"<ruby>管理基準<rt>かんりきじゅん</rt></ruby>を<ruby>守<rt class=ez>まも</rt></ruby>れているか、いつも<ruby>見<rt class=ez>み</rt></ruby>て<ruby>記録<rt>きろく</rt></ruby>すること。",
     example:"<ruby>温度<rt class=ez>おんど</rt></ruby>をモニタリングして、<ruby>記録<rt>きろく</rt></ruby>します。",source:"厚生労働省",translations:{id:null,vn:null,ne:null,mm:null}},
    {id:"eisei-tearai",field:"gaisyoku",category:"eisei",priority:3,level:"ssw1",
     term:"手洗い",reading:"てあらい",
     meaning:"<ruby>食中毒<rt>しょくちゅうどく</rt></ruby>を<ruby>防<rt>ふせ</rt></ruby>ぐための、<ruby>最<rt>もっと</rt></ruby>も<ruby>基本<rt>きほん</rt></ruby><ruby>的<rt>てき</rt></ruby>で<ruby>大切<rt class=ez>たいせつ</rt></ruby>な<ruby>行動<rt class=ez>こうどう</rt></ruby>。<ruby>指<rt class=ez>ゆび</rt></ruby>の<ruby>間<rt class=ez>あいだ</rt></ruby>や<ruby>爪<rt>つめ</rt></ruby>の<ruby>中<rt class=ez>なか</rt></ruby>も<ruby>洗<rt>あら</rt></ruby>う。<ruby>多<rt class=ez>おお</rt></ruby>くの<ruby>食中毒菌<rt>しょくちゅうどくきん</rt></ruby>やウイルスは<ruby>手<rt class=ez>て</rt></ruby>を<ruby>通<rt class=ez>とお</rt></ruby>して<ruby>食品<rt class=ez>しょくひん</rt></ruby>に<ruby>移<rt>うつ</rt></ruby>るため、トイレの<ruby>後<rt class=ez>あと</rt></ruby>・<ruby>作業<rt class=ez>さぎょう</rt></ruby>の<ruby>前<rt class=ez>まえ</rt></ruby>・<ruby>生<rt class=ez>なま</rt></ruby>の<ruby>肉<rt class=ez>にく</rt></ruby>や<ruby>魚<rt class=ez>さかな</rt></ruby>を<ruby>触<rt>さわ</rt></ruby>った<ruby>後<rt class=ez>あと</rt></ruby>などは<ruby>必<rt>かなら</rt></ruby>ず<ruby>手<rt class=ez>て</rt></ruby>を<ruby>洗<rt>あら</rt></ruby>う。",
     example:"トイレの<ruby>後<rt class=ez>あと</rt></ruby>や<ruby>調理<rt class=ez>ちょうり</rt></ruby>の<ruby>前<rt class=ez>まえ</rt></ruby>に、<ruby>必<rt>かなら</rt></ruby>ず<ruby>手洗<rt>てあら</rt></ruby>いをします。",source:"厚生労働省",translations:{id:null,vn:null,ne:null,mm:null}},
    {id:"eisei-nimaigai",field:"gaisyoku",category:"eisei",priority:3,level:"ssw2",
     term:"二枚貝の加熱",reading:"にまいがいのかねつ",
     meaning:"カキなど<ruby>二枚貝<rt>にまいがい</rt></ruby>はノロウイルスがいることがあるので、<ruby>中心<rt class=ez>ちゅうしん</rt></ruby>85〜90℃で90<ruby>秒<rt class=ez>びょう</rt></ruby><ruby>以上<rt>いじょう</rt></ruby><ruby>加熱<rt>かねつ</rt></ruby>する。",
     example:"カキは<ruby>中心<rt class=ez>ちゅうしん</rt></ruby>までしっかり<ruby>加熱<rt>かねつ</rt></ruby>して、ノロウイルスを<ruby>防<rt>ふせ</rt></ruby>ぎます。",source:"厚生労働省大量調理施設衛生管理マニュアル",translations:{id:null,vn:null,ne:null,mm:null}},
    {id:"eisei-sedaijikan",field:"gaisyoku",category:"eisei",priority:2,level:"ssw2",
     term:"世代時間",reading:"せだいじかん",
     meaning:"<ruby>菌<rt>きん</rt></ruby>が2<ruby>倍<rt class=ez>ばい</rt></ruby>に<ruby>増<rt>ふ</rt></ruby>えるまでの<ruby>時間<rt class=ez>じかん</rt></ruby>。<ruby>条件<rt>じょうけん</rt></ruby>がよいと、およそ20<ruby>分<rt class=ez>ぷん</rt></ruby>。",
     example:"<ruby>菌<rt>きん</rt></ruby>は<ruby>世代<rt class=ez>せだい</rt></ruby><ruby>時間<rt class=ez>じかん</rt></ruby>が<ruby>短<rt class=ez>みじか</rt></ruby>く、すぐに<ruby>増<rt>ふ</rt></ruby>えます。",source:"厚生労働省",translations:{id:null,vn:null,ne:null,mm:null}},
    {id:"eisei-shoryokansen",field:"gaisyoku",category:"eisei",priority:2,level:"ssw2",
     term:"少量感染",reading:"しょうりょうかんせん",
     meaning:"<ruby>少<rt class=ez>すこ</rt></ruby>しの<ruby>菌<rt>きん</rt></ruby>やウイルスでも<ruby>感染<rt>かんせん</rt></ruby>すること。O157やノロはとくに<ruby>注意<rt class=ez>ちゅうい</rt></ruby>。",
     example:"O157は<ruby>少量<rt>しょうりょう</rt></ruby><ruby>感染<rt>かんせん</rt></ruby>するので、よく<ruby>加熱<rt>かねつ</rt></ruby>します。",source:"厚生労働省",translations:{id:null,vn:null,ne:null,mm:null}},
    {id:"eisei-fukensei",field:"gaisyoku",category:"eisei",priority:1,level:"ssw2",
     term:"不顕性感染",reading:"ふけんせいかんせん",
     meaning:"<ruby>症状<rt>しょうじょう</rt></ruby>が<ruby>出<rt class=ez>で</rt></ruby>ないのに、<ruby>菌<rt>きん</rt></ruby>やウイルスを<ruby>持<rt class=ez>も</rt></ruby>っている<ruby>状態<rt>じょうたい</rt></ruby>。",
     example:"<ruby>元気<rt class=ez>げんき</rt></ruby>でも<ruby>不顕性<rt>ふけんせい</rt></ruby><ruby>感染<rt>かんせん</rt></ruby>のことがあるので、<ruby>手洗<rt>てあら</rt></ruby>いをします。",source:"厚生労働省",translations:{id:null,vn:null,ne:null,mm:null}},
    {id:"eisei-kaizensochi",field:"gaisyoku",category:"eisei",priority:2,level:"ssw2",
     term:"改善措置",reading:"かいぜんそち",
     meaning:"HACCPで、<ruby>管理基準<rt>かんりきじゅん</rt></ruby>を<ruby>外<rt class=ez>はず</rt></ruby>れたときにする<ruby>対応<rt>たいおう</rt></ruby>。",
     example:"<ruby>温度<rt class=ez>おんど</rt></ruby>が<ruby>足<rt class=ez>た</rt></ruby>りなければ、<ruby>改善<rt>かいぜん</rt></ruby><ruby>措置<rt>そち</rt></ruby>として<ruby>加熱<rt>かねつ</rt></ruby>し<ruby>直<rt class=ez>なお</rt></ruby>します。",source:"厚生労働省",translations:{id:null,vn:null,ne:null,mm:null}},
    {id:"eisei-kensho",field:"gaisyoku",category:"eisei",priority:2,level:"ssw2",
     term:"検証",reading:"けんしょう",
     meaning:"HACCPで、<ruby>管理<rt>かんり</rt></ruby>のやり<ruby>方<rt class=ez>かた</rt></ruby>が<ruby>正<rt class=ez>ただ</rt></ruby>しくできているか<ruby>確<rt>たし</rt></ruby>かめること。",
     example:"<ruby>記録<rt>きろく</rt></ruby>を<ruby>見<rt class=ez>み</rt></ruby>て、ちゃんとできているか<ruby>検証<rt>けんしょう</rt></ruby>します。",source:"厚生労働省",translations:{id:null,vn:null,ne:null,mm:null}},
    {id:"eisei-kiroku",field:"gaisyoku",category:"eisei",priority:3,level:"ssw2",
     term:"記録",reading:"きろく",
     meaning:"いつ・<ruby>何度<rt class=ez>なんど</rt></ruby>で<ruby>加熱<rt>かねつ</rt></ruby>したかなどを<ruby>書<rt class=ez>か</rt></ruby>いて<ruby>残<rt>のこ</rt></ruby>すこと。HACCPの<ruby>大切<rt class=ez>たいせつ</rt></ruby>な<ruby>仕事<rt class=ez>しごと</rt></ruby>。",
     example:"<ruby>毎日<rt class=ez>まいにち</rt></ruby>、<ruby>温度<rt class=ez>おんど</rt></ruby>を<ruby>記録<rt>きろく</rt></ruby>して<ruby>残<rt>のこ</rt></ruby>します。",source:"厚生労働省",translations:{id:null,vn:null,ne:null,mm:null}},
    {id:"eisei-sakkin",field:"gaisyoku",category:"eisei",priority:2,level:"ssw2",
     term:"殺菌",reading:"さっきん",
     meaning:"<ruby>菌<rt>きん</rt></ruby>を<ruby>死<rt class=ez>し</rt></ruby>なせて<ruby>減<rt>へ</rt></ruby>らすこと。<ruby>加熱<rt>かねつ</rt></ruby>や<ruby>薬<rt class=ez>くすり</rt></ruby>で<ruby>行<rt class=ez>おこな</rt></ruby>う。",
     example:"<ruby>道具<rt class=ez>どうぐ</rt></ruby>を<ruby>熱湯<rt>ねっとう</rt></ruby>で<ruby>殺菌<rt>さっきん</rt></ruby>します。",source:"厚生労働省",translations:{id:null,vn:null,ne:null,mm:null}},
    {id:"eisei-shodoku",field:"gaisyoku",category:"eisei",priority:2,level:"ssw2",
     term:"消毒",reading:"しょうどく",
     meaning:"<ruby>害<rt>がい</rt></ruby>のない<ruby>量<rt>りょう</rt></ruby>まで<ruby>菌<rt>きん</rt></ruby>を<ruby>減<rt>へ</rt></ruby>らすこと。アルコールや<ruby>次亜塩素酸<rt>じあえんそさん</rt></ruby>ナトリウムなどを<ruby>使<rt class=ez>つか</rt></ruby>う。<ruby>似<rt>に</rt></ruby>た<ruby>言葉<rt>ことば</rt></ruby>と<ruby>混同<rt>こんどう</rt></ruby>しやすいので<ruby>注意<rt class=ez>ちゅうい</rt></ruby>。「<ruby>洗浄<rt>せんじょう</rt></ruby>」は<ruby>汚<rt>よご</rt></ruby>れを<ruby>水<rt class=ez>みず</rt></ruby>や<ruby>洗剤<rt>せんざい</rt></ruby>で<ruby>洗<rt>あら</rt></ruby>い<ruby>落<rt class=ez>お</rt></ruby>とすこと（<ruby>消毒<rt>しょうどく</rt></ruby>の<ruby>前<rt class=ez>まえ</rt></ruby>に<ruby>行<rt class=ez>おこな</rt></ruby>う）、「<ruby>殺菌<rt>さっきん</rt></ruby>」は<ruby>菌<rt>きん</rt></ruby>を<ruby>死<rt class=ez>し</rt></ruby>なせて<ruby>減<rt>へ</rt></ruby>らすこと。<ruby>順番<rt>じゅんばん</rt></ruby>は〈<ruby>洗浄<rt>せんじょう</rt></ruby>→<ruby>消毒<rt>しょうどく</rt></ruby>〉。",
     example:"テーブルを、アルコールで<ruby>消毒<rt>しょうどく</rt></ruby>します。",source:"厚生労働省",translations:{id:null,vn:null,ne:null,mm:null}},
    {id:"eisei-senjo",field:"gaisyoku",category:"eisei",priority:2,level:"ssw2",
     term:"洗浄",reading:"せんじょう",
     meaning:"<ruby>水<rt class=ez>みず</rt></ruby>や<ruby>洗剤<rt>せんざい</rt></ruby>で<ruby>汚<rt>よご</rt></ruby>れを<ruby>洗<rt>あら</rt></ruby>い<ruby>落<rt class=ez>お</rt></ruby>とすこと。<ruby>消毒<rt>しょうどく</rt></ruby>の<ruby>前<rt class=ez>まえ</rt></ruby>に<ruby>行<rt class=ez>おこな</rt></ruby>う。",
     example:"まず<ruby>洗浄<rt>せんじょう</rt></ruby>して、その<ruby>後<rt class=ez>あと</rt></ruby><ruby>消毒<rt>しょうどく</rt></ruby>します。",source:"厚生労働省",translations:{id:null,vn:null,ne:null,mm:null}},
    {id:"eisei-junzuru",field:"gaisyoku",category:"eisei",priority:2,level:"ssw2",
     term:"特定原材料に準ずるもの（20品目）",reading:"とくていげんざいりょうにじゅんずるもの",
     meaning:"アレルギー<ruby>表示<rt>ひょうじ</rt></ruby>が<ruby>勧<rt>すす</rt></ruby>められている（<ruby>任意<rt>にんい</rt></ruby>の）20<ruby>品目<rt class=ez>ひんもく</rt></ruby>。<ruby>表示<rt>ひょうじ</rt></ruby>が<ruby>義務<rt>ぎむ</rt></ruby>の9<ruby>品目<rt class=ez>ひんもく</rt></ruby>とは<ruby>別<rt>べつ</rt></ruby>。",
     example:"アーモンドなどは、<ruby>準<rt>じゅん</rt></ruby>ずるものとして<ruby>表示<rt>ひょうじ</rt></ruby>が<ruby>勧<rt>すす</rt></ruby>められています。",source:"消費者庁",translations:{id:null,vn:null,ne:null,mm:null}},
    {id:"eisei-allergen",field:"gaisyoku",category:"eisei",priority:3,level:"ssw1",
     term:"アレルゲン",reading:"あれるげん",
     meaning:"<ruby>食<rt class=ez>た</rt></ruby>べるとアレルギーを<ruby>起<rt class=ez>お</rt></ruby>こすことがある<ruby>原材料<rt>げんざいりょう</rt></ruby>（<ruby>卵<rt>たまご</rt></ruby>・<ruby>乳<rt>にゅう</rt></ruby>・<ruby>小麦<rt class=ez>こむぎ</rt></ruby>など）。",
     example:"お<ruby>客<rt class=ez>きゃく</rt></ruby>さまに、アレルゲンを<ruby>必<rt>かなら</rt></ruby>ず<ruby>確認<rt>かくにん</rt></ruby>します。",source:"消費者庁",translations:{id:null,vn:null,ne:null,mm:null}},
    {id:"eisei-recall",field:"gaisyoku",category:"eisei",priority:1,level:"ssw2",
     term:"食品リコール（自主回収）",reading:"しょくひんりこーる",
     meaning:"<ruby>問題<rt class=ez>もんだい</rt></ruby>が<ruby>見<rt class=ez>み</rt></ruby>つかった<ruby>食品<rt class=ez>しょくひん</rt></ruby>を、<ruby>店<rt class=ez>みせ</rt></ruby>や<ruby>会社<rt class=ez>かいしゃ</rt></ruby>が<ruby>集<rt class=ez>あつ</rt></ruby>めて<ruby>戻<rt>もど</rt></ruby>すこと。",
     example:"アレルギー<ruby>表示<rt>ひょうじ</rt></ruby>の<ruby>間違<rt>まちが</rt></ruby>いで、<ruby>食品<rt class=ez>しょくひん</rt></ruby>リコールになることがあります。",source:"消費者庁",translations:{id:null,vn:null,ne:null,mm:null}},
    {id:"eisei-codex",field:"gaisyoku",category:"eisei",priority:1,level:"ssw2",
     term:"CODEX（コーデックス）",reading:"こーでっくす",
     meaning:"<ruby>食品<rt class=ez>しょくひん</rt></ruby>の<ruby>安全<rt class=ez>あんぜん</rt></ruby>について<ruby>国際<rt>こくさい</rt></ruby><ruby>的<rt>てき</rt></ruby>に<ruby>決<rt class=ez>き</rt></ruby>めた<ruby>基準<rt>きじゅん</rt></ruby>。HACCPのもとになっている。",
     example:"HACCPは、コーデックスの<ruby>考<rt class=ez>かんが</rt></ruby>え<ruby>方<rt class=ez>かた</rt></ruby>を<ruby>使<rt class=ez>つか</rt></ruby>っています。",source:"厚生労働省／コーデックス委員会",translations:{id:null,vn:null,ne:null,mm:null}},
    {id:"eisei-kigaiyoin",field:"gaisyoku",category:"eisei",priority:2,level:"ssw2",
     term:"危害要因（ハザード）",reading:"きがいよういん",
     meaning:"<ruby>食品<rt class=ez>しょくひん</rt></ruby>を<ruby>危険<rt>きけん</rt></ruby>にするもと。<ruby>生物的<rt>せいぶつてき</rt></ruby>（<ruby>菌<rt>きん</rt></ruby>）・<ruby>化学的<rt>かがくてき</rt></ruby>（<ruby>洗剤<rt>せんざい</rt></ruby>）・<ruby>物理的<rt>ぶつりてき</rt></ruby>（<ruby>異物<rt>いぶつ</rt></ruby>）の3つ。",
     example:"<ruby>危害<rt>きがい</rt></ruby><ruby>要因<rt>よういん</rt></ruby>を、3つの<ruby>種類<rt>しゅるい</rt></ruby>で<ruby>考<rt class=ez>かんが</rt></ruby>えます。",source:"厚生労働省",translations:{id:null,vn:null,ne:null,mm:null}},
    {id:"eisei-7gensoku",field:"gaisyoku",category:"eisei",priority:1,level:"ssw2",
     term:"7原則12手順",reading:"ななげんそくじゅうにてじゅん",
     meaning:"HACCPを<ruby>進<rt class=ez>すす</rt></ruby>めるときの、<ruby>決<rt class=ez>き</rt></ruby>まった<ruby>順番<rt>じゅんばん</rt></ruby>。7つの<ruby>原則<rt>げんそく</rt></ruby>と12の<ruby>手順<rt>てじゅん</rt></ruby>。",
     example:"HACCPは、7<ruby>原則<rt>げんそく</rt></ruby>12<ruby>手順<rt>てじゅん</rt></ruby>に<ruby>沿<rt>そ</rt></ruby>って<ruby>作<rt class=ez>つく</rt></ruby>ります。",source:"厚生労働省",translations:{id:null,vn:null,ne:null,mm:null}},

    // 店舗運営
    {id:"tenpo-qsc",field:"gaisyoku",category:"tenpo",priority:3,level:"ssw2",
     term:"QSC",reading:"キューエスシー",
     meaning:"<ruby>良<rt>よ</rt></ruby>いお<ruby>店<rt class=ez>みせ</rt></ruby>の<ruby>基本<rt>きほん</rt></ruby>。Quality（<ruby>品質<rt>ひんしつ</rt></ruby>）・Service（サービス）・Cleanliness（<ruby>清潔<rt>せいけつ</rt></ruby>さ）の3つ。2<ruby>号<rt class=ez>ごう</rt></ruby>では、これに「QSCA+H」を<ruby>加<rt>くわ</rt></ruby>えた<ruby>考<rt class=ez>かんが</rt></ruby>え<ruby>方<rt class=ez>かた</rt></ruby>も<ruby>大切<rt class=ez>たいせつ</rt></ruby>（くわしくで<ruby>解説<rt>かいせつ</rt></ruby>）。",
     example:"QSCをたかめて、お<ruby>客<rt class=ez>きゃく</rt></ruby>さまにまた<ruby>来<rt class=ez>き</rt></ruby>てもらいます。",source:"店舗運営テキスト",translations:{id:null,vn:null,ne:null,mm:null}},
    {id:"tenpo-genkaritsu",field:"gaisyoku",category:"tenpo",priority:3,level:"ssw2",
     term:"原価率",reading:"げんかりつ",
     meaning:"<ruby>売<rt class=ez>う</rt></ruby>った<ruby>金額<rt>きんがく</rt></ruby>のうち、<ruby>材料費<rt>ざいりょうひ</rt></ruby>がしめるわりあい。<ruby>低<rt>ひく</rt></ruby>いほどもうけが<ruby>出<rt class=ez>で</rt></ruby>やすい。",
     example:"この<ruby>料理<rt>りょうり</rt></ruby>の<ruby>原価率<rt>げんかりつ</rt></ruby>は30%です。",source:"店舗運営テキスト",translations:{id:null,vn:null,ne:null,mm:null}},
    {id:"tenpo-flcost",field:"gaisyoku",category:"tenpo",priority:3,level:"ssw2",
     term:"FLコスト",reading:"エフエルコスト",
     meaning:"<ruby>食材費<rt>しょくざいひ</rt></ruby>（Food）と<ruby>人件費<rt>じんけんひ</rt></ruby>（Labor）を<ruby>合<rt class=ez>あ</rt></ruby>わせた<ruby>金額<rt>きんがく</rt></ruby>。<ruby>店<rt class=ez>みせ</rt></ruby>の2<ruby>大<rt class=ez>だい</rt></ruby>コスト。",
     example:"FLコストを<ruby>下<rt class=ez>さ</rt></ruby>げると<ruby>利益<rt>りえき</rt></ruby>が<ruby>増<rt>ふ</rt></ruby>えます。",source:"店舗運営テキスト",translations:{id:null,vn:null,ne:null,mm:null}},
    {id:"tenpo-fl",field:"gaisyoku",category:"tenpo",priority:3,level:"ssw2",
     term:"FL比率",reading:"エフエルひりつ",
     meaning:"<ruby>売上<rt class=ez>うりあげ</rt></ruby>に<ruby>対<rt class=ez>たい</rt></ruby>するFLコストの<ruby>割合<rt>わりあい</rt></ruby>。＝（<ruby>食材費<rt>しょくざいひ</rt></ruby>＋<ruby>人件費<rt>じんけんひ</rt></ruby>）÷<ruby>売上高<rt class=ez>うりあげだか</rt></ruby>×100。<ruby>目安<rt class=ez>めやす</rt></ruby>は60%<ruby>前後<rt class=ez>ぜんご</rt></ruby>。",
     example:"FL<ruby>比率<rt>ひりつ</rt></ruby>は<ruby>売上<rt class=ez>うりあげ</rt></ruby>の60%<ruby>以下<rt>いか</rt></ruby>を<ruby>目指<rt class=ez>めざ</rt></ruby>します。",source:"店舗運営テキスト",translations:{id:null,vn:null,ne:null,mm:null}},
    {id:"tenpo-roudoubunpai",field:"gaisyoku",category:"tenpo",priority:3,level:"ssw2",
     term:"労働分配率",reading:"ろうどうぶんぱいりつ",
     meaning:"もうけ（<ruby>粗利益<rt>あらりえき</rt></ruby>）のうち、<ruby>人件費<rt>じんけんひ</rt></ruby>に<ruby>使<rt class=ez>つか</rt></ruby>うわりあい。だいたい35〜40%が<ruby>目安<rt class=ez>めやす</rt></ruby>。",
     example:"<ruby>労働分配率<rt>ろうどうぶんぱいりつ</rt></ruby>を<ruby>見<rt class=ez>み</rt></ruby>て、<ruby>働<rt>はたら</rt></ruby>く<ruby>人<rt class=ez>ひと</rt></ruby>の<ruby>数<rt class=ez>かず</rt></ruby>を<ruby>考<rt class=ez>かんが</rt></ruby>えます。",source:"店舗運営テキスト",translations:{id:null,vn:null,ne:null,mm:null}},
    {id:"tenpo-ninjiuriage",field:"gaisyoku",category:"tenpo",priority:3,level:"ssw2",
     term:"人時売上高",reading:"にんじうりあげだか",
     meaning:"1<ruby>時間<rt class=ez>じかん</rt></ruby><ruby>働<rt>はたら</rt></ruby>くごとに、どれだけ<ruby>売<rt class=ez>う</rt></ruby>れたか。＝<ruby>売上高<rt class=ez>うりあげだか</rt></ruby> ÷ <ruby>総労働時間<rt>そうろうどうじかん</rt></ruby>。",
     example:"<ruby>人時売上高<rt class=ez>にんじうりあげだか</rt></ruby>が<ruby>高<rt class=ez>たか</rt></ruby>いほど、<ruby>店<rt class=ez>みせ</rt></ruby>の<ruby>効率<rt>こうりつ</rt></ruby>が<ruby>良<rt>よ</rt></ruby>いです。",source:"店舗運営テキスト",translations:{id:null,vn:null,ne:null,mm:null}},
    {id:"tenpo-ninjiseisansei",field:"gaisyoku",category:"tenpo",priority:3,level:"ssw2",
     term:"人時生産性",reading:"にんじせいさんせい",
     meaning:"1<ruby>時間<rt class=ez>じかん</rt></ruby><ruby>働<rt>はたら</rt></ruby>くごとに<ruby>生<rt class=ez>う</rt></ruby>んだもうけ。＝<ruby>粗利益<rt>あらりえき</rt></ruby> ÷ <ruby>総労働時間<rt>そうろうどうじかん</rt></ruby>。",
     example:"<ruby>人時生産性<rt>にんじせいさんせい</rt></ruby>は<ruby>店<rt class=ez>みせ</rt></ruby>の<ruby>効率<rt>こうりつ</rt></ruby>を<ruby>見<rt class=ez>み</rt></ruby>る<ruby>数字<rt class=ez>すうじ</rt></ruby>です。",source:"店舗運営テキスト",translations:{id:null,vn:null,ne:null,mm:null}},
    {id:"tenpo-kyakutanka",field:"gaisyoku",category:"tenpo",priority:2,level:"ssw2",
     term:"客単価",reading:"きゃくたんか",
     meaning:"お<ruby>客<rt class=ez>きゃく</rt></ruby>さま1<ruby>人<rt class=ez>にん</rt></ruby>が<ruby>平均<rt>へいきん</rt></ruby>でいくら<ruby>使<rt class=ez>つか</rt></ruby>うか。",
     example:"<ruby>客単価<rt>きゃくたんか</rt></ruby>を<ruby>上<rt class=ez>あ</rt></ruby>げるためにセットメニューを<ruby>勧<rt>すす</rt></ruby>めます。",source:"店舗運営テキスト",translations:{id:null,vn:null,ne:null,mm:null}},
    {id:"tenpo-soneki",field:"gaisyoku",category:"tenpo",priority:2,level:"ssw2",
     term:"損益分岐点",reading:"そんえきぶんきてん",
     meaning:"もうけも<ruby>損<rt>そん</rt></ruby>もない、ちょうど0になる<ruby>売上<rt class=ez>うりあげ</rt></ruby>のライン。",
     example:"<ruby>損益分岐点<rt>そんえきぶんきてん</rt></ruby>を<ruby>超<rt>こ</rt></ruby>えるともうけが<ruby>出<rt class=ez>で</rt></ruby>ます。",source:"店舗運営テキスト",translations:{id:null,vn:null,ne:null,mm:null}},
    {id:"tenpo-tanaoroshi",field:"gaisyoku",category:"tenpo",priority:2,level:"ssw2",
     term:"棚卸し",reading:"たなおろし",
     meaning:"お<ruby>店<rt class=ez>みせ</rt></ruby>にある<ruby>食材<rt>しょくざい</rt></ruby>や<ruby>商品<rt class=ez>しょうひん</rt></ruby>の<ruby>数<rt class=ez>かず</rt></ruby>を、<ruby>実際<rt>じっさい</rt></ruby>に<ruby>数<rt class=ez>かぞ</rt></ruby>えて<ruby>確認<rt>かくにん</rt></ruby>すること。",
     example:"<ruby>月末<rt>げつまつ</rt></ruby>に<ruby>棚卸<rt>たなおろ</rt></ruby>しをして<ruby>在庫<rt>ざいこ</rt></ruby>を<ruby>確認<rt>かくにん</rt></ruby>します。",source:"店舗運営テキスト",translations:{id:null,vn:null,ne:null,mm:null}},
    {id:"tenpo-kenshu",field:"gaisyoku",category:"tenpo",priority:2,level:"ssw2",
     term:"検収",reading:"けんしゅう",
     meaning:"<ruby>届<rt>とど</rt></ruby>いた<ruby>食材<rt>しょくざい</rt></ruby>を、<ruby>注文<rt class=ez>ちゅうもん</rt></ruby><ruby>通<rt class=ez>どお</rt></ruby>りか・<ruby>品質<rt>ひんしつ</rt></ruby>はよいか<ruby>確<rt>たし</rt></ruby>かめて<ruby>受<rt class=ez>う</rt></ruby>け<ruby>取<rt class=ez>と</rt></ruby>ること。",
     example:"<ruby>検収<rt>けんしゅう</rt></ruby>で<ruby>数<rt class=ez>かず</rt></ruby>と<ruby>鮮度<rt>せんど</rt></ruby>を<ruby>確認<rt>かくにん</rt></ruby>します。",source:"店舗運営テキスト",translations:{id:null,vn:null,ne:null,mm:null}},
    {id:"tenpo-loss",field:"gaisyoku",category:"tenpo",priority:2,level:"ssw2",
     term:"食材ロス",reading:"しょくざいろす",
     meaning:"<ruby>作<rt class=ez>つく</rt></ruby>りすぎ・<ruby>売<rt class=ez>う</rt></ruby>れ<ruby>残<rt>のこ</rt></ruby>り・<ruby>廃棄<rt>はいき</rt></ruby>などで、むだになった<ruby>食材<rt>しょくざい</rt></ruby>や<ruby>商品<rt class=ez>しょうひん</rt></ruby>。",
     example:"<ruby>食材<rt>しょくざい</rt></ruby>のロスを<ruby>減<rt>へ</rt></ruby>らすともうけが<ruby>増<rt>ふ</rt></ruby>えます。",source:"店舗運営テキスト",translations:{id:null,vn:null,ne:null,mm:null}},
    {id:"tenpo-abc",field:"gaisyoku",category:"tenpo",priority:1,level:"ssw2",
     term:"ABC分析",reading:"エービーシーぶんせき",
     meaning:"<ruby>売<rt class=ez>う</rt></ruby>れ<ruby>行<rt class=ez>ゆ</rt></ruby>きで<ruby>商品<rt class=ez>しょうひん</rt></ruby>を A・B・Cに<ruby>分<rt class=ez>わ</rt></ruby>けて、<ruby>力<rt class=ez>ちから</rt></ruby>の<ruby>入<rt class=ez>い</rt></ruby>れ<ruby>方<rt class=ez>かた</rt></ruby>を<ruby>決<rt class=ez>き</rt></ruby>める<ruby>方法<rt>ほうほう</rt></ruby>。",
     example:"ABC<ruby>分析<rt>ぶんせき</rt></ruby>でよく<ruby>売<rt class=ez>う</rt></ruby>れる<ruby>商品<rt class=ez>しょうひん</rt></ruby>を<ruby>見<rt class=ez>み</rt></ruby><ruby>付<rt>つ</rt></ruby>けます。",source:"店舗運営テキスト",translations:{id:null,vn:null,ne:null,mm:null}},
    {id:"tenpo-uriagedaka",field:"gaisyoku",category:"tenpo",priority:3,level:"ssw2",
     term:"売上高",reading:"うりあげだか",
     meaning:"お<ruby>店<rt class=ez>みせ</rt></ruby>が<ruby>商品<rt class=ez>しょうひん</rt></ruby>を<ruby>売<rt class=ez>う</rt></ruby>って<ruby>得<rt>え</rt></ruby>た<ruby>お金<rt class=ez>かね</rt></ruby>の<ruby>合計<rt class=ez>ごうけい</rt></ruby>。",
     example:"<ruby>今日<rt>きょう</rt></ruby>の<ruby>売上高<rt class=ez>うりあげだか</rt></ruby>をレジで<ruby>確認<rt>かくにん</rt></ruby>します。",source:"店舗運営テキスト",translations:{id:null,vn:null,ne:null,mm:null}},
    {id:"tenpo-ararieki",field:"gaisyoku",category:"tenpo",priority:3,level:"ssw2",
     term:"粗利益",reading:"あらりえき",
     meaning:"<ruby>売上高<rt class=ez>うりあげだか</rt></ruby>から<ruby>原価<rt>げんか</rt></ruby>（<ruby>材料費<rt>ざいりょうひ</rt></ruby>）を<ruby>引<rt class=ez>ひ</rt></ruby>いたもうけ。",
     example:"<ruby>粗利益<rt>あらりえき</rt></ruby>＝<ruby>売上高<rt class=ez>うりあげだか</rt></ruby>−<ruby>原価<rt>げんか</rt></ruby>です。",source:"店舗運営テキスト",translations:{id:null,vn:null,ne:null,mm:null}},
    {id:"tenpo-eigyourieki",field:"gaisyoku",category:"tenpo",priority:2,level:"ssw2",
     term:"営業利益",reading:"えいぎょうりえき",
     meaning:"<ruby>粗利益<rt>あらりえき</rt></ruby>から<ruby>人件費<rt>じんけんひ</rt></ruby>や<ruby>家賃<rt>やちん</rt></ruby>などの<ruby>費用<rt>ひよう</rt></ruby>を<ruby>引<rt class=ez>ひ</rt></ruby>いた、お<ruby>店<rt class=ez>みせ</rt></ruby>のもうけ。",
     example:"<ruby>費用<rt>ひよう</rt></ruby>を<ruby>減<rt>へ</rt></ruby>らすと<ruby>営業<rt>えいぎょう</rt></ruby><ruby>利益<rt>りえき</rt></ruby>が<ruby>増<rt>ふ</rt></ruby>えます。",source:"店舗運営テキスト",translations:{id:null,vn:null,ne:null,mm:null}},
    {id:"tenpo-ninji",field:"gaisyoku",category:"tenpo",priority:2,level:"ssw2",
     term:"人時（マンアワー）",reading:"にんじ",
     meaning:"1<ruby>人<rt class=ez>ひと</rt></ruby>が1<ruby>時間<rt class=ez>じかん</rt></ruby><ruby>働<rt>はたら</rt></ruby>く<ruby>仕事<rt class=ez>しごと</rt></ruby>の<ruby>量<rt>りょう</rt></ruby>の<ruby>単位<rt>たんい</rt></ruby>。",
     example:"<ruby>必要<rt>ひつよう</rt></ruby>な<ruby>人時<rt class=ez>にんじ</rt></ruby>を<ruby>計算<rt class=ez>けいさん</rt></ruby>してシフトを<ruby>作<rt class=ez>つく</rt></ruby>ります。",source:"店舗運営テキスト",translations:{id:null,vn:null,ne:null,mm:null}},
    {id:"tenpo-sekkyakuseisansei",field:"gaisyoku",category:"tenpo",priority:1,level:"ssw2",
     term:"接客生産性",reading:"せっきゃくせいさんせい",
     meaning:"1<ruby>時間<rt class=ez>じかん</rt></ruby><ruby>働<rt>はたら</rt></ruby>くごとに<ruby>何人<rt class=ez>なんにん</rt></ruby>のお<ruby>客<rt class=ez>きゃく</rt></ruby>さまを<ruby>接客<rt>せっきゃく</rt></ruby>できたか。＝<ruby>客数<rt class=ez>きゃくすう</rt></ruby> ÷ <ruby>総労働時間<rt>そうろうどうじかん</rt></ruby>。",
     example:"<ruby>接客<rt>せっきゃく</rt></ruby><ruby>生産性<rt>せいさんせい</rt></ruby>を<ruby>見<rt class=ez>み</rt></ruby>て<ruby>人<rt class=ez>ひと</rt></ruby>の<ruby>数<rt class=ez>かず</rt></ruby>を<ruby>決<rt class=ez>き</rt></ruby>めます。",source:"店舗運営テキスト",translations:{id:null,vn:null,ne:null,mm:null}},
    {id:"tenpo-kyakusu",field:"gaisyoku",category:"tenpo",priority:2,level:"ssw2",
     term:"客数",reading:"きゃくすう",
     meaning:"お<ruby>店<rt class=ez>みせ</rt></ruby>に<ruby>来<rt class=ez>き</rt></ruby>たお<ruby>客<rt class=ez>きゃく</rt></ruby>さまの<ruby>人数<rt class=ez>にんずう</rt></ruby>。",
     example:"<ruby>客数<rt class=ez>きゃくすう</rt></ruby>×<ruby>客単価<rt>きゃくたんか</rt></ruby>で<ruby>売上<rt class=ez>うりあげ</rt></ruby>が<ruby>決<rt class=ez>き</rt></ruby>まります。",source:"店舗運営テキスト",translations:{id:null,vn:null,ne:null,mm:null}},
    {id:"tenpo-flr",field:"gaisyoku",category:"tenpo",priority:1,level:"ssw2",
     term:"FLR",reading:"エフエルアール",
     meaning:"<ruby>食材費<rt>しょくざいひ</rt></ruby>（F）＋<ruby>人件費<rt>じんけんひ</rt></ruby>（L）＋<ruby>家賃<rt>やちん</rt></ruby>（R）。<ruby>店<rt class=ez>みせ</rt></ruby>の<ruby>大<rt class=ez>おお</rt></ruby>きな3つの<ruby>費用<rt>ひよう</rt></ruby>。",
     example:"FLRを<ruby>売上<rt class=ez>うりあげ</rt></ruby>の<ruby>中<rt class=ez>なか</rt></ruby>で<ruby>管理<rt>かんり</rt></ruby>します。",source:"店舗運営テキスト",translations:{id:null,vn:null,ne:null,mm:null}},
    {id:"tenpo-hacchu",field:"gaisyoku",category:"tenpo",priority:3,level:"ssw2",
     term:"発注",reading:"はっちゅう",
     meaning:"<ruby>必要<rt>ひつよう</rt></ruby>な<ruby>食材<rt>しょくざい</rt></ruby>や<ruby>商品<rt class=ez>しょうひん</rt></ruby>を<ruby>注文<rt class=ez>ちゅうもん</rt></ruby>して<ruby>仕入<rt class=ez>しい</rt></ruby>れること。",
     example:"<ruby>在庫<rt>ざいこ</rt></ruby>を<ruby>見<rt class=ez>み</rt></ruby>て<ruby>発注<rt class=ez>はっちゅう</rt></ruby>します。",source:"店舗運営テキスト",translations:{id:null,vn:null,ne:null,mm:null}},
    {id:"tenpo-zaiko",field:"gaisyoku",category:"tenpo",priority:2,level:"ssw2",
     term:"在庫",reading:"ざいこ",
     meaning:"お<ruby>店<rt class=ez>みせ</rt></ruby>に<ruby>今<rt class=ez>いま</rt></ruby>ある<ruby>食材<rt>しょくざい</rt></ruby>や<ruby>商品<rt class=ez>しょうひん</rt></ruby>の<ruby>残<rt>のこ</rt></ruby>り。",
     example:"<ruby>在庫<rt>ざいこ</rt></ruby>が<ruby>少<rt class=ez>すく</rt></ruby>なくなったら<ruby>発注<rt class=ez>はっちゅう</rt></ruby>します。",source:"店舗運営テキスト",translations:{id:null,vn:null,ne:null,mm:null}},
    {id:"tenpo-overportion",field:"gaisyoku",category:"tenpo",priority:1,level:"ssw2",
     term:"オーバーポーション",reading:"おーばーぽーしょん",
     meaning:"<ruby>決<rt class=ez>き</rt></ruby>められた<ruby>量<rt>りょう</rt></ruby>より<ruby>多<rt class=ez>おお</rt></ruby>く<ruby>盛<rt>も</rt></ruby>ってしまうこと。<ruby>原価率<rt>げんかりつ</rt></ruby>が<ruby>上<rt class=ez>あ</rt></ruby>がる<ruby>原因<rt>げんいん</rt></ruby>。",
     example:"オーバーポーションを<ruby>無<rt>な</rt></ruby>くすと<ruby>原価率<rt>げんかりつ</rt></ruby>が<ruby>下<rt class=ez>さ</rt></ruby>がります。",source:"店舗運営テキスト",translations:{id:null,vn:null,ne:null,mm:null}},
    {id:"tenpo-fifo",field:"gaisyoku",category:"tenpo",priority:2,level:"ssw2",
     term:"先入れ先出し",reading:"さきいれさきだし",
     meaning:"<ruby>古<rt class=ez>ふる</rt></ruby>い<ruby>食材<rt>しょくざい</rt></ruby>から<ruby>先<rt class=ez>さき</rt></ruby>に<ruby>使<rt class=ez>つか</rt></ruby>うルール。<ruby>古<rt class=ez>ふる</rt></ruby>くなって<ruby>捨<rt>す</rt></ruby>てることを<ruby>減<rt>へ</rt></ruby>らす。",
     example:"<ruby>先入<rt class=ez>さきい</rt></ruby>れ<ruby>先出<rt class=ez>さきだ</rt></ruby>しを<ruby>守<rt class=ez>まも</rt></ruby>ってロスを<ruby>防<rt>ふせ</rt></ruby>ぎます。",source:"店舗運営テキスト",translations:{id:null,vn:null,ne:null,mm:null}},
    {id:"tenpo-hanbaisokushin",field:"gaisyoku",category:"tenpo",priority:2,level:"ssw2",
     term:"販売促進",reading:"はんばいそくしん",
     meaning:"お<ruby>客<rt class=ez>きゃく</rt></ruby>さまにもっと<ruby>買<rt class=ez>か</rt></ruby>ってもらうためのくふう。クーポンやセットなど。",
     example:"<ruby>販売<rt>はんばい</rt></ruby><ruby>促進<rt>そくしん</rt></ruby>で<ruby>客単価<rt>きゃくたんか</rt></ruby>を<ruby>上<rt class=ez>あ</rt></ruby>げます。",source:"店舗運営テキスト",translations:{id:null,vn:null,ne:null,mm:null}},
    {id:"tenpo-point",field:"gaisyoku",category:"tenpo",priority:1,level:"ssw2",
     term:"ポイント制度",reading:"ぽいんとせいど",
     meaning:"<ruby>買<rt class=ez>か</rt></ruby>い<ruby>物<rt class=ez>もの</rt></ruby>でたまったポイントを<ruby>次<rt class=ez>つぎ</rt></ruby>に<ruby>使<rt class=ez>つか</rt></ruby>えるしくみ。<ruby>固定客<rt>こていきゃく</rt></ruby>づくりに<ruby>役立<rt class=ez>やくだ</rt></ruby>つ。",
     example:"ポイント<ruby>制度<rt>せいど</rt></ruby>でまた<ruby>来<rt class=ez>き</rt></ruby>てもらいます。",source:"店舗運営テキスト",translations:{id:null,vn:null,ne:null,mm:null}},
    {id:"tenpo-cashless",field:"gaisyoku",category:"tenpo",priority:2,level:"ssw2",
     term:"電子決済",reading:"でんしけっさい",
     meaning:"<ruby>現金<rt>げんきん</rt></ruby>を<ruby>使<rt class=ez>つか</rt></ruby>わず、カードやスマホで<ruby>払<rt>はら</rt></ruby>う<ruby>方法<rt>ほうほう</rt></ruby>。",
     example:"<ruby>電子<rt class=ez>でんし</rt></ruby><ruby>決済<rt>けっさい</rt></ruby>に<ruby>対応<rt>たいおう</rt></ruby>すると<ruby>会計<rt class=ez>かいけい</rt></ruby>が<ruby>早<rt class=ez>はや</rt></ruby>くなります。",source:"店舗運営テキスト",translations:{id:null,vn:null,ne:null,mm:null}},
    {id:"tenpo-waribiki",field:"gaisyoku",category:"tenpo",priority:1,level:"ssw2",
     term:"割引",reading:"わりびき",
     meaning:"<ruby>決<rt class=ez>き</rt></ruby>まった<ruby>値段<rt>ねだん</rt></ruby>から<ruby>安<rt class=ez>やす</rt></ruby>くすること。",
     example:"<ruby>夕方<rt class=ez>ゆうがた</rt></ruby>に<ruby>割引<rt>わりびき</rt></ruby>して<ruby>売<rt class=ez>う</rt></ruby>り<ruby>切<rt class=ez>き</rt></ruby>ります。",source:"店舗運営テキスト",translations:{id:null,vn:null,ne:null,mm:null}},
    {id:"tenpo-delivery",field:"gaisyoku",category:"tenpo",priority:1,level:"ssw2",
     term:"デリバリー（宅配）",reading:"でりばりー",
     meaning:"<ruby>料理<rt>りょうり</rt></ruby>をお<ruby>客<rt class=ez>きゃく</rt></ruby>さまのところまで<ruby>届<rt>とど</rt></ruby>けるサービス。",
     example:"デリバリーでお<ruby>店<rt class=ez>みせ</rt></ruby>の<ruby>外<rt class=ez>そと</rt></ruby>のお<ruby>客<rt class=ez>きゃく</rt></ruby>さまにも<ruby>売<rt class=ez>う</rt></ruby>れます。",source:"店舗運営テキスト",translations:{id:null,vn:null,ne:null,mm:null}},
    {id:"tenpo-koteikyaku",field:"gaisyoku",category:"tenpo",priority:2,level:"ssw2",
     term:"固定客",reading:"こていきゃく",
     meaning:"<ruby>何度<rt class=ez>なんど</rt></ruby>も<ruby>来<rt class=ez>き</rt></ruby>てくれる、なじみのお<ruby>客<rt class=ez>きゃく</rt></ruby>さま。",
     example:"<ruby>固定客<rt>こていきゃく</rt></ruby>を<ruby>大切<rt class=ez>たいせつ</rt></ruby>にします。",source:"店舗運営テキスト",translations:{id:null,vn:null,ne:null,mm:null}},
    {id:"tenpo-shinkikyaku",field:"gaisyoku",category:"tenpo",priority:1,level:"ssw2",
     term:"新規客",reading:"しんききゃく",
     meaning:"<ruby>初<rt>はじ</rt></ruby>めて<ruby>来<rt class=ez>き</rt></ruby>たお<ruby>客<rt class=ez>きゃく</rt></ruby>さま。",
     example:"<ruby>新規<rt>しんき</rt></ruby><ruby>客<rt class=ez>きゃく</rt></ruby>にまた<ruby>来<rt class=ez>き</rt></ruby>てもらう<ruby>工夫<rt>くふう</rt></ruby>をします。",source:"店舗運営テキスト",translations:{id:null,vn:null,ne:null,mm:null}},
    {id:"tenpo-koteikyakuka",field:"gaisyoku",category:"tenpo",priority:2,level:"ssw2",
     term:"固定客化",reading:"こていきゃくか",
     meaning:"<ruby>初<rt>はじ</rt></ruby>めてのお<ruby>客<rt class=ez>きゃく</rt></ruby>さまに、<ruby>何度<rt class=ez>なんど</rt></ruby>も<ruby>来<rt class=ez>き</rt></ruby>てもらえるようにすること。",
     example:"サービスをよくして<ruby>固定客<rt>こていきゃく</rt></ruby><ruby>化<rt class=ez>か</rt></ruby>を<ruby>目指<rt class=ez>めざ</rt></ruby>します。",source:"店舗運営テキスト",translations:{id:null,vn:null,ne:null,mm:null}},
    {id:"tenpo-raitenhindo",field:"gaisyoku",category:"tenpo",priority:1,level:"ssw2",
     term:"来店頻度",reading:"らいてんひんど",
     meaning:"お<ruby>客<rt class=ez>きゃく</rt></ruby>さまがどれくらいよくお<ruby>店<rt class=ez>みせ</rt></ruby>に<ruby>来<rt class=ez>く</rt></ruby>るか。",
     example:"<ruby>来店<rt class=ez>らいてん</rt></ruby><ruby>頻度<rt>ひんど</rt></ruby>を<ruby>上<rt class=ez>あ</rt></ruby>げることを<ruby>目指<rt class=ez>めざ</rt></ruby>します。",source:"店舗運営テキスト",translations:{id:null,vn:null,ne:null,mm:null}},
    {id:"tenpo-roudoujikan",field:"gaisyoku",category:"tenpo",priority:2,level:"ssw2",
     term:"労働時間",reading:"ろうどうじかん",
     meaning:"<ruby>仕事<rt class=ez>しごと</rt></ruby>をする<ruby>時間<rt class=ez>じかん</rt></ruby>。<ruby>法律<rt>ほうりつ</rt></ruby>で<ruby>上限<rt>じょうげん</rt></ruby>が<ruby>決<rt class=ez>き</rt></ruby>められている。",
     example:"<ruby>労働<rt>ろうどう</rt></ruby><ruby>時間<rt class=ez>じかん</rt></ruby>を<ruby>守<rt class=ez>まも</rt></ruby>ってシフトを<ruby>作<rt class=ez>つく</rt></ruby>ります。",source:"労働基準法",translations:{id:null,vn:null,ne:null,mm:null}},
    {id:"tenpo-warimashi",field:"gaisyoku",category:"tenpo",priority:2,level:"ssw2",
     term:"割増賃金",reading:"わりましちんぎん",
     meaning:"<ruby>残業<rt>ざんぎょう</rt></ruby>や<ruby>深夜<rt class=ez>しんや</rt></ruby>・<ruby>休日<rt class=ez>きゅうじつ</rt></ruby>に<ruby>働<rt>はたら</rt></ruby>いた<ruby>時<rt class=ez>とき</rt></ruby>に<ruby>多<rt class=ez>おお</rt></ruby>く<ruby>払<rt>はら</rt></ruby>う<ruby>賃金<rt>ちんぎん</rt></ruby>。",
     example:"<ruby>残業<rt>ざんぎょう</rt></ruby>には<ruby>割増<rt>わりまし</rt></ruby><ruby>賃金<rt>ちんぎん</rt></ruby>を<ruby>払<rt>はら</rt></ruby>います。",source:"労働基準法",translations:{id:null,vn:null,ne:null,mm:null}},
    {id:"tenpo-kyukei",field:"gaisyoku",category:"tenpo",priority:2,level:"ssw2",
     term:"休憩時間",reading:"きゅうけいじかん",
     meaning:"<ruby>仕事<rt class=ez>しごと</rt></ruby>の<ruby>途中<rt>とちゅう</rt></ruby>に<ruby>休<rt class=ez>やす</rt></ruby>む<ruby>時間<rt class=ez>じかん</rt></ruby>。<ruby>法律<rt>ほうりつ</rt></ruby>で<ruby>決<rt class=ez>き</rt></ruby>められている。",
     example:"6<ruby>時間<rt class=ez>じかん</rt></ruby>を<ruby>超<rt>こ</rt></ruby>えたら45<ruby>分<rt class=ez>ふん</rt></ruby>、8<ruby>時間<rt class=ez>じかん</rt></ruby>を<ruby>超<rt>こ</rt></ruby>えたら1<ruby>時間<rt class=ez>じかん</rt></ruby><ruby>以上<rt>いじょう</rt></ruby>の<ruby>休憩<rt>きゅうけい</rt></ruby>を<ruby>取<rt class=ez>と</rt></ruby>ります。",source:"労働基準法",translations:{id:null,vn:null,ne:null,mm:null}},
    {id:"tenpo-yukyu",field:"gaisyoku",category:"tenpo",priority:2,level:"ssw2",
     term:"年次有給休暇",reading:"ねんじゆうきゅうきゅうか",
     meaning:"<ruby>給料<rt>きゅうりょう</rt></ruby>をもらいながら<ruby>休<rt class=ez>やす</rt></ruby>める<ruby>休<rt class=ez>やす</rt></ruby>み。6か<ruby>月<rt class=ez>げつ</rt></ruby><ruby>働<rt>はたら</rt></ruby>く（8<ruby>割<rt>わり</rt></ruby><ruby>以上<rt>いじょう</rt></ruby><ruby>出勤<rt>しゅっきん</rt></ruby>）と10<ruby>日<rt class=ez>か</rt></ruby>もらえる。",
     example:"<ruby>年次<rt class=ez>ねんじ</rt></ruby><ruby>有給<rt>ゆうきゅう</rt></ruby><ruby>休暇<rt>きゅうか</rt></ruby>を<ruby>使<rt class=ez>つか</rt></ruby>って<ruby>休<rt class=ez>やす</rt></ruby>みます。",source:"労働基準法",translations:{id:null,vn:null,ne:null,mm:null}},
    {id:"tenpo-saiyo",field:"gaisyoku",category:"tenpo",priority:1,level:"ssw2",
     term:"採用面接",reading:"さいようめんせつ",
     meaning:"<ruby>新<rt class=ez>あたら</rt></ruby>しく<ruby>働<rt>はたら</rt></ruby>く<ruby>人<rt class=ez>ひと</rt></ruby>を<ruby>選<rt>えら</rt></ruby>ぶための<ruby>面接<rt>めんせつ</rt></ruby>。",
     example:"<ruby>採用<rt>さいよう</rt></ruby><ruby>面接<rt>めんせつ</rt></ruby>で<ruby>仕事<rt class=ez>しごと</rt></ruby>の<ruby>説明<rt>せつめい</rt></ruby>をします。",source:"店舗運営テキスト",translations:{id:null,vn:null,ne:null,mm:null}},
    {id:"tenpo-ojt",field:"gaisyoku",category:"tenpo",priority:2,level:"ssw2",
     term:"OJT",reading:"おーじぇーてぃー",
     meaning:"<ruby>仕事<rt class=ez>しごと</rt></ruby>をしながら<ruby>教<rt class=ez>おし</rt></ruby>える<ruby>訓練<rt>くんれん</rt></ruby>。",
     example:"<ruby>新人<rt class=ez>しんじん</rt></ruby>に OJTで<ruby>接客<rt>せっきゃく</rt></ruby>を<ruby>教<rt class=ez>おし</rt></ruby>えます。",source:"店舗運営テキスト",translations:{id:null,vn:null,ne:null,mm:null}},
    {id:"tenpo-offjt",field:"gaisyoku",category:"tenpo",priority:1,level:"ssw2",
     term:"OFF-JT",reading:"おふじぇーてぃー",
     meaning:"<ruby>仕事<rt class=ez>しごと</rt></ruby>を<ruby>離<rt>はな</rt></ruby>れて、<ruby>研修<rt>けんしゅう</rt></ruby>などで<ruby>学<rt class=ez>まな</rt></ruby>ぶ<ruby>訓練<rt>くんれん</rt></ruby>。",
     example:"<ruby>仕事<rt class=ez>しごと</rt></ruby>の<ruby>時間<rt class=ez>じかん</rt></ruby>に、お<ruby>店<rt class=ez>みせ</rt></ruby>の<ruby>外<rt class=ez>そと</rt></ruby>の<ruby>研修会<rt>けんしゅうかい</rt></ruby>で OFF-JTを<ruby>受<rt class=ez>う</rt></ruby>けます。",source:"店舗運営テキスト",translations:{id:null,vn:null,ne:null,mm:null}},
    {id:"tenpo-bouka",field:"gaisyoku",category:"tenpo",priority:1,level:"ssw2",
     term:"防火管理者",reading:"ぼうかかんりしゃ",
     meaning:"お<ruby>店<rt class=ez>みせ</rt></ruby>の<ruby>火事<rt class=ez>かじ</rt></ruby>を<ruby>防<rt>ふせ</rt></ruby>ぐために<ruby>決<rt class=ez>き</rt></ruby>められた<ruby>役<rt class=ez>やく</rt></ruby>わりの<ruby>人<rt class=ez>ひと</rt></ruby>。",
     example:"<ruby>防火<rt>ぼうか</rt></ruby><ruby>管理者<rt>かんりしゃ</rt></ruby>が<ruby>避難<rt>ひなん</rt></ruby>の<ruby>訓練<rt>くんれん</rt></ruby>をします。",source:"消防法／店舗運営テキスト",translations:{id:null,vn:null,ne:null,mm:null}},
    {id:"tenpo-jikantai",field:"gaisyoku",category:"tenpo",priority:1,level:"ssw2",
     term:"時間帯責任者",reading:"じかんたいせきにんしゃ",
     meaning:"<ruby>店長<rt class=ez>てんちょう</rt></ruby>のかわりに、その<ruby>時間<rt class=ez>じかん</rt></ruby>のお<ruby>店<rt class=ez>みせ</rt></ruby>をまとめる<ruby>責任者<rt>せきにんしゃ</rt></ruby>。QSCの<ruby>維持<rt>いじ</rt></ruby>とスタッフの<ruby>指導<rt>しどう</rt></ruby>をします。",
     example:"<ruby>昼<rt class=ez>ひる</rt></ruby>の<ruby>時間帯<rt>じかんたい</rt></ruby><ruby>責任者<rt>せきにんしゃ</rt></ruby>として<ruby>店<rt class=ez>みせ</rt></ruby>を<ruby>任<rt>まか</rt></ruby>されます。",source:"店舗運営テキスト",translations:{id:null,vn:null,ne:null,mm:null}},
    {id:"tenpo-suggestive",field:"gaisyoku",category:"tenpo",priority:1,level:"ssw2",
     term:"サジェスティブセールス",reading:"さじぇすてぃぶせーるす",
     meaning:"お<ruby>客<rt class=ez>きゃく</rt></ruby>さまにおすすめの<ruby>一品<rt class=ez>いっぴん</rt></ruby>やデザートを<ruby>勧<rt>すす</rt></ruby>めて、<ruby>客単価<rt>きゃくたんか</rt></ruby>を<ruby>上<rt class=ez>あ</rt></ruby>げること。<ruby>推奨販売<rt>すいしょうはんばい</rt></ruby>とも<ruby>言<rt class=ez>い</rt></ruby>う。",
     example:"<ruby>食後<rt class=ez>しょくご</rt></ruby>にデザートをサジェスティブセールスします。",source:"店舗運営テキスト／接客全般テキスト",translations:{id:null,vn:null,ne:null,mm:null}},
    {id:"tenpo-sabroku",field:"gaisyoku",category:"tenpo",priority:2,level:"ssw2",
     term:"36協定",reading:"さぶろくきょうてい",
     meaning:"1<ruby>日<rt class=ez>にち</rt></ruby>8<ruby>時間<rt class=ez>じかん</rt></ruby>・<ruby>週<rt class=ez>しゅう</rt></ruby>40<ruby>時間<rt class=ez>じかん</rt></ruby>を<ruby>超<rt>こ</rt></ruby>えて<ruby>働<rt>はたら</rt></ruby>いてもらうために、<ruby>会社<rt class=ez>かいしゃ</rt></ruby>と<ruby>働<rt>はたら</rt></ruby>く<ruby>人<rt class=ez>ひと</rt></ruby>の<ruby>代表<rt class=ez>だいひょう</rt></ruby>が<ruby>結<rt>むす</rt></ruby>ぶやくそく（<ruby>労働<rt>ろうどう</rt></ruby><ruby>基準法<rt>きじゅんほう</rt></ruby>36<ruby>条<rt>じょう</rt></ruby>）。",
     example:"<ruby>残業<rt>ざんぎょう</rt></ruby>させる<ruby>前<rt class=ez>まえ</rt></ruby>に36<ruby>協定<rt>きょうてい</rt></ruby>を<ruby>結<rt>むす</rt></ruby>びます。",source:"店舗運営テキスト",translations:{id:null,vn:null,ne:null,mm:null}},

    // 接客全般
    {id:"sekkyaku-hospitality",field:"gaisyoku",category:"sekkyaku",priority:3,level:"ssw1",
     term:"ホスピタリティ",reading:"ほすぴたりてぃ",
     meaning:"お<ruby>客<rt class=ez>きゃく</rt></ruby>さまを<ruby>心<rt class=ez>こころ</rt></ruby>から<ruby>大切<rt class=ez>たいせつ</rt></ruby>にするおもてなしの<ruby>気持<rt class=ez>きも</rt></ruby>ち。",
     example:"ホスピタリティを<ruby>大切<rt class=ez>たいせつ</rt></ruby>にして<ruby>接客<rt>せっきゃく</rt></ruby>します。",source:"接客全般テキスト",translations:{id:null,vn:null,ne:null,mm:null}},
    {id:"sekkyaku-cs",field:"gaisyoku",category:"sekkyaku",priority:2,level:"ssw2",
     term:"顧客満足（CS）",reading:"こきゃくまんぞく",
     meaning:"お<ruby>客<rt class=ez>きゃく</rt></ruby>さまが「<ruby>満足<rt>まんぞく</rt></ruby>した」と<ruby>感<rt class=ez>かん</rt></ruby>じること。リピーターにつながる。",
     example:"<ruby>顧客<rt>こきゃく</rt></ruby><ruby>満足<rt>まんぞく</rt></ruby>を<ruby>高<rt class=ez>たか</rt></ruby>めるサービスをします。",source:"接客全般テキスト",translations:{id:null,vn:null,ne:null,mm:null}},
    {id:"sekkyaku-repeater",field:"gaisyoku",category:"sekkyaku",priority:2,level:"ssw2",
     term:"リピーター",reading:"りぴーたー",
     meaning:"<ruby>気<rt class=ez>き</rt></ruby>に<ruby>入<rt class=ez>い</rt></ruby>ってまた<ruby>来<rt class=ez>き</rt></ruby>てくれるお<ruby>客<rt class=ez>きゃく</rt></ruby>さま。",
     example:"リピーターを<ruby>増<rt>ふ</rt></ruby>やすことが<ruby>大切<rt class=ez>たいせつ</rt></ruby>です。",source:"接客全般テキスト",translations:{id:null,vn:null,ne:null,mm:null}},
    {id:"sekkyaku-midashinami",field:"gaisyoku",category:"sekkyaku",priority:2,level:"ssw1",
     term:"身だしなみ",reading:"みだしなみ",
     meaning:"<ruby>清潔<rt>せいけつ</rt></ruby>できちんとした<ruby>見<rt class=ez>み</rt></ruby>た<ruby>目<rt class=ez>め</rt></ruby>。<ruby>髪<rt>かみ</rt></ruby>・<ruby>爪<rt>つめ</rt></ruby>・<ruby>服<rt class=ez>ふく</rt></ruby>を<ruby>整<rt class=ez>ととの</rt></ruby>える。",
     example:"<ruby>仕事<rt class=ez>しごと</rt></ruby>の<ruby>前<rt class=ez>まえ</rt></ruby>に<ruby>身<rt class=ez>み</rt></ruby>だしなみを<ruby>確認<rt>かくにん</rt></ruby>します。",source:"接客全般テキスト",translations:{id:null,vn:null,ne:null,mm:null}},
    {id:"sekkyaku-7dai",field:"gaisyoku",category:"sekkyaku",priority:2,level:"ssw2",
     term:"接客7大用語",reading:"せっきゃくななだいようご",
     meaning:"<ruby>接客<rt>せっきゃく</rt></ruby>でよく<ruby>使<rt class=ez>つか</rt></ruby>う<ruby>基本<rt>きほん</rt></ruby>の7つの<ruby>言葉<rt>ことば</rt></ruby>。「いらっしゃいませ」「ありがとうございます」「お<ruby>待<rt class=ez>ま</rt></ruby>たせいたしました」「かしこまりました」「<ruby>申<rt class=ez>もう</rt></ruby>し<ruby>訳<rt>わけ</rt></ruby>ございません」「<ruby>恐<rt>おそ</rt></ruby>れ<ruby>入<rt class=ez>い</rt></ruby>ります」「<ruby>失礼<rt>しつれい</rt></ruby>いたします」。",
     example:"<ruby>接客<rt>せっきゃく</rt></ruby>7<ruby>大<rt class=ez>だい</rt></ruby><ruby>用語<rt class=ez>ようご</rt></ruby>をはっきり<ruby>言<rt class=ez>い</rt></ruby>います。",source:"接客全般テキスト",translations:{id:null,vn:null,ne:null,mm:null}},
    {id:"sekkyaku-smile",field:"gaisyoku",category:"sekkyaku",priority:1,level:"ssw1",
     term:"スマイル＆アイコンタクト",reading:"すまいるあいこんたくと",
     meaning:"<ruby>笑顔<rt>えがお</rt></ruby>で<ruby>目<rt class=ez>め</rt></ruby>を<ruby>見<rt class=ez>み</rt></ruby>て<ruby>接客<rt>せっきゃく</rt></ruby>すること。",
     example:"スマイルとアイコンタクトでお<ruby>客<rt class=ez>きゃく</rt></ruby>さまを<ruby>迎<rt>むか</rt></ruby>えます。",source:"接客全般テキスト",translations:{id:null,vn:null,ne:null,mm:null}},
    {id:"sekkyaku-sonkeigo",field:"gaisyoku",category:"sekkyaku",priority:3,level:"ssw1",
     term:"尊敬語",reading:"そんけいご",
     meaning:"<ruby>相手<rt class=ez>あいて</rt></ruby>を<ruby>高<rt class=ez>たか</rt></ruby>めて<ruby>敬<rt>うやま</rt></ruby>う<ruby>言葉<rt>ことば</rt></ruby>。「いらっしゃる」「めしあがる」など。",
     example:"お<ruby>客<rt class=ez>きゃく</rt></ruby>さまには<ruby>尊敬<rt>そんけい</rt></ruby><ruby>語<rt class=ez>ご</rt></ruby>を<ruby>使<rt class=ez>つか</rt></ruby>います。",source:"接客全般テキスト",translations:{id:null,vn:null,ne:null,mm:null}},
    {id:"sekkyaku-kenjogo",field:"gaisyoku",category:"sekkyaku",priority:3,level:"ssw1",
     term:"謙譲語",reading:"けんじょうご",
     meaning:"<ruby>自分<rt class=ez>じぶん</rt></ruby>を<ruby>低<rt>ひく</rt></ruby>くして<ruby>相手<rt class=ez>あいて</rt></ruby>を<ruby>立<rt class=ez>た</rt></ruby>てる<ruby>言葉<rt>ことば</rt></ruby>。「いたす」「うかがう」など。",
     example:"<ruby>自分<rt class=ez>じぶん</rt></ruby>の<ruby>行動<rt class=ez>こうどう</rt></ruby>には<ruby>謙譲<rt>けんじょう</rt></ruby><ruby>語<rt class=ez>ご</rt></ruby>を<ruby>使<rt class=ez>つか</rt></ruby>います。",source:"接客全般テキスト",translations:{id:null,vn:null,ne:null,mm:null}},
    {id:"sekkyaku-teineigo",field:"gaisyoku",category:"sekkyaku",priority:2,level:"ssw1",
     term:"丁寧語",reading:"ていねいご",
     meaning:"「です」「ます」を<ruby>付<rt>つ</rt></ruby>けて、<ruby>丁寧<rt>ていねい</rt></ruby>に<ruby>話<rt class=ez>はな</rt></ruby>す<ruby>言葉<rt>ことば</rt></ruby>。",
     example:"お<ruby>客<rt class=ez>きゃく</rt></ruby>さまには<ruby>丁寧<rt>ていねい</rt></ruby><ruby>語<rt class=ez>ご</rt></ruby>で<ruby>話<rt class=ez>はな</rt></ruby>します。",source:"接客全般テキスト",translations:{id:null,vn:null,ne:null,mm:null}},
    {id:"sekkyaku-cushion",field:"gaisyoku",category:"sekkyaku",priority:2,level:"ssw2",
     term:"クッション言葉",reading:"くっしょんことば",
     meaning:"<ruby>言<rt class=ez>い</rt></ruby>いにくいことの<ruby>前<rt class=ez>まえ</rt></ruby>に<ruby>添<rt>そ</rt></ruby>える<ruby>言葉<rt>ことば</rt></ruby>。「<ruby>恐<rt>おそ</rt></ruby>れ<ruby>入<rt class=ez>い</rt></ruby>りますが」など。",
     example:"クッション<ruby>言葉<rt>ことば</rt></ruby>を<ruby>使<rt class=ez>つか</rt></ruby>うと<ruby>柔<rt>やわ</rt></ruby>らかく<ruby>伝<rt>つた</rt></ruby><ruby>割<rt>わ</rt></ruby>ります。",source:"接客全般テキスト",translations:{id:null,vn:null,ne:null,mm:null}},
    {id:"sekkyaku-nijukeigo",field:"gaisyoku",category:"sekkyaku",priority:1,level:"ssw2",
     term:"二重敬語",reading:"にじゅうけいご",
     meaning:"<ruby>敬語<rt>けいご</rt></ruby>を<ruby>重<rt class=ez>かさ</rt></ruby>ねすぎた<ruby>間違<rt>まちが</rt></ruby>い。「お<ruby>召<rt>め</rt></ruby>し<ruby>上<rt class=ez>あ</rt></ruby>がりになられる」など。",
     example:"<ruby>二重<rt class=ez>にじゅう</rt></ruby><ruby>敬語<rt>けいご</rt></ruby>にならないように<ruby>気<rt class=ez>き</rt></ruby>を<ruby>付<rt>つ</rt></ruby>けます。",source:"接客全般テキスト",translations:{id:null,vn:null,ne:null,mm:null}},
    {id:"sekkyaku-ordertake",field:"gaisyoku",category:"sekkyaku",priority:2,level:"ssw2",
     term:"オーダーテイク",reading:"おーだーていく",
     meaning:"お<ruby>客<rt class=ez>きゃく</rt></ruby>さまの<ruby>注文<rt class=ez>ちゅうもん</rt></ruby>を<ruby>聞<rt class=ez>き</rt></ruby>いて<ruby>取<rt class=ez>と</rt></ruby>ること。",
     example:"<ruby>注文<rt class=ez>ちゅうもん</rt></ruby>を<ruby>繰<rt>く</rt></ruby>り<ruby>返<rt class=ez>かえ</rt></ruby>してオーダーテイクの<ruby>間違<rt>まちが</rt></ruby>いを<ruby>防<rt>ふせ</rt></ruby>ぎます。",source:"接客全般テキスト",translations:{id:null,vn:null,ne:null,mm:null}},
    {id:"sekkyaku-haizen",field:"gaisyoku",category:"sekkyaku",priority:2,level:"ssw1",
     term:"配膳",reading:"はいぜん",
     meaning:"<ruby>料理<rt>りょうり</rt></ruby>や<ruby>飲<rt class=ez>の</rt></ruby>み<ruby>物<rt class=ez>もの</rt></ruby>をお<ruby>客<rt class=ez>きゃく</rt></ruby>さまのテーブルに<ruby>出<rt class=ez>だ</rt></ruby>すこと。",
     example:"<ruby>熱<rt>あつ</rt></ruby>い<ruby>料理<rt>りょうり</rt></ruby>は<ruby>早<rt class=ez>はや</rt></ruby>く<ruby>配膳<rt>はいぜん</rt></ruby>します。",source:"接客全般テキスト",translations:{id:null,vn:null,ne:null,mm:null}},
    {id:"sekkyaku-gezen",field:"gaisyoku",category:"sekkyaku",priority:2,level:"ssw2",
     term:"下膳",reading:"げぜん",
     meaning:"<ruby>食<rt class=ez>た</rt></ruby>べ<ruby>終<rt class=ez>お</rt></ruby>わった<ruby>食器<rt>しょっき</rt></ruby>を<ruby>下<rt class=ez>さ</rt></ruby>げること。",
     example:"お<ruby>客<rt class=ez>きゃく</rt></ruby>さまに<ruby>声<rt class=ez>こえ</rt></ruby>をかけてから<ruby>下膳<rt>げぜん</rt></ruby>します。",source:"接客全般テキスト",translations:{id:null,vn:null,ne:null,mm:null}},
    {id:"sekkyaku-bussing",field:"gaisyoku",category:"sekkyaku",priority:1,level:"ssw2",
     term:"バッシング",reading:"ばっしんぐ",
     meaning:"テーブルの<ruby>食器<rt>しょっき</rt></ruby>をかたづけて、つぎのお<ruby>客<rt class=ez>きゃく</rt></ruby>さまの<ruby>準備<rt>じゅんび</rt></ruby>をすること。",
     example:"お<ruby>客<rt class=ez>きゃく</rt></ruby>さまが<ruby>帰<rt class=ez>かえ</rt></ruby>ったらすぐバッシングします。",source:"接客全般テキスト",translations:{id:null,vn:null,ne:null,mm:null}},
    {id:"sekkyaku-chukan",field:"gaisyoku",category:"sekkyaku",priority:1,level:"ssw2",
     term:"中間サービス",reading:"ちゅうかんさーびす",
     meaning:"<ruby>料理<rt>りょうり</rt></ruby>を<ruby>出<rt class=ez>だ</rt></ruby>したあと、<ruby>食事<rt class=ez>しょくじ</rt></ruby>の<ruby>途中<rt>とちゅう</rt></ruby>にする<ruby>気配<rt class=ez>きくば</rt></ruby>り。",
     example:"<ruby>水<rt class=ez>みず</rt></ruby>を<ruby>注<rt class=ez>そそ</rt></ruby>ぐなど<ruby>中間<rt class=ez>ちゅうかん</rt></ruby>サービスをします。",source:"接客全般テキスト",translations:{id:null,vn:null,ne:null,mm:null}},
    {id:"sekkyaku-setting",field:"gaisyoku",category:"sekkyaku",priority:1,level:"ssw2",
     term:"テーブルセッティング",reading:"てーぶるせってぃんぐ",
     meaning:"<ruby>食事<rt class=ez>しょくじ</rt></ruby>の<ruby>前<rt class=ez>まえ</rt></ruby>に、<ruby>食器<rt>しょっき</rt></ruby>や<ruby>箸<rt>はし</rt></ruby>を<ruby>正<rt class=ez>ただ</rt></ruby>しく<ruby>並<rt>なら</rt></ruby>べること。",
     example:"<ruby>開店<rt class=ez>かいてん</rt></ruby><ruby>前<rt class=ez>まえ</rt></ruby>にテーブルセッティングをします。",source:"接客全般テキスト",translations:{id:null,vn:null,ne:null,mm:null}},
    {id:"sekkyaku-cutlery",field:"gaisyoku",category:"sekkyaku",priority:1,level:"ssw2",
     term:"カトラリー",reading:"かとらりー",
     meaning:"ナイフ・フォーク・スプーンなど、<ruby>食事<rt class=ez>しょくじ</rt></ruby>に<ruby>使<rt class=ez>つか</rt></ruby>う<ruby>道具<rt class=ez>どうぐ</rt></ruby>。<ruby>皿<rt class=ez>さら</rt></ruby>やグラスなどの<ruby>食器<rt>しょっき</rt></ruby>とは<ruby>違<rt>ちが</rt></ruby>う。",
     example:"カトラリーをきれいに<ruby>並<rt>なら</rt></ruby>べます。",source:"接客全般テキスト",translations:{id:null,vn:null,ne:null,mm:null}},
    {id:"sekkyaku-horenso",field:"gaisyoku",category:"sekkyaku",priority:3,level:"ssw1",
     term:"報連相",reading:"ほうれんそう",
     meaning:"<ruby>報告<rt>ほうこく</rt></ruby>（しらせる）・<ruby>連絡<rt>れんらく</rt></ruby>（つたえる）・<ruby>相談<rt class=ez>そうだん</rt></ruby>（きく）のこと。<ruby>仕事<rt class=ez>しごと</rt></ruby>をスムーズにする<ruby>基本<rt>きほん</rt></ruby>。",
     example:"<ruby>困<rt>こま</rt></ruby>ったことはすぐ<ruby>報連相<rt>ほうれんそう</rt></ruby>します。",source:"接客全般テキスト",translations:{id:null,vn:null,ne:null,mm:null}},
    {id:"sekkyaku-5w1h",field:"gaisyoku",category:"sekkyaku",priority:2,level:"ssw2",
     term:"5W1H",reading:"ごだぶりゅーいちえいち",
     meaning:"「いつ・どこで・だれが・<ruby>何<rt class=ez>なに</rt></ruby>を・なぜ・どう」。<ruby>報告<rt>ほうこく</rt></ruby>を<ruby>分<rt class=ez>わ</rt></ruby>かりやすくする<ruby>形<rt class=ez>かたち</rt></ruby>。",
     example:"5W1Hで<ruby>報告<rt>ほうこく</rt></ruby>すると<ruby>伝<rt>つた</rt></ruby>わりやすい。",source:"接客全般テキスト",translations:{id:null,vn:null,ne:null,mm:null}},
    {id:"sekkyaku-claim",field:"gaisyoku",category:"sekkyaku",priority:3,level:"ssw2",
     term:"クレーム対応",reading:"くれーむたいおう",
     meaning:"お<ruby>客<rt class=ez>きゃく</rt></ruby>さまの<ruby>不満<rt>ふまん</rt></ruby>や<ruby>苦情<rt>くじょう</rt></ruby>に、<ruby>丁寧<rt>ていねい</rt></ruby>に<ruby>対応<rt>たいおう</rt></ruby>すること。まずよく<ruby>聞<rt class=ez>き</rt></ruby>く。",
     example:"クレーム<ruby>対応<rt>たいおう</rt></ruby>では<ruby>初<rt>はじ</rt></ruby>めにお<ruby>話<rt class=ez>はなし</rt></ruby>をよく<ruby>聞<rt class=ez>き</rt></ruby>きます。",source:"接客全般テキスト",translations:{id:null,vn:null,ne:null,mm:null}},
    {id:"sekkyaku-ibutsu",field:"gaisyoku",category:"sekkyaku",priority:2,level:"ssw2",
     term:"異物混入",reading:"いぶつこんにゅう",
     meaning:"<ruby>料理<rt>りょうり</rt></ruby>に<ruby>髪<rt>かみ</rt></ruby>の<ruby>毛<rt class=ez>け</rt></ruby>やプラスチックなど、<ruby>入<rt class=ez>はい</rt></ruby>ってはいけないものが<ruby>入<rt class=ez>はい</rt></ruby>ること。",
     example:"<ruby>異物<rt>いぶつ</rt></ruby><ruby>混入<rt>こんにゅう</rt></ruby>を<ruby>見<rt class=ez>み</rt></ruby>つけたらすぐ<ruby>報告<rt>ほうこく</rt></ruby>します。",source:"接客全般テキスト",translations:{id:null,vn:null,ne:null,mm:null}},
    {id:"sekkyaku-saihatsu",field:"gaisyoku",category:"sekkyaku",priority:2,level:"ssw2",
     term:"再発防止",reading:"さいはつぼうし",
     meaning:"<ruby>同<rt class=ez>おな</rt></ruby>じ<ruby>失敗<rt>しっぱい</rt></ruby>を<ruby>二度<rt class=ez>にど</rt></ruby>と<ruby>起<rt class=ez>お</rt></ruby>こさないようにすること。",
     example:"<ruby>原因<rt>げんいん</rt></ruby>を<ruby>調<rt class=ez>しら</rt></ruby>べて<ruby>再発<rt>さいはつ</rt></ruby><ruby>防止<rt>ぼうし</rt></ruby>をします。",source:"接客全般テキスト",translations:{id:null,vn:null,ne:null,mm:null}},
    {id:"sekkyaku-shazai",field:"gaisyoku",category:"sekkyaku",priority:2,level:"ssw1",
     term:"謝罪",reading:"しゃざい",
     meaning:"<ruby>間違<rt>まちが</rt></ruby>いや<ruby>迷惑<rt>めいわく</rt></ruby>をかけた<ruby>時<rt class=ez>とき</rt></ruby>に、あやまること。",
     example:"お<ruby>客<rt class=ez>きゃく</rt></ruby>さまに<ruby>丁寧<rt>ていねい</rt></ruby>に<ruby>謝罪<rt>しゃざい</rt></ruby>します。",source:"接客全般テキスト",translations:{id:null,vn:null,ne:null,mm:null}},
    {id:"sekkyaku-halal",field:"gaisyoku",category:"sekkyaku",priority:2,level:"ssw2",
     term:"ハラール",reading:"はらーる",
     meaning:"イスラム<ruby>教<rt class=ez>きょう</rt></ruby>の<ruby>決<rt class=ez>き</rt></ruby>まりで<ruby>食<rt class=ez>た</rt></ruby>べてよいもの。<ruby>豚肉<rt>ぶたにく</rt></ruby>や<ruby>酒<rt class=ez>さけ</rt></ruby>は<ruby>使<rt class=ez>つか</rt></ruby>えない。",
     example:"ハラールのお<ruby>客<rt class=ez>きゃく</rt></ruby>さまに<ruby>材料<rt>ざいりょう</rt></ruby>を<ruby>説明<rt>せつめい</rt></ruby>します。",source:"接客全般テキスト",translations:{id:null,vn:null,ne:null,mm:null}},
    {id:"sekkyaku-vegetarian",field:"gaisyoku",category:"sekkyaku",priority:2,level:"ssw2",
     term:"ベジタリアン／ヴィーガン",reading:"べじたりあん／ゔぃーがん",
     meaning:"<ruby>肉<rt class=ez>にく</rt></ruby>や<ruby>魚<rt class=ez>さかな</rt></ruby>を<ruby>食<rt class=ez>た</rt></ruby>べない<ruby>人<rt class=ez>ひと</rt></ruby>。ヴィーガンは<ruby>卵<rt>たまご</rt></ruby>・<ruby>乳<rt>にゅう</rt></ruby>も<ruby>食<rt class=ez>た</rt></ruby>べない。",
     example:"ベジタリアンのお<ruby>客<rt class=ez>きゃく</rt></ruby>さまに<ruby>野菜<rt>やさい</rt></ruby>のメニューを<ruby>勧<rt>すす</rt></ruby>めます。",source:"接客全般テキスト",translations:{id:null,vn:null,ne:null,mm:null}},
    {id:"sekkyaku-tayouka",field:"gaisyoku",category:"sekkyaku",priority:1,level:"ssw2",
     term:"食の多様化",reading:"しょくのたようか",
     meaning:"アレルギー・<ruby>宗教<rt>しゅうきょう</rt></ruby>・<ruby>主義<rt>しゅぎ</rt></ruby>などで、<ruby>食<rt class=ez>た</rt></ruby>べるものが<ruby>人<rt class=ez>ひと</rt></ruby>によって<ruby>違<rt>ちが</rt></ruby>うこと。",
     example:"<ruby>食<rt class=ez>しょく</rt></ruby>の<ruby>多様化<rt class=ez>たようか</rt></ruby>に<ruby>合<rt class=ez>あ</rt></ruby>わせてメニューを<ruby>考<rt class=ez>かんが</rt></ruby>えます。",source:"接客全般テキスト",translations:{id:null,vn:null,ne:null,mm:null}},
    {id:"sekkyaku-gomi",field:"gaisyoku",category:"sekkyaku",priority:1,level:"ssw2",
     term:"五味",reading:"ごみ",
     meaning:"<ruby>味<rt class=ez>あじ</rt></ruby>の<ruby>基本<rt>きほん</rt></ruby>の5つ。<ruby>甘味<rt>あまみ</rt></ruby>・<ruby>酸味<rt>さんみ</rt></ruby>・<ruby>塩味<rt>えんみ</rt></ruby>・<ruby>苦味<rt class=ez>にがみ</rt></ruby>・うま<ruby>味<rt class=ez>み</rt></ruby>。",
     example:"<ruby>五味<rt class=ez>ごみ</rt></ruby>のバランスを<ruby>考<rt class=ez>かんが</rt></ruby>えて<ruby>料理<rt>りょうり</rt></ruby>します。",source:"接客全般テキスト",translations:{id:null,vn:null,ne:null,mm:null}},
    {id:"sekkyaku-aed",field:"gaisyoku",category:"sekkyaku",priority:1,level:"ssw1",
     term:"AED",reading:"えーいーでぃー",
     meaning:"<ruby>心臓<rt>しんぞう</rt></ruby>が<ruby>急<rt class=ez>きゅう</rt></ruby>にけいれんして（こまかくふるえて）、<ruby>血<rt class=ez>ち</rt></ruby>を<ruby>遅<rt>おく</rt></ruby>れなくなった<ruby>人<rt class=ez>ひと</rt></ruby>に<ruby>使<rt class=ez>つか</rt></ruby>う、<ruby>電気<rt class=ez>でんき</rt></ruby>のショックで<ruby>助<rt class=ez>たす</rt></ruby>ける<ruby>機械<rt>きかい</rt></ruby>。",
     example:"<ruby>倒<rt>たお</rt></ruby>れた<ruby>人<rt class=ez>ひと</rt></ruby>がいたら AEDを<ruby>使<rt class=ez>つか</rt></ruby>います。",source:"接客全般テキスト",translations:{id:null,vn:null,ne:null,mm:null}},
    {id:"sekkyaku-taicho",field:"gaisyoku",category:"sekkyaku",priority:1,level:"ssw2",
     term:"体調不良者対応",reading:"たいちょうふりょうしゃたいおう",
     meaning:"<ruby>気分<rt class=ez>きぶん</rt></ruby>が<ruby>悪<rt class=ez>わる</rt></ruby>くなったお<ruby>客<rt class=ez>きゃく</rt></ruby>さまを<ruby>助<rt class=ez>たす</rt></ruby>けること。<ruby>救急車<rt>きゅうきゅうしゃ</rt></ruby>を<ruby>呼<rt>よ</rt></ruby>ぶことも。",
     example:"<ruby>体調<rt class=ez>たいちょう</rt></ruby><ruby>不良<rt>ふりょう</rt></ruby>のお<ruby>客<rt class=ez>きゃく</rt></ruby>さまにはすぐ<ruby>声<rt class=ez>こえ</rt></ruby>をかけます。",source:"接客全般テキスト",translations:{id:null,vn:null,ne:null,mm:null}},

    // 飲食物調理
    {id:"chouri-bui",field:"gaisyoku",category:"chouri",priority:1,level:"ssw2",
     term:"部位",reading:"ぶい",
     meaning:"<ruby>肉<rt class=ez>にく</rt></ruby>や<ruby>魚<rt class=ez>さかな</rt></ruby>の、<ruby>体<rt class=ez>からだ</rt></ruby>のどの<ruby>場所<rt class=ez>ばしょ</rt></ruby>かを<ruby>表<rt class=ez>あらわ</rt></ruby>す<ruby>言葉<rt>ことば</rt></ruby>。やわらかさや<ruby>味<rt class=ez>あじ</rt></ruby>が<ruby>違<rt>ちが</rt></ruby>う。",
     example:"<ruby>牛肉<rt class=ez>ぎゅうにく</rt></ruby>は<ruby>部位<rt>ぶい</rt></ruby>によって<ruby>使<rt class=ez>つか</rt></ruby>い<ruby>方<rt class=ez>かた</rt></ruby>が<ruby>違<rt>ちが</rt></ruby>います。",source:"飲食物調理テキスト",translations:{id:null,vn:null,ne:null,mm:null}},
    {id:"chouri-jidori",field:"gaisyoku",category:"chouri",priority:1,level:"ssw2",
     term:"地鶏",reading:"じどり",
     meaning:"<ruby>日本<rt class=ez>にほん</rt></ruby>に<ruby>昔<rt class=ez>むかし</rt></ruby>からいる<ruby>種類<rt>しゅるい</rt></ruby>（<ruby>在来種<rt>ざいらいしゅ</rt></ruby>）の<ruby>血<rt class=ez>ち</rt></ruby>をひく、じっくり<ruby>育<rt class=ez>そだ</rt></ruby>てた<ruby>鶏<rt>にわとり</rt></ruby>。<ruby>味<rt class=ez>あじ</rt></ruby>が<ruby>濃<rt>こ</rt></ruby>い。",
     example:"<ruby>地鶏<rt>じどり</rt></ruby>は<ruby>味<rt class=ez>あじ</rt></ruby>が<ruby>濃<rt>こ</rt></ruby>いです。",source:"飲食物調理テキスト",translations:{id:null,vn:null,ne:null,mm:null}},
    {id:"chouri-broiler",field:"gaisyoku",category:"chouri",priority:1,level:"ssw2",
     term:"ブロイラー",reading:"ぶろいらー",
     meaning:"<ruby>短<rt class=ez>みじか</rt></ruby>い<ruby>期間<rt class=ez>きかん</rt></ruby>で<ruby>大<rt class=ez>おお</rt></ruby>きく<ruby>育<rt class=ez>そだ</rt></ruby>てる、<ruby>肉用<rt class=ez>にくよう</rt></ruby>の<ruby>鶏<rt>にわとり</rt></ruby>。やわらかく<ruby>安<rt class=ez>やす</rt></ruby>い。",
     example:"ブロイラーは<ruby>早<rt class=ez>はや</rt></ruby>く<ruby>育<rt class=ez>そだ</rt></ruby>ち、<ruby>値段<rt>ねだん</rt></ruby>が<ruby>安<rt class=ez>やす</rt></ruby>いです。",source:"飲食物調理テキスト",translations:{id:null,vn:null,ne:null,mm:null}},
    {id:"chouri-seikeiniku",field:"gaisyoku",category:"chouri",priority:1,level:"ssw2",
     term:"成形肉",reading:"せいけいにく",
     meaning:"<ruby>小<rt class=ez>ちい</rt></ruby>さい<ruby>肉<rt class=ez>にく</rt></ruby>を<ruby>固<rt>かた</rt></ruby>めて1つの<ruby>形<rt class=ez>かたち</rt></ruby>にした<ruby>肉<rt class=ez>にく</rt></ruby>。<ruby>中<rt class=ez>なか</rt></ruby>まで<ruby>菌<rt>きん</rt></ruby>がいることがあるので、<ruby>中心<rt class=ez>ちゅうしん</rt></ruby>を75℃で1<ruby>分<rt class=ez>ぷん</rt></ruby><ruby>以上<rt>いじょう</rt></ruby><ruby>加熱<rt>かねつ</rt></ruby>します。",
     example:"<ruby>成形肉<rt>せいけいにく</rt></ruby>は<ruby>中<rt class=ez>なか</rt></ruby>までしっかり<ruby>焼<rt>や</rt></ruby>きます。",source:"飲食物調理テキスト",translations:{id:null,vn:null,ne:null,mm:null}},
    {id:"chouri-shun",field:"gaisyoku",category:"chouri",priority:2,level:"ssw1",
     term:"旬",reading:"しゅん",
     meaning:"その<ruby>食材<rt>しょくざい</rt></ruby>が<ruby>一番<rt class=ez>いちばん</rt></ruby>おいしい<ruby>時期<rt class=ez>じき</rt></ruby>。",
     example:"<ruby>旬<rt>しゅん</rt></ruby>の<ruby>野菜<rt>やさい</rt></ruby>は<ruby>味<rt class=ez>あじ</rt></ruby>がよくて、<ruby>安<rt class=ez>やす</rt></ruby>い。",source:"飲食物調理テキスト",translations:{id:null,vn:null,ne:null,mm:null}},
    {id:"chouri-sanmai",field:"gaisyoku",category:"chouri",priority:1,level:"ssw2",
     term:"三枚おろし",reading:"さんまいおろし",
     meaning:"<ruby>魚<rt class=ez>さかな</rt></ruby>を、2まいの<ruby>身<rt class=ez>み</rt></ruby>と1まいの<ruby>中<rt class=ez>なか</rt></ruby>の<ruby>骨<rt>ほね</rt></ruby>の、3まいに<ruby>切<rt class=ez>き</rt></ruby>り<ruby>分<rt class=ez>わ</rt></ruby>けること。",
     example:"アジを<ruby>三枚<rt>さんまい</rt></ruby>おろしにします。",source:"飲食物調理テキスト",translations:{id:null,vn:null,ne:null,mm:null}},
    {id:"chouri-konsai",field:"gaisyoku",category:"chouri",priority:1,level:"ssw2",
     term:"根菜類",reading:"こんさいるい",
     meaning:"<ruby>土<rt class=ez>つち</rt></ruby>の<ruby>中<rt class=ez>なか</rt></ruby>で<ruby>育<rt class=ez>そだ</rt></ruby>つ<ruby>野菜<rt>やさい</rt></ruby>。だいこん・にんじんなど。",
     example:"<ruby>根菜類<rt>こんさいるい</rt></ruby>は<ruby>長<rt class=ez>なが</rt></ruby>く<ruby>保存<rt>ほぞん</rt></ruby>できます。",source:"飲食物調理テキスト",translations:{id:null,vn:null,ne:null,mm:null}},
    {id:"chouri-fugu",field:"gaisyoku",category:"chouri",priority:1,level:"ssw2",
     term:"フグ処理者",reading:"ふぐしょりしゃ",
     meaning:"<ruby>毒<rt>どく</rt></ruby>のあるフグを<ruby>安全<rt class=ez>あんぜん</rt></ruby>に<ruby>調理<rt class=ez>ちょうり</rt></ruby>できる、<ruby>資格<rt>しかく</rt></ruby>を<ruby>持<rt class=ez>も</rt></ruby>った<ruby>人<rt class=ez>ひと</rt></ruby>。",
     example:"フグは<ruby>処理者<rt>しょりしゃ</rt></ruby>しか<ruby>調理<rt class=ez>ちょうり</rt></ruby>できません。",source:"飲食物調理テキスト",translations:{id:null,vn:null,ne:null,mm:null}},
    {id:"chouri-sendo",field:"gaisyoku",category:"chouri",priority:2,level:"ssw1",
     term:"鮮度",reading:"せんど",
     meaning:"<ruby>食材<rt>しょくざい</rt></ruby>がどれだけ<ruby>新<rt class=ez>あたら</rt></ruby>しいか。",
     example:"<ruby>魚<rt class=ez>さかな</rt></ruby>の<ruby>鮮度<rt>せんど</rt></ruby>を<ruby>目<rt class=ez>め</rt></ruby>とにおいで<ruby>見分<rt class=ez>みわ</rt></ruby>けます。",source:"飲食物調理テキスト",translations:{id:null,vn:null,ne:null,mm:null}},
    {id:"chouri-drip",field:"gaisyoku",category:"chouri",priority:1,level:"ssw2",
     term:"ドリップ",reading:"どりっぷ",
     meaning:"<ruby>肉<rt class=ez>にく</rt></ruby>や<ruby>魚<rt class=ez>さかな</rt></ruby>から<ruby>出<rt class=ez>で</rt></ruby>る<ruby>液<rt>えき</rt></ruby>。<ruby>水分<rt class=ez>すいぶん</rt></ruby>やうまみをふくむ。<ruby>多<rt class=ez>おお</rt></ruby>いと<ruby>鮮度<rt>せんど</rt></ruby>が<ruby>落<rt class=ez>お</rt></ruby>ちているサイン。",
     example:"ドリップが<ruby>多<rt class=ez>おお</rt></ruby>い<ruby>肉<rt class=ez>にく</rt></ruby>は<ruby>避<rt>さ</rt></ruby>けます。",source:"飲食物調理テキスト",translations:{id:null,vn:null,ne:null,mm:null}},
    {id:"chouri-shigokochoku",field:"gaisyoku",category:"chouri",priority:1,level:"ssw2",
     term:"死後硬直",reading:"しごこうちょく",
     meaning:"<ruby>魚<rt class=ez>さかな</rt></ruby>や<ruby>肉<rt class=ez>にく</rt></ruby>が<ruby>死<rt class=ez>し</rt></ruby>んだ<ruby>後<rt class=ez>あと</rt></ruby>に<ruby>固<rt>かた</rt></ruby>くなること。",
     example:"<ruby>死後<rt class=ez>しご</rt></ruby><ruby>硬直<rt>こうちょく</rt></ruby>のあと、<ruby>熟成<rt>じゅくせい</rt></ruby>でおいしくなります。",source:"飲食物調理テキスト",translations:{id:null,vn:null,ne:null,mm:null}},
    {id:"chouri-shikomi",field:"gaisyoku",category:"chouri",priority:2,level:"ssw1",
     term:"仕込み",reading:"しこみ",
     meaning:"<ruby>営業<rt>えいぎょう</rt></ruby>の<ruby>前<rt class=ez>まえ</rt></ruby>に、<ruby>食材<rt>しょくざい</rt></ruby>を<ruby>切<rt class=ez>き</rt></ruby>る・<ruby>下味<rt class=ez>したあじ</rt></ruby>を<ruby>付<rt>つ</rt></ruby>けるなど<ruby>準備<rt>じゅんび</rt></ruby>すること。",
     example:"<ruby>開店<rt class=ez>かいてん</rt></ruby>の<ruby>前<rt class=ez>まえ</rt></ruby>に<ruby>仕込<rt>しこ</rt></ruby>みを<ruby>終<rt class=ez>お</rt></ruby>わらせます。",source:"飲食物調理テキスト",translations:{id:null,vn:null,ne:null,mm:null}},
    {id:"chouri-akunuki",field:"gaisyoku",category:"chouri",priority:1,level:"ssw1",
     term:"あく抜き",reading:"あくぬき",
     meaning:"<ruby>野菜<rt>やさい</rt></ruby>などの<ruby>苦<rt class=ez>にが</rt></ruby>みやえぐみを<ruby>取<rt class=ez>と</rt></ruby>り<ruby>除<rt>のぞ</rt></ruby>くこと。",
     example:"ごぼうは<ruby>水<rt class=ez>みず</rt></ruby>に<ruby>付<rt>つ</rt></ruby>けてあく<ruby>抜<rt>ぬ</rt></ruby>きします。",source:"飲食物調理テキスト",translations:{id:null,vn:null,ne:null,mm:null}},

/* ===== 学習記録（端末内・ログイン不要）。SoR前提：定着率・弱点分野・継続率の3出力に使える形で保存 =====
   ※ localStorageが使えない環境（サンドボックス等）では自動的に「保存しない」状態で動作する（try/catchで安全化）。
   ※ LincID連携時は、このスキーマ（terms/quiz/drill/situ/days）をそのまま渡せる設計。 */
var PKEY='linc-ssw2-progress';
function blankStat(){return {sessions:0,q:0,correct:0,by:{}};}
function loadP(){try{var r=localStorage.getItem(PKEY); if(r){var o=JSON.parse(r);
   o.terms=o.terms||{}; o.days=o.days||[]; o.quiz=o.quiz||blankStat(); o.drill=o.drill||blankStat(); o.situ=o.situ||blankStat(); return o;}}catch(e){}
 return {v:1, firstSeen:null, lastSeen:null, days:[], terms:{}, quiz:blankStat(), drill:blankStat(), situ:blankStat()};}
var P=loadP();
function saveP(){try{localStorage.setItem(PKEY,JSON.stringify(P));}catch(e){}}
function touchDay(){var t=new Date();
 var iso=t.getFullYear()+'-'+String(t.getMonth()+1).padStart(2,'0')+'-'+String(t.getDate()).padStart(2,'0');
 if(!P.firstSeen)P.firstSeen=iso; P.lastSeen=iso; if(P.days.indexOf(iso)<0)P.days.push(iso);}
function bump(stat,key,ok){stat.q++; if(ok)stat.correct++; var b=stat.by[key]||(stat.by[key]={q:0,correct:0}); b.q++; if(ok)b.correct++;}
function recQuiz(catKey,termId,ok){touchDay(); bump(P.quiz,catKey,ok);
 var tm=P.terms[termId]||(P.terms[termId]={seen:0,correct:0}); tm.seen++; if(ok)tm.correct++; saveP();}
function recDrill(fKey,ok){touchDay(); bump(P.drill,fKey,ok); saveP();}
function recSitu(catKey,ok){touchDay(); bump(P.situ,catKey,ok); saveP();}
function endSession(stat){stat.sessions++; saveP();}
function resetP(){try{localStorage.removeItem(PKEY);}catch(e){} P=loadP();}
function pctOf(b){return b&&b.q?Math.round(b.correct/b.q*100):0;}
function streakDays(){if(!P.days.length)return 0; var ds=P.days.slice().sort().map(function(x){return new Date(x+'T00:00:00');});
 var last=ds[ds.length-1], cnt=1;
 for(var i=ds.length-2;i>=0;i--){var diff=Math.round((last-ds[i])/86400000); if(diff===1){cnt++; last=ds[i];} else if(diff>1){break;}}
 return cnt;}
function strip(s){return s.replace(/<rt>.*?<\/rt>/g,'').replace(/<\/?ruby>/g,'');}
function maskTerm(html, term){
  if(!html||!term) return html||'';
  var t=strip(term); if(!t) return html;
  var segs=[]; var re=/<ruby>([^<]*)<rt[^>]*>[^<]*<\/rt><\/ruby>/g; var last=0, m;
  while((m=re.exec(html))){
    if(m.index>last){ var pl=html.slice(last,m.index); for(var k=0;k<pl.length;k++) segs.push({h:pl[k],b:pl[k]}); }
    segs.push({h:m[0],b:m[1]}); last=re.lastIndex;
  }
  if(last<html.length){ var pl2=html.slice(last); for(var k2=0;k2<pl2.length;k2++) segs.push({h:pl2[k2],b:pl2[k2]}); }
  var base='', spans=[]; for(var i=0;i<segs.length;i++){ var st=base.length; base+=segs[i].b; spans.push([st, base.length]); }
  var marks=new Array(segs.length); var hit=false, from=0, pos;
  while((pos=base.indexOf(t, from))>-1){ var en=pos+t.length;
    for(var j=0;j<segs.length;j++){ if(spans[j][0]<en && spans[j][1]>pos) marks[j]=true; }
    hit=true; from=en;
  }
  if(!hit) return html;
  var out='', a=0;
  while(a<segs.length){
    if(marks[a]){ out+='\u25cb\u25cb'; while(a<segs.length && marks[a]) a++; }
    else { out+=segs[a].h; a++; }
  }
  return out;
}

function shuffle(a){a=a.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}

'chouri-aburarekka':'<b><ruby>意味<rt class=ez>いみ</rt></ruby></b> <ruby>油<rt class=ez>あぶら</rt></ruby>を<ruby>何度<rt class=ez>なんど</rt></ruby>も<ruby>使<rt class=ez>つか</rt></ruby>って<ruby>悪<rt class=ez>わる</rt></ruby>くなること（<ruby>酸化<rt>さんか</rt></ruby>）。<br><b><ruby>見<rt class=ez>み</rt></ruby><ruby>分<rt class=ez>わ</rt></ruby>け</b> <ruby>色<rt class=ez>いろ</rt></ruby>が<ruby>濃<rt>こ</rt></ruby>い・においが<ruby>変<rt>か</rt></ruby>・<ruby>泡<rt>あわ</rt></ruby>が<ruby>消<rt class=ez>き</rt></ruby>えにくい・<ruby>煙<rt>けむり</rt></ruby>が<ruby>早<rt class=ez>はや</rt></ruby>く<ruby>出<rt class=ez>で</rt></ruby>る。<br><b>ポイント</b> <ruby>劣化<rt>れっか</rt></ruby>した<ruby>油<rt class=ez>あぶら</rt></ruby>は<ruby>味<rt class=ez>あじ</rt></ruby>も<ruby>健康<rt>けんこう</rt></ruby>も<ruby>悪<rt class=ez>わる</rt></ruby>い→<ruby>早<rt class=ez>はや</rt></ruby>めに<ruby>交換<rt>こうかん</rt></ruby>。',
'chouri-moritsuke':'<b><ruby>意味<rt class=ez>いみ</rt></ruby></b> <ruby>料理<rt>りょうり</rt></ruby>をお<ruby>皿<rt class=ez>さら</rt></ruby>にきれいに<ruby>並<rt>なら</rt></ruby>べること。<br><b>なぜ<ruby>大事<rt class=ez>だいじ</rt></ruby></b> <ruby>見<rt class=ez>み</rt></ruby>た<ruby>目<rt class=ez>め</rt></ruby>も「<ruby>味<rt class=ez>あじ</rt></ruby>のうち」。おいしそうに<ruby>見<rt class=ez>み</rt></ruby>せて<ruby>満足度<rt>まんぞくど</rt></ruby>を<ruby>上<rt class=ez>あ</rt></ruby>げる。<br><b>コツ</b> <ruby>彩<rt>いろど</rt></ruby>り・<ruby>高<rt class=ez>たか</rt></ruby>さ・<ruby>余白<rt>よはく</rt></ruby>を<ruby>意識<rt>いしき</rt></ruby>する。',
'chouri-ondokei':'<b><ruby>意味<rt class=ez>いみ</rt></ruby></b> <ruby>食<rt class=ez>た</rt></ruby>べ<ruby>物<rt class=ez>もの</rt></ruby>のまん<ruby>中<rt class=ez>なか</rt></ruby>の<ruby>温度<rt class=ez>おんど</rt></ruby>を<ruby>測<rt>はか</rt></ruby>る<ruby>道具<rt class=ez>どうぐ</rt></ruby>。<br><b>つかい<ruby>方<rt class=ez>かた</rt></ruby></b> いちばん<ruby>厚<rt>あつ</rt></ruby>い<ruby>所<rt class=ez>ところ</rt></ruby>に<ruby>刺<rt>さ</rt></ruby>して、<ruby>中心<rt class=ez>ちゅうしん</rt></ruby>75℃で1<ruby>分間<rt class=ez>ふんかん</rt></ruby><ruby>以上<rt>いじょう</rt></ruby>を<ruby>確認<rt>かくにん</rt></ruby>。<br><b>ポイント</b> <ruby>見<rt class=ez>み</rt></ruby>た<ruby>目<rt class=ez>め</rt></ruby>だけに<ruby>頼<rt>たよ</rt></ruby>らず<ruby>数字<rt class=ez>すうじ</rt></ruby>で<ruby>確<rt>たし</rt></ruby>かめる。',
'chouri-kiki':'<b><ruby>意味<rt class=ez>いみ</rt></ruby></b> <ruby>料理<rt>りょうり</rt></ruby>に<ruby>使<rt class=ez>つか</rt></ruby>う<ruby>機械<rt>きかい</rt></ruby>。コンロ・<ruby>冷蔵庫<rt>れいぞうこ</rt></ruby>・<ruby>食洗機<rt>しょくせんき</rt></ruby>・スライサーなど。<br><b><ruby>使<rt class=ez>つか</rt></ruby>い<ruby>方<rt class=ez>かた</rt></ruby></b> <ruby>正<rt class=ez>ただ</rt></ruby>しく<ruby>使<rt class=ez>つか</rt></ruby>い、<ruby>毎日<rt class=ez>まいにち</rt></ruby><ruby>清掃<rt>せいそう</rt></ruby>・<ruby>点検<rt>てんけん</rt></ruby>する。<br><b>ポイント</b> <ruby>刃物<rt>はもの</rt></ruby>や<ruby>熱<rt>ねつ</rt></ruby>を<ruby>使<rt class=ez>つか</rt></ruby>う<ruby>機器<rt>きき</rt></ruby>は<ruby>事故<rt>じこ</rt></ruby>に<ruby>注意<rt class=ez>ちゅうい</rt></ruby>。',

'chouri-oroshiuri':'<b><ruby>意味<rt class=ez>いみ</rt></ruby></b> <ruby>魚<rt class=ez>さかな</rt></ruby>や<ruby>野菜<rt>やさい</rt></ruby>などを<ruby>大量<rt>たいりょう</rt></ruby>に<ruby>売<rt class=ez>う</rt></ruby>り<ruby>買<rt class=ez>か</rt></ruby>いする<ruby>場所<rt class=ez>ばしょ</rt></ruby>。<br><b><ruby>役割<rt>やくわり</rt></ruby></b> <ruby>店<rt class=ez>みせ</rt></ruby>の<ruby>仕入<rt class=ez>しい</rt></ruby>れ<ruby>元<rt class=ez>もと</rt></ruby>の1つ。セリで<ruby>値段<rt>ねだん</rt></ruby>が<ruby>決<rt class=ez>き</rt></ruby>まることもある。<br><b>ポイント</b> <ruby>新鮮<rt>しんせん</rt></ruby>な<ruby>食材<rt>しょくざい</rt></ruby>を<ruby>安定<rt class=ez>あんてい</rt></ruby>して<ruby>仕入<rt class=ez>しい</rt></ruby>れる<ruby>土台<rt class=ez>どだい</rt></ruby>。',
'tenpo-qsc':'<b>3つ</b> Q＝<ruby>品質<rt>ひんしつ</rt></ruby>（おいしさ）／S＝サービス（<ruby>接客<rt>せっきゃく</rt></ruby>）／C＝<ruby>清潔<rt>せいけつ</rt></ruby>（クレンリネス）。<br><b>つかい<ruby>方<rt class=ez>かた</rt></ruby></b> <ruby>良<rt>よ</rt></ruby>い<ruby>店<rt class=ez>みせ</rt></ruby>づくりの<ruby>基本<rt>きほん</rt></ruby><ruby>3本柱<rt class=ez>さんぼんばしら</rt></ruby>。<ruby>点検<rt>てんけん</rt></ruby>や<ruby>評価<rt>ひょうか</rt></ruby>の<ruby>目安<rt class=ez>めやす</rt></ruby>になる。<br><b>QSCA+H</b> <ruby>特定技能<rt>とくていぎのう</rt></ruby>2<ruby>号<rt class=ez>ごう</rt></ruby>では、この3つに +A（Atmosphere＝<ruby>雰囲気<rt>ふんいき</rt></ruby>・<ruby>居心地<rt>いごこち</rt></ruby>）と +H（Hospitality＝おもてなし）を<ruby>加<rt>くわ</rt></ruby>えた「QSCA+H」の<ruby>考<rt class=ez>かんが</rt></ruby>え<ruby>方<rt class=ez>かた</rt></ruby>も<ruby>大切<rt class=ez>たいせつ</rt></ruby>。<br><b>ポイント</b> どれか1つ<ruby>欠<rt>か</rt></ruby>けてもお<ruby>客<rt class=ez>きゃく</rt></ruby>さまは<ruby>離<rt>はな</rt></ruby>れる。',
'tenpo-flcost':'<b><ruby>意味<rt class=ez>いみ</rt></ruby></b> FLコスト＝<ruby>食材費<rt>しょくざいひ</rt></ruby>（F）＋<ruby>人件費<rt>じんけんひ</rt></ruby>（L）の「<ruby>金額<rt>きんがく</rt></ruby>」。<br><b><ruby>区別<rt>くべつ</rt></ruby></b> FL<ruby>比率<rt>ひりつ</rt></ruby>は、これを<ruby>売上<rt class=ez>うりあげ</rt></ruby>で<ruby>割<rt>わ</rt></ruby>った「%」。<ruby>金額<rt>きんがく</rt></ruby>か<ruby>割合<rt>わりあい</rt></ruby>かが<ruby>違<rt>ちが</rt></ruby>う。<br><b>ポイント</b> <ruby>外食<rt class=ez>がいしょく</rt></ruby>で<ruby>最大<rt>さいだい</rt></ruby>の<ruby>費用<rt>ひよう</rt></ruby>。ここを<ruby>管理<rt>かんり</rt></ruby>すると<ruby>利益<rt>りえき</rt></ruby>が<ruby>出<rt class=ez>で</rt></ruby>やすい。',
'tenpo-kenshu':'<b><ruby>何<rt class=ez>なに</rt></ruby>をする</b> <ruby>届<rt>とど</rt></ruby>いた<ruby>食材<rt>しょくざい</rt></ruby>を、<ruby>数量<rt>すうりょう</rt></ruby>・<ruby>品質<rt>ひんしつ</rt></ruby>・<ruby>温度<rt class=ez>おんど</rt></ruby>・<ruby>期限<rt>きげん</rt></ruby>で<ruby>確認<rt>かくにん</rt></ruby>し、<ruby>伝票<rt>でんぴょう</rt></ruby>と<ruby>照<rt>て</rt></ruby>らし<ruby>合<rt class=ez>あ</rt></ruby>わせる。<br><b>なぜ</b> <ruby>不良品<rt>ふりょうひん</rt></ruby>や<ruby>数<rt class=ez>かず</rt></ruby><ruby>違<rt>ちが</rt></ruby>いを<ruby>店<rt class=ez>みせ</rt></ruby>に<ruby>入<rt class=ez>い</rt></ruby>れないため。<br><b>ポイント</b> <ruby>冷<rt>つめ</rt></ruby>たい<ruby>物<rt class=ez>もの</rt></ruby>は<ruby>温度<rt class=ez>おんど</rt></ruby>も<ruby>見<rt class=ez>み</rt></ruby>る（<ruby>常温<rt>じょうおん</rt></ruby>に<ruby>置<rt>お</rt></ruby>かれていないか）。',
'tenpo-hacchu':'<b><ruby>意味<rt class=ez>いみ</rt></ruby></b> <ruby>必要<rt>ひつよう</rt></ruby>な<ruby>食材<rt>しょくざい</rt></ruby>を<ruby>注文<rt class=ez>ちゅうもん</rt></ruby>して<ruby>仕入<rt class=ez>しい</rt></ruby>れること。<br><b><ruby>決<rt class=ez>き</rt></ruby>め<ruby>方<rt class=ez>かた</rt></ruby></b> <ruby>在庫<rt>ざいこ</rt></ruby>と<ruby>売上<rt class=ez>うりあげ</rt></ruby>の<ruby>予想<rt class=ez>よそう</rt></ruby>から<ruby>数量<rt>すうりょう</rt></ruby>を<ruby>決<rt class=ez>き</rt></ruby>める。<br><b>ポイント</b> <ruby>多<rt class=ez>おお</rt></ruby>すぎるとロス、<ruby>少<rt class=ez>すく</rt></ruby>なすぎると<ruby>品切<rt class=ez>しなぎ</rt></ruby>れ。ちょうどを<ruby>狙<rt>ねら</rt></ruby>う。',
'tenpo-zaiko':'<b><ruby>意味<rt class=ez>いみ</rt></ruby></b> <ruby>今<rt class=ez>いま</rt></ruby><ruby>店<rt class=ez>みせ</rt></ruby>にある<ruby>食材<rt>しょくざい</rt></ruby>・<ruby>商品<rt class=ez>しょうひん</rt></ruby>の<ruby>残<rt>のこ</rt></ruby>り。<br><b><ruby>多<rt class=ez>おお</rt></ruby>い／<ruby>少<rt class=ez>すく</rt></ruby>ない</b> <ruby>多<rt class=ez>おお</rt></ruby>すぎ→<ruby>古<rt class=ez>ふる</rt></ruby>くなってロス・<ruby>お金<rt class=ez>おかね</rt></ruby>が<ruby>寝<rt>ね</rt></ruby>る。<ruby>少<rt class=ez>すく</rt></ruby>なすぎ→<ruby>品切<rt class=ez>しなぎ</rt></ruby>れ。<br><b>ポイント</b> <ruby>先入<rt class=ez>さきい</rt></ruby>れ<ruby>先出<rt class=ez>さきだ</rt></ruby>しと<ruby>組<rt class=ez>く</rt></ruby>み<ruby>合<rt class=ez>あ</rt></ruby>わせて<ruby>適正<rt>てきせい</rt></ruby>な<ruby>量<rt>りょう</rt></ruby>を<ruby>保<rt>たも</rt></ruby>つ。',
'tenpo-fifo':'<b>ルール</b> <ruby>古<rt class=ez>ふる</rt></ruby>い<ruby>物<rt class=ez>もの</rt></ruby>から<ruby>先<rt class=ez>さき</rt></ruby>に<ruby>使<rt class=ez>つか</rt></ruby>う（First In, First Out）。<br><b>やり<ruby>方<rt class=ez>かた</rt></ruby></b> <ruby>新<rt class=ez>あたら</rt></ruby>しい<ruby>物<rt class=ez>もの</rt></ruby>を<ruby>奥<rt>おく</rt></ruby>に、<ruby>古<rt class=ez>ふる</rt></ruby>い<ruby>物<rt class=ez>もの</rt></ruby>を<ruby>手前<rt class=ez>てまえ</rt></ruby>に<ruby>置<rt>お</rt></ruby>く。<ruby>日付<rt>ひづけ</rt></ruby>を<ruby>見<rt class=ez>み</rt></ruby>える<ruby>化<rt class=ez>か</rt></ruby>。<br><b>ポイント</b> <ruby>期限切<rt>きげんぎ</rt></ruby>れの<ruby>廃棄<rt>はいき</rt></ruby>（ロス）を<ruby>減<rt>へ</rt></ruby>らす<ruby>基本<rt>きほん</rt></ruby>。',
'tenpo-hanbaisokushin':'<b><ruby>意味<rt class=ez>いみ</rt></ruby></b> もっと<ruby>買<rt class=ez>か</rt></ruby>ってもらうための<ruby>工夫<rt>くふう</rt></ruby>。<br><b>れい</b> クーポン・セットメニュー・<ruby>期間限定<rt>きかんげんてい</rt></ruby>・SNS<ruby>発信<rt>はっしん</rt></ruby>など。<br><b>ねらい</b> <ruby>客数<rt class=ez>きゃくすう</rt></ruby>を<ruby>増<rt>ふ</rt></ruby>やす／<ruby>客単価<rt>きゃくたんか</rt></ruby>を<ruby>上<rt class=ez>あ</rt></ruby>げる。<br><b>ポイント</b> <ruby>値引<rt>ねび</rt></ruby>きは<ruby>利益<rt>りえき</rt></ruby>を<ruby>削<rt>けず</rt></ruby>るので、<ruby>目的<rt>もくてき</rt></ruby>を<ruby>決<rt class=ez>き</rt></ruby>めて<ruby>使<rt class=ez>つか</rt></ruby>う。',

'tenpo-cashless':'<b><ruby>意味<rt class=ez>いみ</rt></ruby></b> <ruby>現金<rt>げんきん</rt></ruby>を<ruby>使<rt class=ez>つか</rt></ruby>わず、カードやスマホで<ruby>払<rt>はら</rt></ruby>う。<br><b><ruby>良<rt>よ</rt></ruby>い<ruby>点<rt class=ez>てん</rt></ruby></b> <ruby>会計<rt class=ez>かいけい</rt></ruby>が<ruby>早<rt class=ez>はや</rt></ruby>い・<ruby>現金<rt>げんきん</rt></ruby>に<ruby>触<rt>ふ</rt></ruby>れず<ruby>衛生的<rt>えいせいてき</rt></ruby>・<ruby>売上<rt class=ez>うりあげ</rt></ruby>データが<ruby>残<rt>のこ</rt></ruby>る。<br><b><ruby>注意<rt class=ez>ちゅうい</rt></ruby></b> <ruby>店<rt class=ez>みせ</rt></ruby>が<ruby>払<rt>はら</rt></ruby>う<ruby>手数料<rt>てすうりょう</rt></ruby>がかかる。',

'tenpo-koteikyakuka':'<b><ruby>意味<rt class=ez>いみ</rt></ruby></b> <ruby>初<rt>はじ</rt></ruby>めてのお<ruby>客<rt class=ez>きゃく</rt></ruby>さまに、<ruby>何度<rt class=ez>なんど</rt></ruby>も<ruby>来<rt class=ez>き</rt></ruby>てもらえるようにすること。<br><b><ruby>方法<rt>ほうほう</rt></ruby></b> よい<ruby>接客<rt>せっきゃく</rt></ruby>・ポイント<ruby>制度<rt>せいど</rt></ruby>・<ruby>名前<rt class=ez>なまえ</rt></ruby>を<ruby>覚<rt>おぼ</rt></ruby>えるなど。<br><b>ポイント</b> <ruby>新規<rt>しんき</rt></ruby>を<ruby>増<rt>ふ</rt></ruby>やすより、<ruby>固定客<rt>こていきゃく</rt></ruby>を<ruby>育<rt class=ez>そだ</rt></ruby>てる<ruby>方<rt class=ez>ほう</rt></ruby>が<ruby>利益<rt>りえき</rt></ruby>に<ruby>効<rt>き</rt></ruby>く。',

'tenpo-saiyo':'<b><ruby>意味<rt class=ez>いみ</rt></ruby></b> <ruby>新<rt class=ez>あたら</rt></ruby>しく<ruby>働<rt>はたら</rt></ruby>く<ruby>人<rt class=ez>ひと</rt></ruby>を<ruby>選<rt>えら</rt></ruby>ぶ<ruby>面接<rt>めんせつ</rt></ruby>。<br><b><ruby>見<rt class=ez>み</rt></ruby>る<ruby>点<rt class=ez>てん</rt></ruby></b> <ruby>人柄<rt>ひとがら</rt></ruby>・<ruby>働<rt>はたら</rt></ruby>ける<ruby>時間<rt class=ez>じかん</rt></ruby>（シフト）・<ruby>長<rt class=ez>なが</rt></ruby>く<ruby>続<rt>つづ</rt></ruby>けられそうか。<br><b>ポイント</b> <ruby>人手不足<rt>ひとでぶそく</rt></ruby>の<ruby>外食<rt class=ez>がいしょく</rt></ruby>では、<ruby>採用<rt>さいよう</rt></ruby>と<ruby>定着<rt class=ez>ていちゃく</rt></ruby>が<ruby>店<rt class=ez>みせ</rt></ruby>の<ruby>力<rt class=ez>ちから</rt></ruby>を<ruby>左右<rt class=ez>さゆう</rt></ruby>する。',

'tenpo-offjt':'<b><ruby>意味<rt class=ez>いみ</rt></ruby></b> Off the Job Training。<ruby>現場<rt>げんば</rt></ruby>を<ruby>離<rt>はな</rt></ruby>れて<ruby>研修<rt>けんしゅう</rt></ruby>などで<ruby>学<rt class=ez>まな</rt></ruby>ぶ。<br><b>れい</b> <ruby>衛生<rt>えいせい</rt></ruby>の<ruby>講習<rt>こうしゅう</rt></ruby>・<ruby>接客<rt>せっきゃく</rt></ruby>マナーの<ruby>座学<rt>ざがく</rt></ruby>など。<br><b>ポイント</b> <ruby>基本<rt>きほん</rt></ruby>や<ruby>理由<rt class=ez>りゆう</rt></ruby>をまとめて<ruby>学<rt class=ez>まな</rt></ruby>べる。OJTと<ruby>両方<rt class=ez>りょうほう</rt></ruby><ruby>使<rt class=ez>つか</rt></ruby>う。',

'tenpo-jikantai':'<b><ruby>役割<rt>やくわり</rt></ruby></b> <ruby>店長<rt class=ez>てんちょう</rt></ruby>のかわりに、その<ruby>時間<rt class=ez>じかん</rt></ruby>の<ruby>店<rt class=ez>みせ</rt></ruby>をまとめる<ruby>責任者<rt>せきにんしゃ</rt></ruby>。<br><b><ruby>仕事<rt class=ez>しごと</rt></ruby></b> その<ruby>時間帯<rt>じかんたい</rt></ruby>のQSC・<ruby>売上<rt class=ez>うりあげ</rt></ruby>・<ruby>人<rt class=ez>ひと</rt></ruby>の<ruby>配置<rt>はいち</rt></ruby>に<ruby>責任<rt>せきにん</rt></ruby>を<ruby>持<rt class=ez>も</rt></ruby>つ。<br><b>ポイント</b> <ruby>店長<rt class=ez>てんちょう</rt></ruby>が<ruby>不在<rt>ふざい</rt></ruby>でも<ruby>店<rt class=ez>みせ</rt></ruby>が<ruby>回<rt class=ez>まわ</rt></ruby>るようにする<ruby>要<rt>かなめ</rt></ruby>。',
'tenpo-suggestive':'<b><ruby>意味<rt class=ez>いみ</rt></ruby></b> お<ruby>客<rt class=ez>きゃく</rt></ruby>さまに、もう<ruby>一品<rt class=ez>いっぴん</rt></ruby>やデザートなどを<ruby>感<rt class=ez>かん</rt></ruby>じよく<ruby>勧<rt>すす</rt></ruby>めること。<br><b>れい</b> 「ご<ruby>一緒<rt>いっしょ</rt></ruby>にスープはいかがですか」。<br><b>ねらい</b> <ruby>客単価<rt>きゃくたんか</rt></ruby>を<ruby>上<rt class=ez>あ</rt></ruby>げる。<br><b>ポイント</b> <ruby>押<rt>お</rt></ruby>し<ruby>付<rt>つ</rt></ruby>けず、お<ruby>客<rt class=ez>きゃく</rt></ruby>さまに<ruby>役立<rt class=ez>やくだ</rt></ruby>つ<ruby>提案<rt>ていあん</rt></ruby>にする。',
'eisei-fukensei':'<b><ruby>意味<rt class=ez>いみ</rt></ruby></b> <ruby>症状<rt>しょうじょう</rt></ruby>が<ruby>出<rt class=ez>で</rt></ruby>ないのに、<ruby>菌<rt>きん</rt></ruby>やウイルスを<ruby>持<rt class=ez>も</rt></ruby>っている<ruby>状態<rt>じょうたい</rt></ruby>。<ruby>本人<rt class=ez>ほんにん</rt></ruby>は<ruby>気<rt class=ez>き</rt></ruby>づかない。<br><b>こわさ</b> <ruby>元気<rt class=ez>げんき</rt></ruby>に<ruby>見<rt class=ez>み</rt></ruby>えても、<ruby>知<rt class=ez>し</rt></ruby>らないうちに<ruby>食品<rt class=ez>しょくひん</rt></ruby>を<ruby>汚<rt>よご</rt></ruby>すことがある。<br><b><ruby>対策<rt>たいさく</rt></ruby></b> <ruby>日<rt class=ez>ひ</rt></ruby>ごろの<ruby>手洗<rt>てあら</rt></ruby>い・<ruby>体調<rt class=ez>たいちょう</rt></ruby><ruby>管理<rt>かんり</rt></ruby>・<ruby>検便<rt>けんべん</rt></ruby>（<ruby>健康診断<rt>けんこうしんだん</rt></ruby>）。',
'eisei-3gensoku':'<b>3つ</b> ①<ruby>付<rt>つ</rt></ruby>けない（<ruby>手洗<rt>てあら</rt></ruby>い・<ruby>器具<rt>きぐ</rt></ruby>の<ruby>区別<rt>くべつ</rt></ruby>）②<ruby>増<rt>ふ</rt></ruby>やさない（すぐ<ruby>冷<rt>ひ</rt></ruby>やす・<ruby>常温<rt>じょうおん</rt></ruby>に<ruby>置<rt>お</rt></ruby>かない）③やっつける（しっかり<ruby>加熱<rt>かねつ</rt></ruby>）。<br><b>ポイント</b> どれか1つでも<ruby>守<rt class=ez>まも</rt></ruby>れば<ruby>食中毒<rt>しょくちゅうどく</rt></ruby>は<ruby>大<rt class=ez>おお</rt></ruby>きく<ruby>減<rt>へ</rt></ruby>る。<ruby>外食<rt class=ez>がいしょく</rt></ruby>の<ruby>基本<rt>きほん</rt></ruby>の<ruby>型<rt>かた</rt></ruby>。',
'eisei-haccp':'<b>しくみ</b> <ruby>料理<rt>りょうり</rt></ruby>の<ruby>工程<rt>こうてい</rt></ruby>ごとに<ruby>危<rt>あぶ</rt></ruby>ない<ruby>点<rt class=ez>てん</rt></ruby>（<ruby>加熱<rt>かねつ</rt></ruby>・<ruby>冷却<rt>れいきゃく</rt></ruby>など）を<ruby>決<rt class=ez>き</rt></ruby>め、そこを<ruby>記録<rt>きろく</rt></ruby>しながら<ruby>管理<rt>かんり</rt></ruby>する<ruby>方法<rt>ほうほう</rt></ruby>。<br><b><ruby>中身<rt class=ez>なかみ</rt></ruby></b> 「<ruby>7原則<rt>ななげんそく</rt></ruby>・<ruby>12手順<rt>じゅうにてじゅん</rt></ruby>」で<ruby>進<rt class=ez>すす</rt></ruby>める（<ruby>手順<rt>てじゅん</rt></ruby>6〜12＝<ruby>原則<rt>げんそく</rt></ruby>1〜7）。<br><b>ポイント</b> <ruby>結果<rt>けっか</rt></ruby>だけでなく「<ruby>作<rt class=ez>つく</rt></ruby>る<ruby>過程<rt>かてい</rt></ruby>」を<ruby>見<rt class=ez>み</rt></ruby>て<ruby>安全<rt class=ez>あんぜん</rt></ruby>を<ruby>守<rt class=ez>まも</rt></ruby>る<ruby>考<rt class=ez>かんが</rt></ruby>え<ruby>方<rt class=ez>かた</rt></ruby>。',
'eisei-shokuchudoku':'<b>4つの<ruby>原因<rt>げんいん</rt></ruby></b> ①<ruby>細菌性<rt>さいきんせい</rt></ruby>（サルモネラ等）②ウイルス<ruby>性<rt>せい</rt></ruby>（ノロ）③<ruby>化学性<rt>かがくせい</rt></ruby>（ヒスタミン等）④<ruby>寄生虫性<rt>きせいちゅうせい</rt></ruby>（アニサキス）。<br><b><ruby>予防<rt>よぼう</rt></ruby></b> <ruby>付<rt>つ</rt></ruby>けない・<ruby>増<rt>ふ</rt></ruby>やさない・やっつけるの<ruby>3原則<rt>さんげんそく</rt></ruby>。<br><b>ポイント</b> <ruby>原因<rt>げんいん</rt></ruby>で<ruby>対策<rt>たいさく</rt></ruby>が<ruby>変<rt>か</rt></ruby>わるので、まず<ruby>種類<rt>しゅるい</rt></ruby>を<ruby>知<rt class=ez>し</rt></ruby>る。',
'eisei-nijiosen':'<b><ruby>経路<rt>けいろ</rt></ruby></b> <ruby>生肉<rt class=ez>なまにく</rt></ruby>や<ruby>魚<rt class=ez>さかな</rt></ruby>の<ruby>菌<rt>きん</rt></ruby>が、<ruby>手<rt class=ez>て</rt></ruby>・まな<ruby>板<rt class=ez>いた</rt></ruby>・ふきんを<ruby>通<rt class=ez>つう</rt></ruby>じて、<ruby>加熱<rt>かねつ</rt></ruby>しない<ruby>食材<rt>しょくざい</rt></ruby>（サラダなど）に<ruby>移<rt>うつ</rt></ruby>ること。<br><b><ruby>防<rt>ふせ</rt></ruby>ぎ<ruby>方<rt class=ez>かた</rt></ruby></b> <ruby>生用<rt class=ez>なまよう</rt></ruby>と<ruby>加熱用<rt>かねつよう</rt></ruby>でまな<ruby>板<rt class=ez>いた</rt></ruby>・<ruby>包丁<rt>ほうちょう</rt></ruby>を<ruby>分<rt class=ez>わ</rt></ruby>ける。こまめに<ruby>手<rt class=ez>て</rt></ruby>を<ruby>洗<rt>あら</rt></ruby>う。<br><b>ポイント</b> 「きれいな<ruby>物<rt class=ez>もの</rt></ruby>にうっかり<ruby>菌<rt>きん</rt></ruby>を<ruby>移<rt>うつ</rt></ruby>す」のが<ruby>二次汚染<rt>にじおせん</rt></ruby>。',
'eisei-chushinondo':'<b><ruby>基準<rt>きじゅん</rt></ruby></b> <ruby>中心<rt class=ez>ちゅうしん</rt></ruby><ruby>部<rt class=ez>ぶ</rt></ruby>を75℃で1<ruby>分間<rt class=ez>ふんかん</rt></ruby><ruby>以上<rt>いじょう</rt></ruby>が<ruby>基本<rt>きほん</rt></ruby>。ノロの<ruby>心配<rt class=ez>しんぱい</rt></ruby>がある<ruby>二枚貝<rt>にまいがい</rt></ruby>は85〜90℃で90<ruby>秒<rt class=ez>びょう</rt></ruby><ruby>以上<rt>いじょう</rt></ruby>。<br><b>はかり<ruby>方<rt class=ez>かた</rt></ruby></b> いちばん<ruby>厚<rt>あつ</rt></ruby>い<ruby>所<rt class=ez>ところ</rt></ruby>に<ruby>中心温度計<rt class=ez>ちゅうしんおんどけい</rt></ruby>を<ruby>刺<rt>さ</rt></ruby>して<ruby>測<rt>はか</rt></ruby>る。<br><b>ポイント</b> <ruby>表面<rt class=ez>ひょうめん</rt></ruby>だけ<ruby>焼<rt>や</rt></ruby>けても<ruby>中<rt class=ez>なか</rt></ruby>が<ruby>生<rt class=ez>なま</rt></ruby>なら<ruby>危険<rt>きけん</rt></ruby>。',
'eisei-kikenondo':'<b><ruby>範囲<rt>はんい</rt></ruby></b> およそ10℃〜60℃。<ruby>菌<rt>きん</rt></ruby>がいちばん<ruby>増<rt>ふ</rt></ruby>えやすい<ruby>温度<rt class=ez>おんど</rt></ruby>の<ruby>帯<rt>おび</rt></ruby>。<br><b><ruby>対策<rt>たいさく</rt></ruby></b> <ruby>料理<rt>りょうり</rt></ruby>はこの<ruby>帯<rt>おび</rt></ruby>を<ruby>素早<rt>すばや</rt></ruby>く<ruby>通<rt class=ez>とお</rt></ruby>す（<ruby>早<rt class=ez>はや</rt></ruby>く<ruby>冷<rt>ひ</rt></ruby>やす・<ruby>熱<rt>あつ</rt></ruby>いまま<ruby>出<rt class=ez>だ</rt></ruby>す）。10℃<ruby>以下<rt>いか</rt></ruby>か65℃<ruby>以上<rt>いじょう</rt></ruby>で<ruby>保管<rt>ほかん</rt></ruby>。<br><b>ポイント</b> 「ぬるい<ruby>時間<rt class=ez>じかん</rt></ruby>」を<ruby>短<rt class=ez>みじか</rt></ruby>くするのがコツ。',

'eisei-kagakusei':'<b><ruby>原因<rt>げんいん</rt></ruby></b> <ruby>化学<rt class=ez>かがく</rt></ruby><ruby>物質<rt>ぶっしつ</rt></ruby>による<ruby>食中毒<rt>しょくちゅうどく</rt></ruby>。<br><b>れい</b> <ruby>古<rt class=ez>ふる</rt></ruby>い<ruby>青魚<rt class=ez>あおざかな</rt></ruby>にできるヒスタミン、<ruby>洗剤<rt>せんざい</rt></ruby>・<ruby>農薬<rt class=ez>のうやく</rt></ruby>の<ruby>混入<rt>こんにゅう</rt></ruby>など。<br><b>ポイント</b> ヒスタミンは<ruby>加熱<rt>かねつ</rt></ruby>しても<ruby>消<rt class=ez>き</rt></ruby>えない→<ruby>魚<rt class=ez>さかな</rt></ruby>は<ruby>低温<rt>ていおん</rt></ruby>で<ruby>管理<rt>かんり</rt></ruby>。<ruby>洗剤<rt>せんざい</rt></ruby>は<ruby>食品<rt class=ez>しょくひん</rt></ruby>と<ruby>分<rt class=ez>わ</rt></ruby>けて<ruby>保管<rt>ほかん</rt></ruby>。',
