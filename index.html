<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#E8743B">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="description" content="特定技能2号（外食業）の試験に出る<ruby>言葉<rt>ことば</rt></ruby>を、ふりがなつきで学べる無料アプリ。">
<title>特定技能2号 外食業 試験対策 — 外食ことば</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#FAF5EC; --paper2:#F3EADB; --card:#FFFFFF;
  --ink:#2A2722; --ink2:#6E665A; --ink3:#A89E8C;
  --line:#E8DEC9;
  --persimmon:#E8743B; --persimmon-d:#C9551F;
  --green:#2E9E7E; --indigo:#3E6FB0; --amber:#D98A2B; --red:#D85a4a;
  --gold:#E0A94F;
  --r:20px; --r-s:13px;
  --sh:0 10px 30px -12px rgba(80,55,25,.28);
  --sh-s:0 3px 12px -6px rgba(80,55,25,.22);
  --disp:"Zen Maru Gothic", system-ui, sans-serif;
  --body:"Zen Kaku Gothic New", system-ui, sans-serif;
}
*{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent}
/* タップの当たり判定：ボタン内の子要素（div/span等）をタップしても、必ず親ボタンに伝える。
   モバイルで「押したのに無反応」を防ぐ。あわせてタップ遅延も除去。 */
button{touch-action:manipulation}
.app button *{pointer-events:none}
html,body{height:100%}
body{
  font-family:var(--body); color:var(--ink); line-height:1.7;
  background:
    radial-gradient(120% 90% at 100% -10%, #FCEFD9 0%, transparent 55%),
    radial-gradient(120% 90% at -20% 110%, #EAF3EC 0%, transparent 55%),
    var(--paper);
  background-attachment:fixed;
  -webkit-font-smoothing:antialiased;
}
ruby rt{font-family:var(--body); font-weight:500; font-size:.55em; color:var(--persimmon-d); letter-spacing:0; user-select:none; transition:opacity .2s}
body.hide-furigana rt{display:none}
rt.ez{display:none}
body.show-ez rt.ez{display:revert}
.app{max-width:480px; margin:0 auto; min-height:100dvh; padding:0 18px 120px; position:relative}
.hd{position:sticky; top:0; z-index:30; display:flex; align-items:center; justify-content:space-between;
   padding:16px 2px 12px; margin-bottom:6px;
   background:linear-gradient(var(--paper) 72%, transparent)}
.brand{display:flex; align-items:center; gap:9px; font-family:var(--disp); font-weight:900; letter-spacing:.02em}
.brand .mk{width:30px; height:30px; border-radius:9px; background:linear-gradient(135deg,var(--persimmon),var(--gold));
   display:grid; place-items:center; color:#fff; font-size:16px; box-shadow:var(--sh-s)}
.brand b{font-size:17px; display:block}
.brand span{font-size:10.5px; color:var(--ink3); font-family:var(--body); font-weight:500; display:block; margin-top:-3px; letter-spacing:.06em}
.fbtn{display:inline-flex; align-items:center; gap:7px; border:1.5px solid var(--line); background:var(--card);
   padding:7px 11px 7px 9px; border-radius:999px; font-size:12px; font-weight:700; color:var(--ink2);
   cursor:pointer; box-shadow:var(--sh-s); transition:transform .12s; font-family:var(--body)}
.fbtn:active{transform:scale(.95)}
.dot{width:30px; height:18px; border-radius:999px; background:var(--line); position:relative; transition:background .2s}
.dot::after{content:""; position:absolute; top:2px; left:2px; width:14px; height:14px; border-radius:50%;
   background:#fff; box-shadow:0 1px 3px rgba(0,0,0,.25); transition:transform .2s}
.fbtn.on .dot{background:var(--persimmon)} .fbtn.on .dot::after{transform:translateX(12px)}
.hero{padding:10px 4px 22px}
.hero h1{font-family:var(--disp); font-weight:900; font-size:30px; line-height:1.25; letter-spacing:.01em}
.hero h1 em{font-style:normal; color:var(--persimmon)}
.hero p{color:var(--ink2); font-size:13.5px; margin-top:8px}
.hero .tot{display:inline-flex; align-items:baseline; gap:6px; margin-top:16px; background:var(--card);
   border:1.5px solid var(--line); border-radius:999px; padding:6px 15px; box-shadow:var(--sh-s); font-size:12.5px; color:var(--ink2); font-weight:500}
.hero .tot b{font-family:var(--disp); font-size:18px; color:var(--ink)}
.sec-l{font-size:11.5px; font-weight:700; color:var(--ink3); letter-spacing:.14em; margin:6px 4px 12px}
.grid{display:grid; grid-template-columns:1fr 1fr; gap:13px}
.cat{position:relative; overflow:hidden; border:none; text-align:left; cursor:pointer;
   background:var(--card); border-radius:var(--r); padding:17px 16px 15px; box-shadow:var(--sh-s);
   transition:transform .14s, box-shadow .2s; animation:up .5s both; font-family:var(--body)}
.cat:active{transform:scale(.97)}
.cat:hover{box-shadow:var(--sh)}
.cat .ic{width:42px; height:42px; border-radius:12px; display:grid; place-items:center; font-size:22px; margin-bottom:12px}
.cat h3{font-family:var(--disp); font-weight:700; font-size:18px}
.cat .en{font-size:10px; color:var(--ink3); letter-spacing:.08em; font-weight:500; text-transform:uppercase}
.cat .n{position:absolute; top:15px; right:15px; font-family:var(--disp); font-weight:900; font-size:15px; color:var(--ink3)}
.cat .n small{font-size:10px; font-weight:500}
.cat .bar{height:5px; border-radius:999px; background:var(--paper2); margin-top:13px; overflow:hidden}
.cat .bar i{display:block; height:100%; border-radius:999px; width:100%}
.cat[data-h="green"] .ic{background:#E2F3ED; color:var(--green)} .cat[data-h="green"] .bar i{background:var(--green)}
.cat[data-h="indigo"] .ic{background:#E6EEF8; color:var(--indigo)} .cat[data-h="indigo"] .bar i{background:var(--indigo)}
.cat[data-h="persimmon"] .ic{background:#FBE7DA; color:var(--persimmon-d)} .cat[data-h="persimmon"] .bar i{background:var(--persimmon)}
.cat[data-h="amber"] .ic{background:#F8EBD6; color:var(--amber)} .cat[data-h="amber"] .bar i{background:var(--amber)}
.allbtn{width:100%; margin-top:14px; border:1.5px dashed var(--line); background:transparent; color:var(--ink2);
   border-radius:var(--r); padding:15px; font-size:13.5px; font-weight:700; font-family:var(--body); cursor:pointer; transition:.15s}
.allbtn:active{transform:scale(.98)} .allbtn:hover{border-color:var(--persimmon); color:var(--persimmon-d)}
.back{display:inline-flex; align-items:center; gap:6px; background:none; border:none; color:var(--ink2);
   font-family:var(--body); font-weight:700; font-size:13.5px; cursor:pointer; padding:6px 2px; margin:2px 0 6px}
.btn{display:inline-flex; align-items:center; justify-content:center; gap:8px; width:100%; border:none; cursor:pointer;
   font-family:var(--disp); font-weight:700; font-size:16px; padding:16px; border-radius:var(--r); transition:transform .12s, filter .2s}
.btn:active{transform:scale(.98)}
.btn.p{background:linear-gradient(135deg,var(--persimmon),var(--persimmon-d)); color:#fff; box-shadow:var(--sh)}
.btn.p:hover{filter:brightness(1.05)}
.btn.g{background:var(--card); color:var(--ink); border:1.5px solid var(--line); box-shadow:var(--sh-s)}
.btn.row{margin-top:11px}
.chead{display:flex; align-items:center; gap:14px; margin:4px 2px 20px}
.chead .ic{width:54px; height:54px; border-radius:15px; display:grid; place-items:center; font-size:28px; flex:none}
.chead h2{font-family:var(--disp); font-weight:900; font-size:24px}
.chead .en{font-size:11px; color:var(--ink3); letter-spacing:.1em; text-transform:uppercase; font-weight:500}
.peek{margin-top:24px}
.term-row{display:flex; align-items:baseline; gap:10px; padding:11px 2px; border-bottom:1px solid var(--line)}
.term-row b{font-family:var(--disp); font-weight:700; font-size:15.5px; flex:none}
.term-row span{color:var(--ink2); font-size:12.5px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
.idx-row{display:flex;align-items:center;gap:10px;padding:12px 4px;border-bottom:1px solid var(--line);cursor:pointer;width:100%;text-align:left;background:none;border-top:0;border-left:0;border-right:0;font:inherit;color:inherit}
.idx-row:active{background:var(--card)}
.idx-row .bk{flex:none;width:20px;font-size:15px;text-align:center}
.idx-row .tx{flex:1;min-width:0;display:flex;flex-direction:column}
.idx-row .tx b{font-family:var(--disp);font-weight:700;font-size:15px}
.idx-row .tx span{color:var(--ink2);font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.idx-row .ar{flex:none;color:var(--ink3);font-size:16px}
.idx-cap{font-size:11.5px;color:var(--ink2);margin:2px 4px 10px}
.prog{height:7px; border-radius:999px; background:var(--paper2); overflow:hidden; margin:2px 2px 18px}
.prog i{display:block; height:100%; background:linear-gradient(90deg,var(--persimmon),var(--gold)); border-radius:999px; transition:width .3s}
.count{text-align:center; font-size:12px; color:var(--ink3); font-weight:700; letter-spacing:.05em; margin-bottom:12px}
.scene{margin-top:2px}
.fcard2{position:relative; width:100%; min-height:340px; cursor:pointer; border-radius:24px; background:var(--card);
   box-shadow:var(--sh); border:1px solid var(--line); padding:26px; display:flex; flex-direction:column; animation:fade .25s both}
.fcard2.isfront{align-items:center; justify-content:center; text-align:center; gap:14px}
.fcard2 .tag{align-self:flex-start; font-size:10.5px; font-weight:700; letter-spacing:.06em; padding:4px 10px; border-radius:999px; color:#fff; font-family:var(--body)}
.fcard2 .word{font-family:var(--disp); font-weight:900; font-size:38px; line-height:1.3}
.fcard2 .word rt{font-size:.42em}
.fcard2 .hint{font-size:12px; color:var(--ink3); margin-top:4px}
.fcard2 .lab{font-size:10.5px; font-weight:700; color:var(--ink3); letter-spacing:.1em; margin-bottom:5px}
.fcard2 .mean{font-size:18px; font-weight:500; line-height:1.75; margin-bottom:18px}
.fcard2 .ex{background:var(--paper); border-radius:13px; padding:13px 14px; font-size:14.5px; color:var(--ink); line-height:1.8}
.fcard2 .src{margin-top:auto; padding-top:14px; font-size:11px; color:var(--ink3)}
.fcard2 .src b{color:var(--ink2); font-weight:700}
@keyframes fade{from{opacity:0; transform:translateY(6px)} to{opacity:1; transform:none}}
.nav{display:flex; gap:10px; margin-top:18px; align-items:center}
.nav button{flex:1; border:1.5px solid var(--line); background:var(--card); border-radius:14px; padding:14px; cursor:pointer;
   font-family:var(--disp); font-weight:700; font-size:15px; color:var(--ink); box-shadow:var(--sh-s); transition:transform .12s}
.nav button:active{transform:scale(.95)} .nav button:disabled{opacity:.4}
.nav .mid{flex:1.3; background:linear-gradient(135deg,var(--persimmon),var(--persimmon-d)); color:#fff; border:none}
.tools{display:flex; justify-content:center; margin-top:14px; gap:6px; flex-wrap:wrap}
.tools button{background:none; border:none; color:var(--ink2); font-family:var(--body); font-weight:700; font-size:12.5px; cursor:pointer; padding:6px 12px}
.q-card{background:var(--card); border:1px solid var(--line); border-radius:24px; box-shadow:var(--sh); padding:24px 22px; animation:up .35s both}
.q-card .qk{font-size:11px; font-weight:700; color:var(--persimmon-d); letter-spacing:.08em; margin-bottom:12px}
.q-card .qt{font-family:var(--disp); font-weight:700; font-size:25px; line-height:1.45}
.q-card .qt.sm{font-size:18px; font-weight:500; font-family:var(--body); line-height:1.7}
.opts{margin-top:18px; display:flex; flex-direction:column; gap:11px}
.opt{text-align:left; border:1.5px solid var(--line); background:var(--card); border-radius:15px; padding:15px 16px;
   font-family:var(--body); font-size:15.5px; font-weight:500; color:var(--ink); cursor:pointer; transition:.15s; line-height:1.6}
.opt:active{transform:scale(.99)} .opt:hover{border-color:var(--ink3)}
.opt.correct{border-color:var(--green); background:#E9F7F1; color:#1d6f59; font-weight:700}
.opt.wrong{border-color:var(--red); background:#FBECEA; color:#b23a2c}
.opt.dim{opacity:.5}
.q-foot{margin-top:18px; min-height:8px}
.res{text-align:center; padding-top:10px; animation:up .4s both}
.ring{width:168px; height:168px; margin:8px auto 4px; position:relative}
.ring svg{transform:rotate(-90deg)}
.ring .num{position:absolute; inset:0; display:grid; place-content:center; font-family:var(--disp); font-weight:900}
.ring .num b{font-size:46px; line-height:1} .ring .num span{font-size:13px; color:var(--ink2); font-weight:500}
.res .verdict{font-family:var(--disp); font-weight:900; font-size:24px; margin-top:6px}
.res .pass{color:var(--green)} .res .fail{color:var(--persimmon-d)}
.res .sub{color:var(--ink2); font-size:13.5px; margin-top:6px}
@keyframes up{from{opacity:0; transform:translateY(14px)} to{opacity:1; transform:none}}
footer{position:fixed; left:0; right:0; bottom:0; text-align:center; font-size:10.5px; color:var(--ink3);
   padding:9px; background:linear-gradient(transparent, var(--paper) 40%); pointer-events:none}
/* ===== 計算ドリル（v1.1で追加） ===== */
.note{margin-top:14px; background:#FBF3E2; border:1.5px solid var(--line); border-radius:var(--r-s); padding:11px 13px; font-size:12px; color:var(--ink2); line-height:1.7}
.note b{color:var(--persimmon-d)}
.calcbtn{width:100%; margin-top:12px; display:flex; align-items:center; gap:12px; text-align:left; cursor:pointer; border:none;
   background:linear-gradient(135deg,var(--indigo),#2E527F); color:#fff; border-radius:var(--r); padding:16px 17px; box-shadow:var(--sh); font-family:var(--body); transition:transform .12s}
.calcbtn:active{transform:scale(.98)}
.calcbtn>span:first-child{font-size:24px}
.calcbtn b{font-family:var(--disp); font-weight:900; font-size:16.5px; display:block}
.calcbtn small{font-size:11.5px; opacity:.85; display:block; margin-top:1px}
.calcbtn .arr{margin-left:auto; font-size:22px; opacity:.85}
.fcard-list{display:flex; flex-direction:column; gap:11px}
.fc{position:relative; text-align:left; cursor:pointer; border:1.5px solid var(--line); background:var(--card); border-radius:var(--r); padding:15px 16px; box-shadow:var(--sh-s); transition:transform .14s, box-shadow .2s, border-color .2s; animation:up .45s both; font-family:var(--body); display:flex; align-items:center; gap:13px}
.fc:active{transform:scale(.98)} .fc:hover{box-shadow:var(--sh); border-color:var(--indigo)}
.fc .ic{width:44px; height:44px; border-radius:12px; flex:none; display:grid; place-items:center; font-size:20px; background:#E6EEF8; color:var(--indigo); font-family:var(--disp); font-weight:900}
.fc h3{font-family:var(--disp); font-weight:700; font-size:16.5px}
.fc .formula{font-size:11.5px; color:var(--ink2); margin-top:2px}
.fc .arr{margin-left:auto; color:var(--ink3); font-size:20px; flex:none}
.fc.sg .ic{background:#E6F4EE; color:var(--green)}
.fc.sg:hover{border-color:var(--green)}
/* 本番モード切替（v1.7で追加） */
.modeseg{display:flex; gap:8px; margin:2px 0 8px}
.modeseg .seg{flex:1; border:1.5px solid var(--line); background:var(--card); border-radius:14px; padding:11px 8px; cursor:pointer;
   font-family:var(--disp); font-weight:700; font-size:14px; color:var(--ink2); box-shadow:var(--sh-s); transition:.15s; display:flex; flex-direction:column; align-items:center; gap:2px}
.modeseg .seg small{font-family:var(--body); font-weight:500; font-size:10.5px; color:var(--ink3)}
.modeseg .seg.on{border-color:var(--persimmon); background:#FBE7DA; color:var(--persimmon-d)}
.modeseg .seg.on small{color:var(--persimmon-d)}
.modeseg .seg:active{transform:scale(.97)}
.modecap{font-size:11.5px; color:var(--ink3); margin:0 2px 14px; line-height:1.6}
.fbtn.honban{border-color:var(--persimmon); background:#FBE7DA; color:var(--persimmon-d)}
/* 学習記録（v1.9で追加） */
.statcard{background:var(--card); border:1px solid var(--line); border-radius:18px; box-shadow:var(--sh-s); padding:16px 18px; margin-bottom:8px}
.statcard .big{font-family:var(--disp); font-weight:900; font-size:30px; color:var(--ink); line-height:1}
.statcard .big small{font-family:var(--body); font-weight:700; font-size:13px; color:var(--ink2); margin-left:6px}
.statcard .bigsub{font-size:12px; color:var(--ink3); margin-top:5px}
.rec-row{display:flex; align-items:center; gap:10px; background:var(--card); border:1px solid var(--line); border-radius:13px; padding:10px 13px; margin-bottom:8px; box-shadow:var(--sh-s)}
.rec-row.weak{border-color:#F2CFC6; background:#FBEFEC}
.rec-row .rl{font-family:var(--disp); font-weight:700; font-size:14px; width:34%; flex:none}
.rec-row .rb{flex:1; height:9px; background:var(--paper2); border-radius:999px; overflow:hidden}
.rec-row .rb i{display:block; height:100%; background:linear-gradient(90deg,var(--green),#6fc3a6); border-radius:999px}
.rec-row.weak .rb i{background:linear-gradient(90deg,var(--persimmon),var(--gold))}
.rec-row .rp{font-family:var(--disp); font-weight:900; font-size:15px; width:62px; text-align:right; flex:none}
.rec-row .rp small{display:block; font-family:var(--body); font-weight:500; font-size:10px; color:var(--ink3)}
.qcard{background:var(--card); border:1px solid var(--line); border-radius:24px; box-shadow:var(--sh); padding:22px 20px; animation:up .35s both}
.qtag{display:inline-block; font-size:10.5px; font-weight:700; letter-spacing:.06em; padding:4px 11px; border-radius:999px; background:#E6EEF8; color:var(--indigo); font-family:var(--body); margin-bottom:14px}
.story{font-size:15px; color:var(--ink2); margin-bottom:2px}
.givens{background:var(--paper); border-radius:13px; padding:12px 14px; margin:10px 0 4px}
.givens .g{display:flex; justify-content:space-between; align-items:baseline; padding:5px 0; font-size:14.5px}
.givens .g+.g{border-top:1px dashed var(--line)}
.givens .g span{color:var(--ink2); font-size:13px}
.givens .g b{font-family:var(--disp); font-weight:700; font-size:16px}
.qq{font-family:var(--disp); font-weight:900; font-size:19px; margin:16px 0 2px; color:var(--ink)}
.ansrow{display:flex; align-items:stretch; gap:10px; margin-top:12px}
.ansrow input{flex:1; min-width:0; border:2px solid var(--line); border-radius:14px; padding:14px; font-size:22px; font-family:var(--disp); font-weight:700; color:var(--ink); background:#fff; text-align:right; outline:none}
.ansrow input:focus{border-color:var(--indigo)}
.ansrow .unit{display:grid; place-items:center; font-family:var(--disp); font-weight:900; font-size:20px; color:var(--ink2); padding:0 4px; flex:none}
.fb{margin-top:16px; border-radius:16px; padding:15px 16px; animation:up .3s both; border:1.5px solid}
.fb.ok{background:#E6F4EE; border-color:#BFE6D5}
.fb.ng{background:#FBEAE6; border-color:#F2CFC6}
.fb .head{display:flex; align-items:center; gap:9px; font-family:var(--disp); font-weight:900; font-size:16.5px; margin-bottom:10px}
.fb.ok .head{color:var(--green)} .fb.ng .head{color:var(--red)}
.fb .head .mk{width:26px; height:26px; border-radius:50%; display:grid; place-items:center; color:#fff; font-size:15px; flex:none}
.fb.ok .head .mk{background:var(--green)} .fb.ng .head .mk{background:var(--red)}
.work{background:rgba(255,255,255,.7); border-radius:12px; padding:12px 14px; font-size:14px; line-height:1.85}
.work .w0{font-family:var(--disp); font-weight:700; color:var(--indigo)}
.work .w1{color:var(--ink2)}
.work .w2{font-family:var(--disp); font-weight:900; font-size:17px; margin-top:3px}
.fb .csrc{margin-top:10px; font-size:11px; color:var(--ink3)} .fb .csrc b{color:var(--ink2)}
.calcwrap{margin-top:14px}
.calctoggle{display:flex; align-items:center; gap:8px; background:var(--card); border:1.5px solid var(--line); border-radius:999px; padding:9px 14px; font-size:13px; font-weight:700; color:var(--ink2); cursor:pointer; font-family:var(--body); box-shadow:var(--sh-s)}
.calc{margin-top:11px; background:#2A2722; border-radius:18px; padding:14px; box-shadow:var(--sh); display:none}
.calc.open{display:block; animation:up .25s both}
.calc .disp{background:#1c1a16; color:#fff; border-radius:11px; text-align:right; font-family:var(--disp); font-weight:700; font-size:26px; padding:14px 16px; min-height:54px; word-break:break-all; line-height:1.2}
.calc .keys{display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-top:11px}

    {id:"eisei-o157",field:"gaisyoku",category:"eisei",priority:3,level:"ssw1",

     meaning:"<ruby>少<rt class=ez>すこ</rt></ruby>しの<ruby>量<rt>りょう</rt></ruby>でも<ruby>強<rt class=ez>つよ</rt></ruby>く<ruby>感染<rt>かんせん</rt></ruby>する<ruby>食中毒菌<rt>しょくちゅうどくきん</rt></ruby>。<ruby>十分<rt class=ez>じゅうぶん</rt></ruby>な<ruby>加熱<rt>かねつ</rt></ruby>が<ruby>大切<rt class=ez>たいせつ</rt></ruby>。",

    {id:"eisei-staph",field:"gaisyoku",category:"eisei",priority:3,level:"ssw1",
     term:"黄色ブドウ球菌",reading:"おうしょくぶどうきゅうきん",
     meaning:"<ruby>人<rt class=ez>ひと</rt></ruby>の<ruby>手<rt class=ez>て</rt></ruby>や<ruby>傷<rt>きず</rt></ruby>にいる<ruby>菌<rt>きん</rt></ruby>。<ruby>手<rt class=ez>て</rt></ruby>を<ruby>通<rt class=ez>とお</rt></ruby>して<ruby>食品<rt class=ez>しょくひん</rt></ruby>に<ruby>移<rt>うつ</rt></ruby>ることがある。<ruby>菌<rt>きん</rt></ruby>が<ruby>食品<rt class=ez>しょくひん</rt></ruby>の<ruby>中<rt class=ez>なか</rt></ruby>で<ruby>作<rt class=ez>つく</rt></ruby>る<ruby>毒<rt>どく</rt></ruby>は<ruby>加熱<rt>かねつ</rt></ruby>しても<ruby>無<rt>な</rt></ruby>くならないため、<ruby>手<rt class=ez>て</rt></ruby>から<ruby>菌<rt>きん</rt></ruby>を<ruby>付<rt>つ</rt></ruby>けないことが<ruby>大切<rt class=ez>たいせつ</rt></ruby>。",
     example:"<ruby>手<rt class=ez>て</rt></ruby>に<ruby>傷<rt>きず</rt></ruby>があるときは<ruby>手袋<rt>てぶくろ</rt></ruby>をして、<ruby>黄色<rt class=ez>おうしょく</rt></ruby>ブドウ<ruby>球菌<rt>きゅうきん</rt></ruby>を<ruby>防<rt>ふせ</rt></ruby>ぎます。",source:"厚生労働省",translations:{id:null,vn:null,ne:null,mm:null}},
    {id:"eisei-anisakis",field:"gaisyoku",category:"eisei",priority:3,level:"ssw2",
     term:"アニサキス",reading:"あにさきす",
     meaning:"<ruby>魚<rt class=ez>さかな</rt></ruby>にいることがある<ruby>寄生虫<rt>きせいちゅう</rt></ruby>。<ruby>生<rt class=ez>なま</rt></ruby>の<ruby>魚<rt class=ez>さかな</rt></ruby>で<ruby>食中毒<rt>しょくちゅうどく</rt></ruby>になることがある。<ruby>防<rt>ふせ</rt></ruby>ぐには、-20℃で24<ruby>時間<rt class=ez>じかん</rt></ruby><ruby>冷凍<rt>れいとう</rt></ruby>するか、よく<ruby>加熱<rt>かねつ</rt></ruby>する（<ruby>中心<rt class=ez>ちゅうしん</rt></ruby>60℃で1<ruby>分<rt class=ez>ぷん</rt></ruby>）。",

    {id:"eisei-jiaen",field:"gaisyoku",category:"eisei",priority:3,level:"ssw2",

    {id:"eisei-gaho",field:"gaisyoku",category:"eisei",priority:2,level:"ssw2",

     meaning:"<ruby>一部<rt class=ez>いちぶ</rt></ruby>の<ruby>菌<rt>きん</rt></ruby>が<ruby>作<rt class=ez>つく</rt></ruby>る、<ruby>熱<rt>ねつ</rt></ruby>に<ruby>強<rt class=ez>つよ</rt></ruby>い<ruby>固<rt>かた</rt></ruby>い<ruby>殻<rt>から</rt></ruby>。<ruby>普通<rt>ふつう</rt></ruby>の<ruby>加熱<rt>かねつ</rt></ruby>では<ruby>死<rt class=ez>し</rt></ruby>なないことがある。",

    {id:"eisei-allergen8",field:"gaisyoku",category:"eisei",priority:3,level:"ssw2",

    {id:"eisei-kigen",field:"gaisyoku",category:"eisei",priority:2,level:"ssw1",
     term:"消費期限",reading:"しょうひきげん",

    {id:"eisei-shomi",field:"gaisyoku",category:"eisei",priority:2,level:"ssw1",

    {id:"eisei-5s",field:"gaisyoku",category:"eisei",priority:2,level:"ssw1",

    {id:"eisei-sekininsha",field:"gaisyoku",category:"eisei",priority:2,level:"ssw2",

    {id:"eisei-welsh",field:"gaisyoku",category:"eisei",priority:3,level:"ssw1",

    {id:"eisei-vibrio",field:"gaisyoku",category:"eisei",priority:3,level:"ssw1",

    {id:"eisei-cereus",field:"gaisyoku",category:"eisei",priority:2,level:"ssw1",

    {id:"eisei-hepatitisE",field:"gaisyoku",category:"eisei",priority:2,level:"ssw2",

    {id:"eisei-saikinsei",field:"gaisyoku",category:"eisei",priority:3,level:"ssw2",

    {id:"eisei-virussei",field:"gaisyoku",category:"eisei",priority:3,level:"ssw2",

    {id:"eisei-kagakusei",field:"gaisyoku",category:"eisei",priority:2,level:"ssw2",

    {id:"eisei-ccp",field:"gaisyoku",category:"eisei",priority:3,level:"ssw2",

    {id:"eisei-ha",field:"gaisyoku",category:"eisei",priority:2,level:"ssw2",
